              </div>
            </section>
            <div class="button-row">
              <button class="btn primary" type="button" data-action="confirm-final-host-pick" ${
                state.finalHostPickId ? "" : "disabled"
              }>
                このワードで確定
              </button>
            </div>
          </section>
        `;
      }

      function renderFinalResult() {
        const result = state.finalResult;
        return `
          <section class="screen-card">
            <h3>総合優勝</h3>
            <section class="result-stage is-champion">
              <small>総合優勝</small>
              ${renderPhraseLines(result.winner.lines, result.winner.font, "result-phrase")}
              <div class="result-owner">${escapeHtml(result.winner.owner)}</div>
            </section>
            <section class="summary-panel">
              <h4>各ラウンドの勝ちワード</h4>
              <div class="history-list">
                ${state.roundStates
                  .map(
                    (roundState, index) => `
                      <div class="history-card">
                        <strong>${escapeHtml(rounds[index].label)}</strong>
                        <span>${escapeHtml(roundState.result.winner.phrase)} / ${escapeHtml(roundState.result.winner.owner)}</span>
                      </div>
                    `
                  )
                  .join("")}
              </div>
            </section>

            <div class="button-row">
              <button class="btn primary" type="button" data-action="restart-prototype">もう一度最初から</button>
            </div>
          </section>
          ${
            state.finalPopupOpen
              ? `
                <div class="popup champion-popup is-open${state.finalPopupTurning ? " is-turning" : ""}">
                  <div class="popup-card3d">
                    <div class="popup-face popup-back">
                      <div class="popup-back-mark" aria-hidden="true"></div>
                    </div>
                    <div class="popup-face popup-front is-champion">
                      <div class="champion-popup-main">
                        <span class="popup-badge">総合優勝</span>
                        <div class="champion-word-block">
                          ${renderPhraseLines(result.winner.lines, result.winner.font, "final-champion")}
                          <div class="result-owner">${escapeHtml(result.winner.owner)}</div>
                        </div>
                      </div>
                      <div class="popup-actions">
                        <button class="btn primary" type="button" data-action="close-final-popup">結果一覧を見る</button>
                      </div>
                    </div>
                  </div>
                </div>
              `
              : ""
          }
        `;
      }

      function renderApp() {
        renderHeader();

        const screens = {
          lobby: renderLobby,
          submit: renderSubmit,
          wait: renderWait,
          vote: renderVote,
          revote: renderRevote,
          hostDecide: renderHostDecide,
          roundResult: renderRoundResult,
          finalVote: renderFinalVote,
          finalRevote: renderFinalRevote,
          finalHostDecide: renderFinalHostDecide,
          finalResult: renderFinalResult
        };

        els.app.innerHTML = screens[state.screen]();

        if (state.screen === "submit") {
          prepareRoundDraft();
          hydrateSubmitScreen();
        }
      }

      function hydrateSubmitScreen() {
        const draft = getRoundState();
        const layout = computeWordLayout();
        const submitEls = getSubmitSceneEls();
        const locked = !canEditCurrentRound();
        const used = new Set(getUsedTileIndexes());

        if (submitEls.lineModeRow) {
          submitEls.lineModeRow.innerHTML = lineModes
            .map(
              (mode) =>
                `<button type="button" class="chip${mode.id === draft.lineMode ? " active" : ""}" data-mode="${mode.id}" ${
                  locked ? "disabled" : ""
                }>${mode.label}</button>`
            )
            .join("");
        }

        if (submitEls.fontRow) {
          submitEls.fontRow.innerHTML = fonts
            .map(
              (font) =>
                `<button type="button" class="chip${font.id === draft.font ? " active" : ""}" data-font="${font.id}" ${
                  locked ? "disabled" : ""
                }>${font.label}</button>`
            )
            .join("");
        }

        if (submitEls.tileGrid) {
          submitEls.tileGrid.innerHTML = gameHand
            .map((tile, index) => {
              const selected = draft.selected.includes(index);
              const isUsed = used.has(index);
              return `<button type="button" class="tile${selected ? " selected" : ""}${isUsed ? " used" : ""}" data-tile="${index}" ${
                isUsed || locked ? "disabled" : ""
              }>${escapeHtml(tile)}</button>`;
            })
            .join("");
        }

        applyWordMarkup(submitEls.previewWord, layout.lines, getFontClass(draft.font), draft.lineMode, layout.fontSize);

        renderManualBreakPanel(submitEls);
        renderSubmitPopup(submitEls, layout);
      }

      function renderManualBreakPanel(submitEls) {
        const draft = getRoundState();
        const chars = Array.from(getCombinedText());
        const canBreak = chars.length > 1;
        submitEls.manualBreakPanel.hidden = !(draft.lineMode === "manual" && canBreak);
        if (submitEls.manualBreakPanel.hidden) {
          return;
        }

        sanitizeManualBreaks();
        submitEls.manualBreakLabel.textContent = draft.manualBreaks.length
          ? `${draft.manualBreaks.join(" / ")}文字目のあとで改行`
          : "改行を入れない";
        submitEls.breakTrack.innerHTML = chars
          .map((char, index) => {
            const box = `<span class="char-box">${escapeHtml(char)}</span>`;
            const gap =
              index < chars.length - 1
                ? `<button type="button" class="break-dot${draft.manualBreaks.includes(index + 1) ? " active" : ""}" data-break="${
                    index + 1
                  }" aria-label="${index + 1}文字目のあとで改行" ${canEditCurrentRound() ? "" : "disabled"}></button>`
                : "";
            return `${box}${gap}`;
          })
          .join("");
      }

      function renderSubmitPopup(submitEls, layout) {
        const draft = getRoundState();
        const entry = draft.submission || getLiveSubmission();
        applyWordMarkup(submitEls.popupWord, entry.lines, getFontClass(entry.font), draft.lineMode, layout.fontSize);
      }

      function getRoundVoteEntries(roundIndex = state.roundIndex, phase = "initial") {
        const entries = getRoundEntries(roundIndex);
        if (phase === "initial") {
          return entries;
        }
        const initialOutcome = getVoteOutcome(roundIndex, "initial");
        return entries.filter((entry) => initialOutcome.tieIds.includes(entry.id));
      }

      function getVoteOutcome(roundIndex = state.roundIndex, phase = "initial") {
        const round = getRoundConfig(roundIndex);
        const roundState = getRoundState(roundIndex);
        const entries = getRoundVoteEntries(roundIndex, phase);
        const validIds = new Set(entries.map((entry) => entry.id));
        const userVoteId = phase === "initial" ? roundState.voteId : roundState.revoteId;
        const otherVotes = phase === "initial" ? round.otherVotes : round.otherRevotes || round.otherVotes;
        const votes = [userVoteId, ...otherVotes].filter((voteId) => validIds.has(voteId));
        return {
          phase,
          ...buildVoteOutcome(entries, votes)
        };
      }

      function getOwnerTallies() {
        const map = new Map();
        state.roundStates
          .filter((roundState) => roundState.result)
          .forEach((roundState) => {
            const owner = roundState.result.winner.owner;
            map.set(owner, (map.get(owner) || 0) + 1);
          });
        return [...map.entries()]
          .map(([owner, count]) => ({ owner, count }))
          .sort((a, b) => b.count - a.count);
      }

      function getFinalCandidates() {
        return state.roundStates.map((roundState, index) => ({
          ...roundState.result.winner,
          id: rounds[index].id,
          roundLabel: rounds[index].label
        }));
      }

      function getFinalVoteEntries(phase = "initial") {
        const candidates = getFinalCandidates();
        if (phase === "initial") {
          return candidates;
        }
        const initialOutcome = getFinalOutcome("initial");
        return candidates.filter((candidate) => initialOutcome.tieIds.includes(candidate.id));
      }

      function getFinalOutcome(phase = "initial") {
        const finalConfig = getActiveFinalVoteConfig();
        const entries = getFinalVoteEntries(phase);
        const validIds = new Set(entries.map((entry) => entry.id));
        const userVoteId = phase === "initial" ? state.finalVoteId : state.finalRevoteId;
        const otherVotes = phase === "initial" ? finalConfig.otherVotes : finalConfig.otherRevotes || finalConfig.otherVotes;
        const votes = [userVoteId, ...otherVotes].filter((voteId) => validIds.has(voteId));
        return {
          phase,
          ...buildVoteOutcome(entries, votes)
        };
      }

      function buildRoundResult(roundIndex = state.roundIndex, resolution = "initial", hostChoiceId = null) {
        const initialOutcome = getVoteOutcome(roundIndex, "initial");
        if (resolution === "initial") {
          return {
            ...initialOutcome,
            resolution,
            initialOutcome
          };
        }

        const revoteOutcome = getVoteOutcome(roundIndex, "revote");
        if (resolution === "revote") {
          return {
            ...revoteOutcome,
            resolution,
            initialOutcome,
            revoteOutcome
          };
        }

        const winner =
          revoteOutcome.counts.find((item) => item.id === hostChoiceId)?.entry || revoteOutcome.counts[0]?.entry || initialOutcome.winner;

        return {
          winner,
          voteCount: revoteOutcome.voteCount,
          counts: revoteOutcome.counts,
          tieIds: revoteOutcome.tieIds,
          isTie: false,
          resolution,
          initialOutcome,
          revoteOutcome
        };
      }

      function buildFinalResult(resolution = "initial", hostChoiceId = null) {
        const initialOutcome = getFinalOutcome("initial");
        if (resolution === "initial") {
          return {
            ...initialOutcome,
            resolution,
            initialOutcome
          };
        }

        const revoteOutcome = getFinalOutcome("revote");
        if (resolution === "revote") {
          return {
            ...revoteOutcome,
            resolution,
            initialOutcome,
            revoteOutcome
          };
        }

        const winner =
          revoteOutcome.counts.find((item) => item.id === hostChoiceId)?.entry || revoteOutcome.counts[0]?.entry || initialOutcome.winner;

        return {
          winner,
          voteCount: revoteOutcome.voteCount,
          counts: revoteOutcome.counts,
          tieIds: revoteOutcome.tieIds,
          isTie: false,
          resolution,
          initialOutcome,
          revoteOutcome
        };
      }

      function clearPopup() {
        if (state.popupTimer) {
          window.clearTimeout(state.popupTimer);
          state.popupTimer = 0;
        }
        state.popupOpen = false;
        state.popupTurning = false;
      }

      function queuePopupTurn() {
        clearPopup();
        state.popupOpen = true;
        renderApp();
        state.popupTimer = window.setTimeout(() => {
          state.popupTimer = 0;
          state.popupTurning = true;
          renderApp();
        }, 120);
      }

      function clearFinalPopup() {
        if (state.finalPopupTimer) {
          window.clearTimeout(state.finalPopupTimer);
          state.finalPopupTimer = 0;
        }
        state.finalPopupOpen = false;
        state.finalPopupTurning = false;
      }

      function queueFinalPopupTurn() {
        clearFinalPopup();
        state.finalPopupOpen = true;
        renderApp();
        state.finalPopupTimer = window.setTimeout(() => {
          state.finalPopupTimer = 0;
          state.finalPopupTurning = true;
          renderApp();
        }, 120);
      }

      function startGame() {
        ensureActiveStartPlayer();
        state.roundIndex = 0;
        state.finalVoteId = null;
        state.finalRevoteId = null;
        state.finalHostPickId = null;
        state.finalResult = null;
        state.historyOpen = false;
        state.roundStates = rounds.map(createRoundState);
        clearPopup();
        clearFinalPopup();
        resetRoundFlow();
        renderApp();
      }

      function restartPrototype() {
        ensureActiveStartPlayer();
        state.screen = "lobby";
        state.roundIndex = 0;
        state.submitTurnIndex = 0;
        state.waitMode = "submit";
        state.finalVoteId = null;
        state.finalRevoteId = null;
        state.finalHostPickId = null;
        state.finalResult = null;
        state.historyOpen = false;
        state.roundStates = rounds.map(createRoundState);
        clearPopup();
        clearFinalPopup();
        renderApp();
      }

      function seedRoundTieFlow(roundIndex, stage = "revote") {
        const roundState = getRoundState(roundIndex);
        const round = getRoundConfig(roundIndex);
        if (!roundState.submission) {
          roundState.submission = buildFallbackSubmission(roundIndex);
        }
        roundState.voteId = round.tieDemoVoteId || round.seedVoteId || round.otherVotes[0];
        if (stage === "host") {
          roundState.revoteId = round.tieDemoRevoteId || roundState.voteId;
        }
      }

      function seedFinalTieFlow(stage = "revote") {
        const finalConfig = getActiveFinalVoteConfig();
        state.finalVoteId = finalConfig.tieDemoVoteId || finalConfig.seedVoteId;
        if (stage === "host") {
          state.finalRevoteId = finalConfig.tieDemoRevoteId || state.finalVoteId;
        }
      }

      function applyQueryState() {
        const params = new URLSearchParams(window.location.search);
        const screen = params.get("screen");
        const round = Number(params.get("round"));
        const count = Number(params.get("count"));
        const submitted = params.get("submitted");
        const popup = params.get("popup");
        const waitMode = params.get("waitMode");
        const first = params.get("first");
        const turn = Number(params.get("turn"));

        if ([2, 3, 4].includes(count)) {
          state.playerCount = count;
        }

        if (Number.isInteger(round) && round >= 0 && round < rounds.length) {
          state.roundIndex = round;
        }

        ensureActiveStartPlayer();

        if (getActivePlayers().some((player) => player.id === first)) {
          state.startPlayerId = first;
        }

        if (Number.isInteger(turn) && turn >= 0 && turn <= getActivePlayers().length) {
          state.submitTurnIndex = turn;
        }

        if (["submit", "vote", "revote", "finalVote", "finalRevote"].includes(waitMode)) {
          state.waitMode = waitMode;
        }

        if (submitted === "1") {
          getRoundState().submission = buildFallbackSubmission(state.roundIndex);
        }

        if (
          screen &&
          [
            "lobby",
            "submit",
            "wait",
            "vote",
            "revote",
            "hostDecide",
            "roundResult",
            "finalVote",
            "finalRevote",
            "finalHostDecide",
            "finalResult"
          ].includes(screen)
        ) {
          state.screen = screen;
        }

        if (state.screen !== "lobby" && state.roundIndex > 0) {
          for (let i = 0; i < state.roundIndex; i += 1) {
            if (!state.roundStates[i].result) {
              const roundConfig = getRoundConfig(i);
              seedRoundOutcome(i, roundConfig.seedVoteId || roundConfig.otherVotes[0]);
            }
          }
        }

        const shouldSeedSubmission =
          ["vote", "revote", "hostDecide", "roundResult", "finalVote", "finalRevote", "finalHostDecide", "finalResult"].includes(
            state.screen
          ) ||
          (state.screen === "wait" &&
            (submitted === "1" ||
              state.waitMode !== "submit" ||
              state.submitTurnIndex > getOrderedPlayers().findIndex((player) => player.id === "you")));

        if (shouldSeedSubmission && !getRoundState().submission) {
          getRoundState().submission = buildFallbackSubmission(state.roundIndex);
        }

        if (state.screen === "revote") {
          seedRoundTieFlow(state.roundIndex, "revote");
        }

        if (state.screen === "hostDecide") {
          seedRoundTieFlow(state.roundIndex, "host");
          getRoundState().hostPickId = null;
        }

        if (["roundResult", "finalVote", "finalRevote", "finalHostDecide", "finalResult"].includes(state.screen)) {
          for (let i = 0; i <= Math.max(state.roundIndex, 0); i += 1) {
            const roundConfig = getRoundConfig(i);
            seedRoundOutcome(i, roundConfig.seedVoteId || roundConfig.otherVotes[0]);
          }
        }

        if (["finalVote", "finalRevote", "finalHostDecide", "finalResult"].includes(state.screen)) {
          for (let i = 0; i < rounds.length; i += 1) {
            if (!state.roundStates[i].result) {
              const roundConfig = getRoundConfig(i);
              seedRoundOutcome(i, roundConfig.seedVoteId || roundConfig.otherVotes[0]);
            }
          }
          state.finalVoteId = params.get("finalVote") || getActiveFinalVoteConfig().seedVoteId;
        }

        if (state.screen === "finalRevote") {
          seedFinalTieFlow("revote");
        }

        if (state.screen === "finalHostDecide") {
          seedFinalTieFlow("host");
          state.finalHostPickId = null;
        }

        if (state.screen === "finalResult") {
          state.finalResult = buildFinalResult("initial");
          state.finalPopupOpen = true;
          state.finalPopupTurning = true;
        }

        state.popupOpen = popup === "1";
        state.popupTurning = popup === "1";
      }

      function submitCurrentPhrase() {
        if (!canEditCurrentRound()) {
          return;
        }
        if (getSelectedTiles().length < 2) {
          window.alert("まずは牌を2つ選んでください。");
          return;
        }
        getRoundState().submission = getLiveSubmission();
        queuePopupTurn();
      }

      function finishCurrentRoundVote() {
        const roundState = getRoundState();
        if (!roundState.voteId) {
          return;
        }

        const outcome = getVoteOutcome(state.roundIndex, "initial");
        if (outcome.isTie) {
          roundState.revoteId = null;
          roundState.hostPickId = null;
          state.screen = "revote";
          renderApp();
          return;
        }

        roundState.result = buildRoundResult(state.roundIndex, "initial");
        state.waitMode = "submit";
        state.screen = "roundResult";
        renderApp();
      }

      function finishCurrentRoundRevote() {
        const roundState = getRoundState();
        if (!roundState.revoteId) {
          return;
        }

        const outcome = getVoteOutcome(state.roundIndex, "revote");
        if (outcome.isTie) {
          roundState.hostPickId = null;
          state.screen = "hostDecide";
          renderApp();
          return;
        }

        roundState.result = buildRoundResult(state.roundIndex, "revote");
        state.waitMode = "submit";
        state.screen = "roundResult";
        renderApp();
      }

      function decideRoundByHost(winnerId) {
        const round = getRoundConfig(state.roundIndex);
        const revoteOutcome = getVoteOutcome(state.roundIndex, "revote");
        if (!revoteOutcome.tieIds.includes(winnerId)) {
          return;
        }
        getRoundState().result = buildRoundResult(state.roundIndex, "host", winnerId || round.hostChoice);
        state.waitMode = "submit";
        state.screen = "roundResult";
        renderApp();
      }

      function finishFinalVote() {
        if (!state.finalVoteId) {
          return;
        }

        const outcome = getFinalOutcome("initial");
        if (outcome.isTie) {
          state.finalRevoteId = null;
          state.finalHostPickId = null;
          state.screen = "finalRevote";
          renderApp();
          return;
        }

        state.finalResult = buildFinalResult("initial");
        state.screen = "finalResult";
        queueFinalPopupTurn();
      }

      function finishFinalRevote() {
        if (!state.finalRevoteId) {
          return;
        }

        const outcome = getFinalOutcome("revote");
        if (outcome.isTie) {
          state.finalHostPickId = null;
          state.screen = "finalHostDecide";
          renderApp();
          return;
        }

        state.finalResult = buildFinalResult("revote");
        state.screen = "finalResult";
        queueFinalPopupTurn();
      }

      function decideFinalByHost(winnerId) {
        const outcome = getFinalOutcome("revote");
        if (!outcome.tieIds.includes(winnerId)) {
          return;
        }
        state.finalResult = buildFinalResult("host", winnerId || getActiveFinalVoteConfig().hostChoice);
        state.screen = "finalResult";
        queueFinalPopupTurn();
      }

      function seedRoundOutcome(roundIndex, voteId) {
        const roundState = getRoundState(roundIndex);
        const round = getRoundConfig(roundIndex);
        if (!roundState.submission) {
          roundState.submission = buildFallbackSubmission(roundIndex);
        }
        roundState.voteId = voteId || round.seedVoteId || round.otherVotes[0];
        roundState.revoteId = null;
        roundState.hostPickId = null;

        const initialOutcome = getVoteOutcome(roundIndex, "initial");
        if (!initialOutcome.isTie) {
          roundState.result = buildRoundResult(roundIndex, "initial");
          return;
        }

        roundState.revoteId = round.tieDemoRevoteId || roundState.voteId;
        const revoteOutcome = getVoteOutcome(roundIndex, "revote");
        if (!revoteOutcome.isTie) {
          roundState.result = buildRoundResult(roundIndex, "revote");
          return;
        }

        roundState.result = buildRoundResult(roundIndex, "host", round.hostChoice || revoteOutcome.tieIds[0]);
      }

      function toggleTile(index) {
        if (!canEditCurrentRound()) {
          return;
        }
        if (getUsedTileIndexes().includes(index)) {
          return;
        }
        const draft = getRoundState();
        const selectedIndex = draft.selected.indexOf(index);
        if (selectedIndex >= 0) {
          draft.selected.splice(selectedIndex, 1);
          renderApp();
          return;
        }
        if (draft.selected.length >= 2) {
          draft.selected.shift();
        }
        draft.selected.push(index);
        sanitizeManualBreaks();
        renderApp();
      }

      function updateDraft(action) {
        if (!canEditCurrentRound()) {
          return;
        }
        const draft = getRoundState();
        switch (action) {
          case "swap-selection":
            draft.selected.reverse();
            sanitizeManualBreaks();
            break;
          case "clear-selection":
            draft.selected = [];
            draft.manualBreaks = [];
            break;
          default:
            break;
        }
        renderApp();
      }

      document.addEventListener("click", (event) => {
        const modeButton = event.target.closest("[data-mode]");
        if (modeButton) {
          if (!canEditCurrentRound()) {
            return;
          }
          getRoundState().lineMode = modeButton.dataset.mode;
          sanitizeManualBreaks();
          renderApp();
          return;
        }

        const fontButton = event.target.closest("[data-font]");
        if (fontButton) {
          if (!canEditCurrentRound()) {
            return;
          }
          getRoundState().font = fontButton.dataset.font;
          renderApp();
          return;
        }

        const breakButton = event.target.closest("[data-break]");
        if (breakButton) {
          if (!canEditCurrentRound()) {
            return;
          }
          const draft = getRoundState();
          const value = Number(breakButton.dataset.break);
          draft.manualBreaks = draft.manualBreaks.includes(value)
            ? draft.manualBreaks.filter((point) => point !== value)
            : [...draft.manualBreaks, value];
          renderApp();
          return;
        }

        const tileButton = event.target.closest("[data-tile]");
        if (tileButton) {
          toggleTile(Number(tileButton.dataset.tile));
          return;
        }

        const voteButton = event.target.closest("[data-vote]");
        if (voteButton && !voteButton.disabled) {
          getRoundState().voteId = voteButton.dataset.vote;
          getRoundState().revoteId = null;
          renderApp();
          return;
        }

        const revoteButton = event.target.closest("[data-revote]");
        if (revoteButton && !revoteButton.disabled) {
          getRoundState().revoteId = revoteButton.dataset.revote;
          renderApp();
          return;
        }

        const hostPickButton = event.target.closest("[data-host-pick]");
        if (hostPickButton) {
          getRoundState().hostPickId = hostPickButton.dataset.hostPick;
          renderApp();
          return;
        }

        const startPlayerButton = event.target.closest("[data-start-player]");
        if (startPlayerButton) {
          state.startPlayerId = startPlayerButton.dataset.startPlayer;
          renderApp();
          return;
        }

        const playerCountButton = event.target.closest("[data-player-count]");
        if (playerCountButton) {
          state.playerCount = Number(playerCountButton.dataset.playerCount) || 4;
          ensureActiveStartPlayer();
          renderApp();
          return;
        }

        const finalVoteButton = event.target.closest("[data-final-vote]");
        if (finalVoteButton && !finalVoteButton.disabled) {
          state.finalVoteId = finalVoteButton.dataset.finalVote;
          state.finalRevoteId = null;
          renderApp();
          return;
        }

        const finalRevoteButton = event.target.closest("[data-final-revote]");
        if (finalRevoteButton && !finalRevoteButton.disabled) {
          state.finalRevoteId = finalRevoteButton.dataset.finalRevote;
          renderApp();
          return;
        }

        const finalHostPickButton = event.target.closest("[data-final-host-pick]");
        if (finalHostPickButton) {
          state.finalHostPickId = finalHostPickButton.dataset.finalHostPick;
          renderApp();
          return;
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) {
          return;
        }

        const action = actionButton.dataset.action;

        if (action === "copy-link") {
          const inviteUrl = "https://omojan.example/room/OMO-2048";
          if (navigator.clipboard?.writeText) {
            navigator.clipboard.writeText(inviteUrl).then(
              () => window.alert("招待URLをコピーしました。"),
              () => window.alert(inviteUrl)
            );
          } else {
            window.alert(inviteUrl);
          }
          return;
        }

        if (action === "start-game") {
          startGame();
          return;
        }

        if (action === "open-history") {
          state.historyOpen = true;
          renderApp();
          return;
        }

        if (action === "close-history") {
          state.historyOpen = false;
          renderApp();
          return;
        }

        if (action === "swap-selection" || action === "clear-selection") {
          updateDraft(action);
          return;
        }

        if (action === "submit-phrase") {
          submitCurrentPhrase();
          return;
        }

        if (action === "close-popup") {
          clearPopup();
          state.waitMode = "submit";
          state.submitTurnIndex = getOrderedPlayers().findIndex((player) => player.id === "you") + 1;
          state.screen = state.submitTurnIndex >= getActivePlayers().length ? "vote" : "wait";
          renderApp();
          return;
        }

        if (action === "confirm-vote") {
          state.waitMode = "vote";
          state.screen = "wait";
          renderApp();
          return;
        }

        if (action === "confirm-revote") {
          state.waitMode = "revote";
          state.screen = "wait";
          renderApp();
          return;
        }

        if (action === "confirm-host-pick") {
          decideRoundByHost(getRoundState().hostPickId);
          return;
        }

        if (action === "resolve-wait") {
          if (state.waitMode === "submit") {
            state.submitTurnIndex += 1;
            if (state.submitTurnIndex >= getActivePlayers().length) {
              state.screen = "vote";
            } else {
              state.screen = getCurrentSubmitPlayer()?.id === "you" && !getRoundState().submission ? "submit" : "wait";
            }
            renderApp();
            return;
          }
          if (state.waitMode === "vote") {
            finishCurrentRoundVote();
            return;
          }
          if (state.waitMode === "revote") {
            finishCurrentRoundRevote();
            return;
          }
          if (state.waitMode === "finalVote") {
            finishFinalVote();
            return;
          }
          if (state.waitMode === "finalRevote") {
            finishFinalRevote();
            return;
          }
          return;
        }

        if (action === "next-round") {
          clearPopup();
          clearFinalPopup();
          state.roundIndex += 1;
          resetRoundFlow();
          renderApp();
          return;
        }

        if (action === "to-final-vote") {
          state.finalVoteId = null;
          state.finalRevoteId = null;
          state.finalHostPickId = null;
          state.screen = "finalVote";
          renderApp();
          return;
        }

        if (action === "confirm-final-vote") {
          state.waitMode = "finalVote";
          state.screen = "wait";
          renderApp();
          return;
        }

        if (action === "confirm-final-revote") {
          state.waitMode = "finalRevote";
          state.screen = "wait";
          renderApp();
          return;
        }

        if (action === "confirm-final-host-pick") {
          decideFinalByHost(state.finalHostPickId);
          return;
        }

        if (action === "close-final-popup") {
          clearFinalPopup();
          renderApp();
          return;
        }

        if (action === "restart-prototype") {
          restartPrototype();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.popupOpen) {
          clearPopup();
          renderApp();
        }
      });

      applyQueryState();
      ensureActiveStartPlayer();
      renderApp();
    </script>
  </body>
</html>
