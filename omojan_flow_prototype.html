<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おもじゃん フロープロトタイプ</title>
    <style>
      :root {
        --paper: #f6efdb;
        --paper-deep: #efe3bf;
        --ink: #1f1812;
        --green: #24452f;
        --green-soft: #e3eadf;
        --gold: #b28a32;
        --red: #b84431;
        --red-soft: #fae2da;
        --line: rgba(118, 89, 63, 0.24);
        --muted: #736454;
        --shadow: 0 18px 38px rgba(38, 27, 18, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 34%),
          repeating-linear-gradient(
            -35deg,
            rgba(102, 86, 58, 0.04) 0,
            rgba(102, 86, 58, 0.04) 2px,
            transparent 2px,
            transparent 15px
          ),
          linear-gradient(180deg, #f7f1df, #ecdfb7);
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px 18px 56px;
      }

      .page-shell {
        display: grid;
        width: 100%;
        justify-items: center;
        gap: 14px;
      }

      .page-header {
        text-align: center;
      }

      .page-header h1 {
        margin: 0;
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.08;
        color: var(--green);
      }

      .page-header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .phone-shell {
        display: flex;
        width: 100%;
        justify-content: center;
      }

      .phone {
        width: min(100%, 420px);
        max-width: 420px;
        min-height: 860px;
        padding: 16px;
        border-radius: 34px;
        border: 3px solid #21170f;
        background:
          linear-gradient(180deg, rgba(245, 235, 209, 0.98), rgba(253, 247, 235, 0.98)),
          var(--paper);
        box-shadow: 0 20px 40px rgba(29, 22, 15, 0.22);
      }

      .status {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
      }

      .topbar {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(36, 69, 47, 0.98), rgba(22, 45, 31, 0.98));
        color: #f6eddc;
      }

      .topbar.is-hidden {
        display: none;
      }

      .screen-meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .topbar small {
        display: block;
        font-size: 12px;
        line-height: 1.35;
        color: rgba(246, 237, 220, 0.74);
      }

      .topbar strong {
        display: block;
        margin-top: 2px;
        font-size: 13px;
        line-height: 1.35;
      }

      .topbar small:empty,
      .topbar strong:empty {
        display: none;
      }

      .screen-card {
        margin-top: 14px;
        padding: 16px;
        border-radius: 22px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.42);
      }

      .screen-card h3 {
        margin: 0;
        font-size: 18px;
        color: var(--green);
      }

      .screen-lead {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.65;
        font-size: 14px;
      }

      .room-code {
        display: inline-flex;
        margin-top: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.36);
        background: rgba(255, 250, 238, 0.96);
        color: var(--green);
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .player-list {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .player-item {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        justify-content: space-between;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.7);
      }

      .player-item strong {
        display: block;
        margin-top: 10px;
        font-size: 16px;
      }

      .player-meta {
        display: block;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.03em;
      }

      .seat-chip {
        display: inline-flex;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(36, 69, 47, 0.08);
        color: var(--green);
        font-size: 12px;
      }

      .order-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .order-chip {
        appearance: none;
        border: 1px solid rgba(118, 89, 63, 0.2);
        border-radius: 999px;
        padding: 9px 12px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .order-chip.active {
        border-color: rgba(184, 68, 49, 0.32);
        background: rgba(248, 220, 210, 0.76);
        color: #8d2d1d;
      }

      .turn-order-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .turn-order-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.68);
      }

      .turn-order-item.is-you {
        border-color: rgba(184, 138, 50, 0.34);
        background: rgba(255, 250, 238, 0.9);
      }

      .turn-order-num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 999px;
        background: rgba(36, 69, 47, 0.08);
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
        flex-shrink: 0;
      }

      .turn-order-item strong {
        font-size: 14px;
      }

      .summary-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .summary-head h4 {
        margin: 0;
      }

      .summary-link {
        appearance: none;
        border: 0;
        background: none;
        color: var(--red);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 0;
      }

      .control-block,
      .board-panel,
      .vote-panel,
      .result-panel,
      .summary-panel {
        margin-top: 14px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.6);
      }

      .control-block h4,
      .board-panel h4,
      .vote-panel h4,
      .result-panel h4,
      .summary-panel h4 {
        margin: 0;
        font-size: 14px;
        color: var(--green);
      }

      .button-row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      .button-row .btn,
      .phone-action-row .btn,
      .popup-actions .btn {
        flex: 1;
      }

      .btn {
        appearance: none;
        border: 0;
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, opacity 120ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn.primary {
        background: linear-gradient(180deg, #c7523d, #b0402d);
        color: #fff9f3;
      }

      .btn.subtle {
        background: linear-gradient(180deg, rgba(255, 254, 249, 1), rgba(237, 231, 213, 0.98));
        color: var(--green);
        border: 1px solid rgba(118, 89, 63, 0.22);
      }

      .btn.ghost {
        background: rgba(255, 255, 255, 0.55);
        color: var(--muted);
        border: 1px solid rgba(118, 89, 63, 0.18);
      }

      .btn:disabled {
        opacity: 0.42;
        cursor: default;
        transform: none;
      }

      .phrase-preview {
        margin-top: 14px;
        padding: 18px 8px 20px;
        border-radius: 20px;
        border: 1px solid rgba(184, 146, 62, 0.42);
        background: linear-gradient(180deg, rgba(255, 249, 237, 0.98), rgba(248, 238, 210, 0.94));
        text-align: center;
      }

      .phrase-preview strong {
        display: block;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .preview-word,
      .popup-word,
      .measure-word {
        min-height: 140px;
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        font-size: clamp(36px, 8vw, 58px);
        line-height: 0.94;
        color: var(--ink);
        overflow: hidden;
      }

      .popup-word {
        margin-top: 14px;
      }

      .measure-word {
        position: absolute;
        left: -9999px;
        top: -9999px;
        width: 320px;
        height: 140px;
        pointer-events: none;
        visibility: hidden;
      }

      .word-line {
        display: block;
        max-width: 100%;
        white-space: nowrap;
      }

      .font-classic {
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }

      .font-broadcast {
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .font-playful {
        font-family: "Marker Felt", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .font-heavy {
        font-family: "Arial Black", "Helvetica Neue", "Hiragino Sans", sans-serif;
        font-weight: 900;
        letter-spacing: -0.05em;
      }

      .font-round {
        font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .chip {
        appearance: none;
        border: 1px solid rgba(118, 89, 63, 0.28);
        border-radius: 999px;
        background: rgba(255, 248, 234, 0.96);
        padding: 8px 12px;
        font-size: 12px;
        line-height: 1.2;
        cursor: pointer;
      }

      .chip.active {
        border-color: rgba(184, 68, 49, 0.34);
        background: rgba(248, 220, 210, 0.78);
        color: var(--red);
      }

      .break-panel {
        margin-top: 12px;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.62);
      }

      .break-panel p {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
      }

      .break-track {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .char-box {
        min-width: 30px;
        padding: 8px 5px;
        border-radius: 10px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 248, 234, 0.94);
        text-align: center;
        font-size: 16px;
      }

      .break-dot {
        position: relative;
        width: 20px;
        height: 20px;
        border-radius: 6px;
        border: 1px solid rgba(118, 89, 63, 0.32);
        background: rgba(255, 248, 234, 0.98);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .break-dot.active {
        border-color: rgba(36, 69, 47, 0.7);
        background: rgba(36, 69, 47, 0.12);
      }

      .break-dot.active::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 1px;
        width: 6px;
        height: 12px;
        border-right: 3px solid var(--green);
        border-bottom: 3px solid var(--green);
        transform: rotate(40deg);
      }

      .tiles {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
      }

      .tile {
        min-height: 82px;
        padding: 8px 6px;
        border-radius: 14px;
        border: 1px solid rgba(118, 89, 63, 0.34);
        background: linear-gradient(180deg, #fffdf8, #efe5cd);
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        line-height: 1.18;
        overflow-wrap: anywhere;
        word-break: keep-all;
        cursor: pointer;
      }

      .tile.selected {
        border: 2px solid var(--red);
        background: linear-gradient(180deg, #fff7eb, #f6d3c1);
      }

      .tile.used {
        opacity: 0.32;
        cursor: default;
        filter: grayscale(0.2);
      }

      .phone-action-row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      .helper {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.65;
      }

      .board {
        display: grid;
        gap: 10px;
      }

      .board-card {
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(118, 89, 63, 0.2);
        background: rgba(255, 255, 255, 0.62);
      }

      .board-card strong {
        display: block;
        font-size: 13px;
        color: var(--green);
      }

      .board-word {
        margin-top: 8px;
        font-size: 30px;
        line-height: 1.04;
        word-break: keep-all;
        overflow-wrap: anywhere;
      }

      .popup {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(23, 18, 13, 0.28);
        z-index: 40;
        opacity: 0;
        pointer-events: none;
        overflow: auto;
        transition: opacity 120ms linear;
      }

      .popup.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .popup-card3d {
        position: relative;
        width: min(calc(100vw - 44px), 344px);
        min-height: 260px;
        margin: auto;
        transform-style: preserve-3d;
      }

      .popup-face {
        position: absolute;
        inset: 0;
        padding: 20px 8px 18px;
        border-radius: 22px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        box-shadow:
          0 0 0 4px rgba(184, 146, 62, 0.42),
          0 22px 40px rgba(29, 22, 15, 0.2);
      }

      .popup-front {
        border: 3px solid rgba(36, 69, 47, 0.92);
        background: linear-gradient(180deg, rgba(255, 255, 253, 0.99), rgba(246, 239, 224, 0.99));
        text-align: center;
        opacity: 0;
        transform: rotateY(-92deg);
        isolation: isolate;
      }

      .popup-front::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 14px;
        border: 1px solid rgba(184, 146, 62, 0.52);
        pointer-events: none;
        z-index: 0;
      }

      .popup-front > * {
        position: relative;
        z-index: 1;
      }

      .popup-front.is-champion {
        background:
          radial-gradient(circle at top, rgba(255, 244, 201, 0.9), transparent 34%),
          linear-gradient(180deg, rgba(255, 255, 253, 0.99), rgba(250, 239, 210, 0.99));
        box-shadow:
          0 0 0 4px rgba(212, 168, 62, 0.4),
          0 0 26px rgba(212, 168, 62, 0.24),
          0 24px 42px rgba(29, 22, 15, 0.24);
      }

      .popup-front.is-champion::after {
        content: "";
        position: absolute;
        inset: -18px;
        background:
          conic-gradient(
            from 0deg,
            rgba(212, 168, 62, 0.18),
            transparent 18%,
            rgba(212, 168, 62, 0.14) 32%,
            transparent 46%,
            rgba(212, 168, 62, 0.16) 62%,
            transparent 78%,
            rgba(212, 168, 62, 0.18)
          );
        mask: radial-gradient(circle, transparent 57%, black 58%);
        -webkit-mask: radial-gradient(circle, transparent 57%, black 58%);
        pointer-events: none;
        z-index: -1;
      }

      .popup-back {
        border: 3px solid rgba(30, 59, 43, 0.98);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 34%),
          repeating-linear-gradient(
            45deg,
            rgba(255, 255, 255, 0.06) 0,
            rgba(255, 255, 255, 0.06) 8px,
            rgba(0, 0, 0, 0.02) 8px,
            rgba(0, 0, 0, 0.02) 16px
          ),
          linear-gradient(180deg, rgba(42, 77, 57, 1), rgba(24, 48, 33, 0.98));
        opacity: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .popup-back::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 14px;
        border: 1px solid rgba(184, 146, 62, 0.42);
      }

      .popup-back-mark {
        width: 72%;
        aspect-ratio: 1 / 1;
        border-radius: 24px;
        border: 2px solid rgba(184, 146, 62, 0.5);
        position: relative;
      }

      .popup-back-mark::before,
      .popup-back-mark::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        border: 2px solid rgba(184, 146, 62, 0.72);
      }

      .popup-back-mark::before {
        inset: 22% 34%;
      }

      .popup-back-mark::after {
        inset: 34% 22%;
      }

      .popup.is-open .popup-back {
        opacity: 1;
      }

      .popup.is-turning .popup-back {
        animation: popup-back-flip 170ms linear forwards;
      }

      .popup.is-turning .popup-front {
        animation: popup-front-flip 170ms linear 140ms forwards;
      }

      @keyframes popup-back-flip {
        from {
          opacity: 1;
          transform: rotateY(0deg);
        }
        to {
          opacity: 0;
          transform: rotateY(90deg);
        }
      }

      @keyframes popup-front-flip {
        from {
          opacity: 0;
          transform: rotateY(-90deg);
        }
        to {
          opacity: 1;
          transform: rotateY(0deg);
        }
      }

      .popup-badge {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(36, 69, 47, 0.18);
        background: rgba(36, 69, 47, 0.06);
        font-size: 12px;
        color: var(--green);
      }

      .popup-actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      .champion-popup {
        z-index: 42;
      }

      .champion-popup .popup-card3d {
        width: min(calc(100vw - 36px), 360px);
        min-height: 294px;
      }

      .champion-popup .popup-front.is-champion {
        overflow: hidden;
        background:
          radial-gradient(circle at 50% -8%, rgba(255, 248, 221, 1), rgba(255, 245, 210, 0.92) 22%, transparent 52%),
          linear-gradient(180deg, rgba(255, 255, 253, 0.995), rgba(252, 241, 211, 0.995));
        box-shadow:
          0 0 0 4px rgba(228, 184, 72, 0.48),
          0 0 44px rgba(228, 184, 72, 0.38),
          0 28px 48px rgba(29, 22, 15, 0.28);
      }

      .champion-popup .popup-front.is-champion::after {
        inset: -28px;
        background:
          conic-gradient(
            from 0deg,
            rgba(232, 189, 73, 0.32),
            transparent 13%,
            rgba(232, 189, 73, 0.18) 24%,
            transparent 37%,
            rgba(232, 189, 73, 0.24) 53%,
            transparent 66%,
            rgba(232, 189, 73, 0.18) 79%,
            transparent 90%,
            rgba(232, 189, 73, 0.32)
          );
        animation: champion-burst 2.6s ease-in-out infinite;
      }

      .champion-popup .popup-front.is-champion::before {
        border-color: rgba(228, 184, 72, 0.7);
      }

      .champion-popup .popup-badge {
        border-color: rgba(191, 143, 39, 0.4);
        background: linear-gradient(180deg, rgba(255, 243, 196, 0.96), rgba(242, 214, 132, 0.94));
        color: #6d4a07;
        font-weight: 800;
      }

      .champion-popup .result-owner {
        color: #5d481a;
        font-weight: 800;
      }

      .champion-popup .popup-front.is-champion {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 16px 12px 18px;
      }

      .champion-popup-main {
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 14px;
        flex: 1;
        min-height: 210px;
        padding: 6px 10px 0;
      }

      .champion-word-block {
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 10px;
        width: 100%;
        flex: 1;
      }

      .champion-popup .final-champion {
        margin-top: 0;
        font-size: clamp(42px, 10.4vw, 58px);
      }

      .champion-popup .popup-actions {
        width: 100%;
        margin-top: 0;
        align-self: stretch;
      }

      .champion-popup .popup-actions .btn {
        width: 100%;
      }

      @keyframes champion-burst {
        0%,
        100% {
          opacity: 0.9;
          transform: scale(0.98);
        }
        50% {
          opacity: 1;
          transform: scale(1.02);
        }
      }

      .wait-stack {
        display: grid;
        gap: 12px;
      }

      .wait-note {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .wait-status-grid {
        display: grid;
        gap: 10px;
      }

      .wait-status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.72);
      }

      .wait-status strong {
        font-size: 15px;
      }

      .wait-status span {
        color: var(--muted);
        font-size: 13px;
      }

      .wait-status.is-done {
        border-color: rgba(184, 138, 50, 0.32);
        background: rgba(255, 250, 238, 0.92);
      }

      .wait-status.is-current {
        border-color: rgba(184, 68, 49, 0.24);
        background: rgba(248, 220, 210, 0.54);
      }

      .vote-grid,
      .final-grid,
      .winner-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .vote-card,
      .winner-card,
      .history-card {
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(118, 89, 63, 0.2);

      .vote-card,
      .winner-card {
        width: 100%;
        text-align: left;

      .vote-card.selected,
      .winner-card.selected {

      }

      .vote-card.disabled {
        opacity: 0.56;
      }

      .winner-card.disabled {
        opacity: 0.56;
        cursor: default;
      }

      .vote-label,
      .winner-label {

        color: var(--muted);
      }

      .vote-phrase,
      .winner-phrase,
      .result-phrase,
      .final-champion {
        margin-top: 8px;
        font-size: 34px;
        line-height: 1.02;
        word-break: keep-all;
        overflow-wrap: anywhere;
      }

      .vote-phrase.small,
      .winner-phrase.small {
        font-size: 28px;
      }

      .tally-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .tally-card {
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.68);
      }

      .tally-card strong {
        display: block;
        color: var(--green);
      }

      .tally-card span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .result-stage {
        margin-top: 14px;
        padding: 18px 16px;
        border-radius: 20px;
        border: 1px solid rgba(184, 146, 62, 0.42);
        background: linear-gradient(180deg, rgba(255, 249, 237, 0.98), rgba(248, 238, 210, 0.94));
        text-align: center;
      }

      .result-stage.is-champion {
        background:
          radial-gradient(circle at top, rgba(255, 244, 201, 0.78), transparent 32%),
          linear-gradient(180deg, rgba(255, 249, 237, 0.99), rgba(246, 232, 192, 0.96));
        box-shadow: inset 0 0 0 1px rgba(184, 146, 62, 0.24);
      }

      .result-stage small {
        color: var(--muted);
      }

      .result-stage strong {
        display: block;
        margin-top: 10px;
      }

      .result-owner {
        margin-top: 10px;
        color: var(--muted);
      }

      .history-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .history-card strong {
        display: block;
        color: var(--green);
      }

      .history-card span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.6;
      }

      .empty-note {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.6);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .history-overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(23, 18, 13, 0.36);
        z-index: 44;
      }

      .history-overlay-card {
        width: min(calc(100vw - 36px), 360px);
        max-height: min(calc(100vh - 48px), 720px);
        overflow: auto;
        padding: 16px;
        border-radius: 24px;
        border: 3px solid rgba(36, 69, 47, 0.92);
        background: linear-gradient(180deg, rgba(255, 255, 253, 0.99), rgba(246, 239, 224, 0.99));
        box-shadow:
          0 0 0 4px rgba(184, 146, 62, 0.32),
          0 22px 40px rgba(29, 22, 15, 0.2);
      }

      .history-overlay-card h3 {
        margin: 0;
        color: var(--green);
        font-size: 20px;
      }

      .history-overlay-list {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .seat-note {
        display: inline-flex;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(184, 138, 50, 0.12);
        color: var(--gold);
        font-size: 12px;
      }

      .round-note {
        display: inline-flex;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(36, 69, 47, 0.08);
        color: var(--green);

      }

      @media (max-width: 1040px) {
        .phone-shell {
          justify-content: stretch;
        }
      }

      @media (max-width: 720px) {
        main {
          padding: 18px 14px 44px;
        }

        .phone {
          width: 100%;
          min-height: 0;
          border-radius: 28px;
        }

        .tiles {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .vote-phrase,
        .winner-phrase,
        .result-phrase,
        .final-champion {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="page-shell">
        <header class="page-header">
          <h1>おもじゃん</h1>
          <p>1試合を通して触れる簡易プロトタイプ</p>
        </header>
        <section class="phone-shell">
          <div class="phone">
            <div class="status">
              <span>フロー試作</span>
              <span id="statusText">ロビー</span>
            </div>
            <div class="topbar">
              <small id="topbarSmall"></small>
              <strong id="topbarTitle"></strong>
            </div>
            <section id="app"></section>
          </div>
        </section>
      </section>
    </main>

    <div id="measureWord" class="measure-word" aria-hidden="true"></div>

    <script>
      const gameHand = ["現場猫", "謝罪会見", "深夜テンション", "大反省", "ラーメン", "薄", "社長", "汁", "雲", "侍"];

      const recentChampions = [
        { phrase: "鍋社長", owner: "まつい" },
        { phrase: "爆ラーメン", owner: "さとう" },
        { phrase: "寝謝罪会見", owner: "みき" },
        { phrase: "汁ラッシュ", owner: "やまだ" },
        { phrase: "薄大反省", owner: "たなか" },
        { phrase: "雲テンション", owner: "もり" },
        { phrase: "社長ラーメン", owner: "あおき" }
      ];

      const players = [
        { id: "host", name: "やまだ", seat: "ホスト" },
        { id: "you", name: "あなた", seat: "参加中" },
        { id: "tanaka", name: "たなか", seat: "参加中" },
        { id: "miki", name: "みき", seat: "参加中" }
      ];

      const rounds = [
        {
          id: "round1",
          wind: "東一局",
          label: "ラウンド1",
          defaultSelected: [0, 1],
          defaultFont: "broadcast",
          defaultLineMode: "boundary",
          opponents: [
            { id: "host", owner: "やまだ", phrase: "爆ラーメン" },
            { id: "tanaka", owner: "たなか", phrase: "寝社長" },
            { id: "miki", owner: "みき", phrase: "汁侍" }
          ],
          otherVotes: ["you", "you", "you"],
          seedVoteId: "host"
        },
        {
          id: "round2",
          wind: "東二局",
          label: "ラウンド2",
          defaultSelected: [2, 3],
          defaultFont: "heavy",
          defaultLineMode: "single",
          opponents: [
            { id: "host", owner: "やまだ", phrase: "雲会見" },
            { id: "tanaka", owner: "たなか", phrase: "薄ラーメン" },
            { id: "miki", owner: "みき", phrase: "社長汁" }
          ],
          otherVotes: ["host", "tanaka", "tanaka"],
          otherRevotes: ["host", "tanaka", "tanaka"],
          seedVoteId: "tanaka",
          tieDemoVoteId: "host",
          tieDemoRevoteId: "host",
          hostChoice: "tanaka"
        },
        {
          id: "round3",
          wind: "東三局",
          label: "ラウンド3",
          defaultSelected: [5, 4],
          defaultFont: "round",
          defaultLineMode: "manual",
          defaultManualBreaks: [],
          opponents: [
            { id: "host", owner: "やまだ", phrase: "現場大洪水" },
            { id: "tanaka", owner: "たなか", phrase: "深夜侍" },
            { id: "miki", owner: "みき", phrase: "謝罪ラッシュ" }
          ],
          otherVotes: ["host", "host", "host"],
          seedVoteId: "host"
        }
      ];

      const finalVoteConfig = {
        otherVotes: ["round2", "round3", "round3"],
        otherRevotes: ["round2", "round3", "round3"],
        seedVoteId: "round3",
        tieDemoVoteId: "round2",
        tieDemoRevoteId: "round2",
        hostChoice: "round3"
      };

      const lineModes = [
        { id: "boundary", label: "ワードの境目で改行" },
        { id: "manual", label: "手動で改行" },
        { id: "single", label: "1行で固定" }
      ];

      const fonts = [
        { id: "classic", label: "勝負明朝", className: "font-classic" },
        { id: "broadcast", label: "実況ゴシック", className: "font-broadcast" },
        { id: "playful", label: "ゆるポップ", className: "font-playful" },
        { id: "heavy", label: "極太ゴシック", className: "font-heavy" },
        { id: "round", label: "丸ゴシック", className: "font-round" }
      ];

      function createRoundState(round) {
        return {
          selected: [...round.defaultSelected],
          lineMode: round.defaultLineMode || "boundary",
          manualBreaks: [...(round.defaultManualBreaks || [])],
          font: round.defaultFont || "broadcast",
          submission: null,
          voteId: null,
          revoteId: null,
          hostPickId: null,
          result: null
        };
      }

      const state = {
        screen: "lobby",
        roundIndex: 0,
        playerCount: 4,
        startPlayerId: "host",
        submitTurnIndex: 0,
        waitMode: "submit",
        historyOpen: false,
        popupOpen: false,
        popupTurning: false,
        popupTimer: 0,
        finalVoteId: null,
        finalRevoteId: null,
        finalHostPickId: null,
        finalResult: null,
        finalPopupOpen: false,
        finalPopupTurning: false,
        finalPopupTimer: 0,
        roundStates: rounds.map(createRoundState)
      };

      const els = {
        statusText: document.getElementById("statusText"),
        topbar: document.querySelector(".topbar"),
        topbarSmall: document.getElementById("topbarSmall"),
        topbarTitle: document.getElementById("topbarTitle"),
        app: document.getElementById("app"),
        measureWord: document.getElementById("measureWord")
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function getRoundState(index = state.roundIndex) {
        return state.roundStates[index];
      }

      function getActivePlayers() {
        return players.slice(0, state.playerCount);
      }

      function ensureActiveStartPlayer() {
        if (!getActivePlayers().some((player) => player.id === state.startPlayerId)) {
          state.startPlayerId = getActivePlayers()[0]?.id || players[0].id;
        }
      }

      function getRoundConfig(roundIndex = state.roundIndex) {
        const round = rounds[roundIndex];
        const activePlayers = getActivePlayers();
        const activeIds = new Set(activePlayers.map((player) => player.id));
        const maxOtherVotes = Math.max(activePlayers.length - 1, 0);
        const filterVotes = (voteIds = []) =>
          voteIds
            .filter((voteId) => voteId === "you" || activeIds.has(voteId))
            .slice(0, maxOtherVotes);

        const opponents = round.opponents.filter((entry) => activeIds.has(entry.id));
        const validOpponentIds = new Set(opponents.map((entry) => entry.id));
        const fallbackChoice = opponents[0]?.id || "you";

        return {
          ...round,
          opponents,
          otherVotes: filterVotes(round.otherVotes),
          otherRevotes: filterVotes(round.otherRevotes || round.otherVotes),
          seedVoteId: validOpponentIds.has(round.seedVoteId) || round.seedVoteId === "you" ? round.seedVoteId : fallbackChoice,
          tieDemoVoteId:
            validOpponentIds.has(round.tieDemoVoteId) || round.tieDemoVoteId === "you" ? round.tieDemoVoteId : fallbackChoice,
          tieDemoRevoteId:
            validOpponentIds.has(round.tieDemoRevoteId) || round.tieDemoRevoteId === "you" ? round.tieDemoRevoteId : fallbackChoice,
          hostChoice: validOpponentIds.has(round.hostChoice) || round.hostChoice === "you" ? round.hostChoice : fallbackChoice
        };
      }

      function getActiveFinalVoteConfig() {
        const maxOtherVotes = Math.max(getActivePlayers().length - 1, 0);
        return {
          ...finalVoteConfig,
          otherVotes: finalVoteConfig.otherVotes.slice(0, maxOtherVotes),
          otherRevotes: (finalVoteConfig.otherRevotes || finalVoteConfig.otherVotes).slice(0, maxOtherVotes)
        };
      }

      function getCurrentRound() {
        return getRoundConfig(state.roundIndex);
      }

      function getOrderedPlayers() {
        const activePlayers = getActivePlayers();
        const startIndex = activePlayers.findIndex((player) => player.id === state.startPlayerId);
        if (startIndex < 0) {
          return [...activePlayers];
        }
        return [...activePlayers.slice(startIndex), ...activePlayers.slice(0, startIndex)];
      }

      function getCurrentSubmitPlayer() {
        return getOrderedPlayers()[state.submitTurnIndex] || null;
      }

      function resetRoundFlow() {
        state.submitTurnIndex = 0;
        state.waitMode = "submit";
        state.screen = getCurrentSubmitPlayer()?.id === "you" ? "submit" : "wait";
      }

      function getFontClass(fontId) {
        return fonts.find((font) => font.id === fontId)?.className || "font-classic";
      }

      function getSelectedTiles(roundIndex = state.roundIndex) {
        return getRoundState(roundIndex).selected.map((index) => gameHand[index]).filter(Boolean);
      }

      function getCombinedText(roundIndex = state.roundIndex) {
        return getSelectedTiles(roundIndex).join("");
      }

      function getUsedTileIndexes(roundIndex = state.roundIndex) {
        return state.roundStates
          .slice(0, roundIndex)
          .flatMap((roundState) => roundState.submission?.selectedIndices || []);
      }

      function getAvailableTileIndexes(roundIndex = state.roundIndex) {
        const used = new Set(getUsedTileIndexes(roundIndex));
        return gameHand.map((_, index) => index).filter((index) => !used.has(index));
      }

      function canEditCurrentRound(roundIndex = state.roundIndex) {
        return state.screen === "submit" && !getRoundState(roundIndex).submission;
      }

      function prepareRoundDraft(roundIndex = state.roundIndex) {
        const draft = getRoundState(roundIndex);
        const available = getAvailableTileIndexes(roundIndex);
        draft.selected = draft.selected.filter((index) => available.includes(index));

        const fallbackOrder = [...rounds[roundIndex].defaultSelected, ...available];
        fallbackOrder.forEach((index) => {
          if (draft.selected.length < 2 && available.includes(index) && !draft.selected.includes(index)) {
            draft.selected.push(index);
          }
        });

        sanitizeManualBreaks(roundIndex);
      }

      function getBoundaryIndex(roundIndex = state.roundIndex) {
        const [first] = getSelectedTiles(roundIndex);
        return Array.from(first || "").length || 0;
      }

      function normalizeBreaks(breaks, length) {
        return [...new Set(breaks)]
          .filter((value) => Number.isInteger(value) && value > 0 && value < length)
          .sort((a, b) => a - b);
      }

      function sanitizeManualBreaks(roundIndex = state.roundIndex) {
        const draft = getRoundState(roundIndex);
        const chars = Array.from(getCombinedText(roundIndex));
        if (chars.length <= 1) {
          draft.manualBreaks = [];
          return;
        }
        draft.manualBreaks = normalizeBreaks(draft.manualBreaks, chars.length);
      }

      function applyWordMarkup(container, lines, fontClass, lineMode, fontSize) {
        if (!container) {
          return;
        }
        container.className =
          container.id === "measureWord" ? "measure-word" : container.id === "popupWord" ? "popup-word" : "preview-word";
        container.classList.add(fontClass);
        container.classList.toggle("is-single-line", lineMode === "single");
        container.innerHTML = lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("");
        container.style.fontSize = fontSize ? `${fontSize}px` : "";
      }

      function getSubmitSceneEls() {
        return {
          previewWord: document.getElementById("previewWord"),
          tileGrid: document.getElementById("tileGrid"),
          lineModeRow: document.getElementById("lineModeRow"),
          fontRow: document.getElementById("fontRow"),
          manualBreakPanel: document.getElementById("manualBreakPanel"),
          manualBreakLabel: document.getElementById("manualBreakLabel"),
          breakTrack: document.getElementById("breakTrack"),
          popupWord: document.getElementById("popupWord")
        };
      }

      function syncMeasureBounds() {
        const submitEls = getSubmitSceneEls();
        const previewWidth = submitEls.previewWord?.clientWidth || 320;
        const popupWidth = submitEls.popupWord?.clientWidth || 320;
        const previewHeight = submitEls.previewWord?.clientHeight || 140;
        const popupHeight = submitEls.popupWord?.clientHeight || 140;
        els.measureWord.style.width = `${Math.min(previewWidth, popupWidth)}px`;
        els.measureWord.style.height = `${Math.min(previewHeight, popupHeight)}px`;
      }

      function measureLineFits(text, fontClass, fontSize) {
        syncMeasureBounds();
        applyWordMarkup(els.measureWord, [text || " "], fontClass, "single", fontSize);
        const lineEl = els.measureWord.querySelector(".word-line");
        return lineEl ? lineEl.scrollWidth <= els.measureWord.clientWidth - 1 : true;
      }

      function measureFits(fontClass, lineMode, lines, fontSize) {
        syncMeasureBounds();
        applyWordMarkup(els.measureWord, lines, fontClass, lineMode, fontSize);
        const lineEls = Array.from(els.measureWord.querySelectorAll(".word-line"));
        const tooWide = lineEls.some((line) => line.scrollWidth > els.measureWord.clientWidth - 1);
        const tooTall = els.measureWord.scrollHeight > els.measureWord.clientHeight - 1;
        return !(tooWide || tooTall);
      }

      function getMinimumFontSize(charsLength, lineMode) {
        if (lineMode === "single") {
          if (charsLength >= 18) {
            return 16;
          }
          if (charsLength >= 14) {
            return 18;
          }
          if (charsLength >= 10) {
            return 20;
          }
          return 24;
        }
        if (charsLength >= 16) {
          return 28;
        }
        if (charsLength >= 12) {
          return 30;
        }
        return 34;
      }

      function getBreaksFromLines(lines) {
        const breaks = [];
        let cursor = 0;
        lines.forEach((line, index) => {
          cursor += Array.from(line).length;
          if (index < lines.length - 1) {
            breaks.push(cursor);
          }
        });
        return breaks;
      }

      function getLastFittingEnd(chars, start, endLimit, fontClass, fontSize) {
        let lastFit = start;
        for (let end = start + 1; end <= endLimit; end += 1) {
          const sample = chars.slice(start, end).join("");
          if (measureLineFits(sample, fontClass, fontSize)) {
            lastFit = end;
            continue;
          }
          break;
        }
        return lastFit > start ? lastFit : Math.min(start + 1, endLimit);
      }

      function splitForcedRange(chars, start, endLimit, fontClass, fontSize) {
        const lines = [];
        let cursor = start;
        while (cursor < endLimit) {
          const next = getLastFittingEnd(chars, cursor, endLimit, fontClass, fontSize);
          lines.push(chars.slice(cursor, next).join(""));
          cursor = next;
        }
        return lines;
      }

      function buildBoundaryLines(chars, fontClass, fontSize, roundIndex = state.roundIndex) {
        const boundary = getBoundaryIndex(roundIndex);
        const breaks = normalizeBreaks([boundary], chars.length);
        if (!breaks.length) {
          return splitForcedRange(chars, 0, chars.length, fontClass, fontSize);
        }
        const lines = [];
        let start = 0;
        [...breaks, chars.length].forEach((end) => {
          lines.push(...splitForcedRange(chars, start, end, fontClass, fontSize));
          start = end;
        });
        return lines.filter(Boolean);
      }

      function buildManualLines(chars, fontClass, fontSize, roundIndex = state.roundIndex) {
        const draft = getRoundState(roundIndex);
        sanitizeManualBreaks(roundIndex);
        const forcedBreaks = normalizeBreaks(draft.manualBreaks, chars.length);

        if (!forcedBreaks.length) {
          return splitForcedRange(chars, 0, chars.length, fontClass, fontSize).filter(Boolean);
        }

        const lines = [];
        let start = 0;
        let forcedIndex = 0;

        while (start < chars.length) {
          const forcedEnd = forcedBreaks[forcedIndex];
          if (forcedEnd) {
            const forcedText = chars.slice(start, forcedEnd).join("");
            if (measureLineFits(forcedText, fontClass, fontSize)) {
              lines.push(forcedText);
            } else {
              lines.push(...splitForcedRange(chars, start, forcedEnd, fontClass, fontSize));
            }
            start = forcedEnd;
            forcedIndex += 1;
            continue;
          }

          lines.push(...splitForcedRange(chars, start, chars.length, fontClass, fontSize));
          break;
        }

        return lines.filter(Boolean);
      }

      function buildLines(chars, fontClass, fontSize, roundIndex = state.roundIndex) {
        const draft = getRoundState(roundIndex);
        if (draft.lineMode === "single") {
          return [chars.join("")];
        }
        if (draft.lineMode === "manual") {
          return buildManualLines(chars, fontClass, fontSize, roundIndex);
        }
        return buildBoundaryLines(chars, fontClass, fontSize, roundIndex);
      }

      function computeWordLayout(roundIndex = state.roundIndex) {
        const draft = getRoundState(roundIndex);
        const text = getCombinedText(roundIndex);
        if (!text) {
          return { lines: ["牌を2つ選ぶ"], fontSize: 34, effectiveBreaks: [], safetyAdjusted: false };
        }

        const chars = Array.from(text);
        const fontClass = getFontClass(draft.font);
        const maxFontSize = draft.lineMode === "single" ? 72 : 60;
        const minFontSize = getMinimumFontSize(chars.length, draft.lineMode);
        let fontSize = maxFontSize;
        let fallbackLayout = null;

        while (fontSize >= minFontSize) {
          const lines = buildLines(chars, fontClass, fontSize, roundIndex);
          const effectiveBreaks = getBreaksFromLines(lines);
          const safetyAdjusted =
            fontSize < maxFontSize ||
            (draft.lineMode === "manual" &&
              effectiveBreaks.some((point) => !normalizeBreaks(draft.manualBreaks, chars.length).includes(point))) ||
            (draft.lineMode === "boundary" &&
              effectiveBreaks.some((point) => point !== getBoundaryIndex(roundIndex)));

          if (measureFits(fontClass, draft.lineMode, lines, fontSize)) {
            return { lines, fontSize, effectiveBreaks, safetyAdjusted };
          }

          fallbackLayout = { lines, fontSize, effectiveBreaks, safetyAdjusted: true };
          fontSize -= 1;
        }

        return (
          fallbackLayout || {
            lines: buildLines(chars, fontClass, minFontSize, roundIndex),
            fontSize: minFontSize,
            effectiveBreaks: getBreaksFromLines(buildLines(chars, fontClass, minFontSize, roundIndex)),
            safetyAdjusted: true
          }
        );
      }

      function getLiveSubmission(roundIndex = state.roundIndex) {
        const draft = getRoundState(roundIndex);
        const layout = computeWordLayout(roundIndex);
        return {
          id: "you",
          owner: "あなた",
          phrase: getCombinedText(roundIndex),
          lines: layout.lines,
          selectedIndices: [...draft.selected],
          font: draft.font,
          lineMode: draft.lineMode,
          effectiveBreaks: layout.effectiveBreaks,
          safetyAdjusted: layout.safetyAdjusted
        };
      }

      function getRoundEntries(roundIndex = state.roundIndex) {
        const round = getRoundConfig(roundIndex);
        const draft = getRoundState(roundIndex);
        const userEntry = draft.submission || getLiveSubmission(roundIndex);
        return [
          userEntry,
          ...round.opponents.map((entry) => ({
            ...entry,
            lines: [entry.phrase],
            font: "classic"
          }))
        ];
      }

      function getFallbackLines(roundIndex) {
        const draft = getRoundState(roundIndex);
        const chars = Array.from(getCombinedText(roundIndex));
        if (!chars.length) {
          return ["牌を2つ選ぶ"];
        }
        if (draft.lineMode === "single") {
          return [chars.join("")];
        }
        if (draft.lineMode === "manual") {
          const breaks = normalizeBreaks(draft.manualBreaks, chars.length);
          if (!breaks.length) {
            return [chars.join("")];
          }
          const points = [0, ...breaks, chars.length];
          return points.slice(0, -1).map((point, index) => chars.slice(point, points[index + 1]).join(""));
        }
        const boundary = getBoundaryIndex(roundIndex);
        if (boundary > 0 && boundary < chars.length) {
          return [chars.slice(0, boundary).join(""), chars.slice(boundary).join("")];
        }
        return [chars.join("")];
      }

      function buildFallbackSubmission(roundIndex) {
        const draft = getRoundState(roundIndex);
        return {
          id: "you",
          owner: "あなた",
          phrase: getCombinedText(roundIndex),
          lines: getFallbackLines(roundIndex),
          selectedIndices: [...draft.selected],
          font: draft.font,
          lineMode: draft.lineMode,
          effectiveBreaks:
            draft.lineMode === "manual"
              ? normalizeBreaks(draft.manualBreaks, Array.from(getCombinedText(roundIndex)).length)
              : [],
          safetyAdjusted: false
        };
      }

      function renderPhraseLines(lines, fontId = "classic", className = "") {
        const fontClass = getFontClass(fontId);
        return `<div class="${className} ${fontClass}">${lines

      function renderTieCountList(counts, mode = "owner") {
        return counts
          .map(
            (item) => `

                <span>${

      function buildVoteOutcome(entries, votes) {
        const counts = entries.map((entry, index) => ({
          id: entry.id,
          entry,
          count: votes.filter((voteId) => voteId === entry.id).length,
          index
        }));

        counts.sort((a, b) => b.count - a.count || a.index - b.index);

        const voteCount = counts[0]?.count || 0;
        const tied = counts.filter((item) => item.count === voteCount);

        return {
          counts,
          voteCount,
          tieIds: tied.map((item) => item.id),
          isTie: tied.length > 1,
          winner: tied.length === 1 ? tied[0].entry : null
        };
      }
