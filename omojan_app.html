          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/proceed`, {});
            setRoom(payload.data.room);
          });
        },
        "submit-final-vote": async () => {
          await runAction(async () => {
            const endpoint = state.room.game.phase === "final_revote" ? "final-revote" : "final-vote";
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/${endpoint}`, {
              candidateId: state.selectedFinalTarget
            });
            state.decisionEditPhase = "";
            state.selectedFinalTarget = "";
            setRoom(payload.data.room);
          });
        },
        "submit-final-host-pick": async () => {
          await runAction(async () => {
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/final-host-decision`, {
              candidateId: state.selectedFinalTarget
            });
            state.selectedFinalTarget = "";
            setRoom(payload.data.room);
          });
        },
        "restart-game": async () => {
          await runAction(async () => {
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/restart`, {});
            clearDecisionState();
            setRoom(payload.data.room, { skipReveal: true });
          });
        }
      };

      document.addEventListener("input", (event) => {
        const field = event.target.closest("[data-field]");
        if (!field) {
          return;
        }
        updateFieldState(field.dataset.field, field.value);
      });

      document.addEventListener("click", async (event) => {
        for (const { selector, handle } of selectionClickHandlers) {
          const matched = event.target.closest(selector);
          if (matched) {
            handle(matched);
            return;
          }
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) {
          return;
        }
        const actionHandler = actionHandlers[actionButton.dataset.action];
        if (actionHandler) {
          await actionHandler(actionButton);
        }
      });

      document.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse") {
          return;
        }
        if (event.button !== undefined && event.button !== 0) {
          return;
        }
        if (!canStartLobbyDrag(event.target)) {
          return;
        }
        const card = event.target.closest?.("[data-order-player-id]");
        if (!startLobbyDrag(card, event.pointerId, event.clientY)) {
          return;
        }
        card?.setPointerCapture?.(event.pointerId);
        event.preventDefault();
      });

      document.addEventListener("pointermove", (event) => {
        if (event.pointerType === "mouse") {
          return;
        }
        if (!state.draggingLobbyPlayerId || state.dragPointerId !== event.pointerId || deriveView() !== "lobby" || !state.room?.me?.isHost) {
          return;
        }
        moveLobbyDrag(event.clientY);
        event.preventDefault();
      });

      document.addEventListener("pointerup", async (event) => {
        if (event.pointerType === "mouse") {
          return;
        }
        if (!state.draggingLobbyPlayerId || state.dragPointerId !== event.pointerId || deriveView() !== "lobby" || !state.room?.me?.isHost) {
          return;
        }
        await finishLobbyDrag(event.clientY);
      });

      document.addEventListener("pointercancel", (event) => {
        if (state.dragPointerId && state.dragPointerId !== event.pointerId) {
          return;
        }
        clearLobbyDragUi();
      });

      document.addEventListener("mousedown", (event) => {
        if (event.button !== 0) {
          return;
        }
        if (!canStartLobbyDrag(event.target)) {
          return;
        }
        const card = event.target.closest?.("[data-order-player-id]");
        if (!startLobbyDrag(card, -1, event.clientY)) {
          return;
        }
        event.preventDefault();
      });

      document.addEventListener("mousemove", (event) => {
        if (state.dragPointerId !== -1) {
          return;
        }
        moveLobbyDrag(event.clientY);
      });

      document.addEventListener("mouseup", async (event) => {
        if (state.dragPointerId !== -1) {
          return;
        }
        await finishLobbyDrag(event.clientY);
      });

      els.closeRevealBtn.addEventListener("click", () => {
        actionHandlers["close-reveal"]();
      });

      els.closeRevealBtn.addEventListener("pointerup", (event) => {
        event.preventDefault();
        actionHandlers["close-reveal"]();
      });

      els.revealOverlay.addEventListener("click", (event) => {
        if (event.target === els.revealOverlay) {
          actionHandlers["close-reveal"]();
        }
      });

      els.closeHistoryBtn.addEventListener("click", () => {
        actionHandlers["close-champion-history"]();
      });

      els.historyOverlay.addEventListener("click", (event) => {
        if (event.target === els.historyOverlay) {
          actionHandlers["close-champion-history"]();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !state.championHistoryOpen && getActiveReveal()) {
          actionHandlers["close-reveal"]();
          return;
        }
        if (event.key === "Escape" && state.championHistoryOpen) {
          actionHandlers["close-champion-history"]();
        }
      });

      window.addEventListener("scroll", () => {
        syncSubmitPreviewFloating();
      }, { passive: true });

      document.addEventListener("touchmove", () => {
        syncSubmitPreviewFloating();
      }, { passive: true });

      window.addEventListener("resize", () => {
        renderCurrentView({ includeReveal: false });
        window.requestAnimationFrame(() => syncSubmitPreviewFloating());
      });

      window.visualViewport?.addEventListener("resize", () => {
        window.requestAnimationFrame(() => syncSubmitPreviewFloating());
      });

      window.visualViewport?.addEventListener("scroll", () => {
        window.requestAnimationFrame(() => syncSubmitPreviewFloating());
      });

      async function initializeApp() {
        const params = new URLSearchParams(window.location.search);
        const apiBaseUrl = params.get("apiBaseUrl");
        const invite = params.get("invite");
        state.apiBaseUrl = apiBaseUrl ? apiBaseUrl.replace(/\/$/, "") : resolveDefaultApiBaseUrl();
        state.deviceId = getOrCreateDeviceId();
        const storedDisplayName = getStoredDisplayName();
        if (storedDisplayName) {
          state.createDisplayName = storedDisplayName;
          state.joinDisplayName = storedDisplayName;
        }
        if (invite) {
          state.inviteCode = normalizeInviteCodeInput(invite);
          state.inviteEntryMode = true;
        }

        ensureApiNetworkHints();
        warmApiConnection();
        ensureFontsReady([...REMOTE_FONT_IDS]).catch(() => {});

        state.isLoading = Boolean(invite);
        render({ immediate: true });

        const championsTask = Promise.all([loadRecentChampions(), loadChampionRanking(10)])
          .then(() => {
            renderCurrentView({ includeReveal: false });
          })
          .catch(() => {});

        try {
          const restored = await restoreSession();
          if (restored) {
            state.isLoading = false;
            render({ immediate: true });
          } else if (invite) {
            state.isLoading = false;
            state.inviteEntryMode = true;
            render({ immediate: true });
          } else {
            state.isLoading = false;
            render({ immediate: true });
          }
        } catch (error) {
          exitToWelcome({
            errorMessage: describeAppError(error, "restore"),
            preserveInviteCode: false
          });
          state.isLoading = false;
          render({ immediate: true });
        }

        await championsTask;
      }

      document.addEventListener("visibilitychange", async () => {
        clearPollTimer();
        if (document.visibilityState === "visible" && shouldPoll() && !state.pendingAction) {
          try {
            const changed = await refreshRoom();
            if (changed) {
              render();
              return;
            }
          } catch (error) {
            if (!recoverLostSession(error, "refresh")) {
              setBackgroundSyncIssue(error);
            }
          }
          renderPassiveSyncUi();
          schedulePoll();
          return;
        }
        schedulePoll();
      });

      function flushRender() {
        if (state.isLoading && !state.room) {
          setBanner();
          const loadingKey = "loading";
          if (state.renderCache.loadingKey !== loadingKey) {
            state.renderCache.loadingKey = loadingKey;
            state.renderCache.appKey = "";
          els.app.innerHTML = `<div class="card"><h2>読み込み中</h2><p>ルーム情報と最近の優勝ワードを確認しています。</p></div>`;
          }
          renderReveal();
          renderChampionHistoryOverlay();
          return;
        }

        state.renderCache.loadingKey = "";
        renderApp();
        renderReveal();
        renderChampionHistoryOverlay();
      }

      function render(options = {}) {
        if (options.immediate) {
          if (state.renderFrame) {
            window.cancelAnimationFrame(state.renderFrame);
            state.renderFrame = 0;
          }
          flushRender();
          return;
        }

        if (state.renderFrame) {
          return;
        }

        state.renderFrame = window.requestAnimationFrame(() => {
          state.renderFrame = 0;
          flushRender();
        });
      }

      initializeApp();
    </script>
  </body>
</html>
