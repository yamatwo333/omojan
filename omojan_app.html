<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おもじゃん</title>
    <style>
      :root {
        --paper: #f6efdb;
        --paper-bright: #fff7e8;
        --paper-deep: #ead8a9;
        --paper-shadow: #dbc490;
        --ink: #1f1812;
        --ink-soft: #3a2b1d;
        --green: #23442f;
        --green-deep: #173120;
        --green-soft: rgba(36, 69, 47, 0.08);
        --gold: #b28a32;
        --gold-bright: #ddb75f;
        --gold-soft: rgba(178, 138, 50, 0.12);
        --red: #b84431;
        --red-deep: #932c1c;
        --red-soft: rgba(184, 68, 49, 0.12);
        --line: rgba(118, 89, 63, 0.2);
        --line-strong: rgba(106, 78, 47, 0.34);
        --muted: #6f6255;
        --shadow: 0 24px 42px rgba(29, 22, 15, 0.16);
        --shadow-soft: 0 16px 30px rgba(36, 24, 14, 0.09);
        --shadow-deep: 0 36px 70px rgba(26, 18, 10, 0.22);
        --frame-glow: 0 0 0 1px rgba(255, 251, 238, 0.46), 0 0 34px rgba(220, 183, 95, 0.08);
        --mahjong-face:
          linear-gradient(180deg, rgba(255, 253, 246, 0.98), rgba(248, 240, 218, 0.94)),
          #fff8ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.82), transparent 28%),
          radial-gradient(circle at left 18%, rgba(255, 214, 122, 0.17), transparent 28%),
          radial-gradient(circle at right 14%, rgba(39, 79, 53, 0.08), transparent 24%),
          repeating-linear-gradient(
            -35deg,
            rgba(102, 86, 58, 0.04) 0,
            rgba(102, 86, 58, 0.04) 2px,
            transparent 2px,
            transparent 15px
          ),
          linear-gradient(180deg, #fbf5e8, #ecdfb7 64%, #e3d2a3);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        top: -90px;
        left: -110px;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 235, 173, 0.28), rgba(255, 235, 173, 0));
      }

      body::after {
        right: -120px;
        bottom: -120px;
        width: 360px;
        height: 360px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(31, 78, 54, 0.12), rgba(31, 78, 54, 0));
      }

      main {
        position: relative;
        width: min(100%, 1440px);
        margin: 0 auto;
        padding: 18px 16px 56px;
        z-index: 1;
      }

      .page-header {
        width: min(100%, 880px);
        margin: 0 auto 24px;
        text-align: center;
        padding-top: 18px;
      }

      .page-header.is-hidden {
        display: none;
      }

      .page-header h1 {
        margin: 0;
        color: var(--green);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-size: clamp(36px, 8vw, 56px);
        letter-spacing: 0.08em;
        text-shadow: 0 6px 18px rgba(33, 63, 43, 0.08);
      }

      .page-header::after {
        content: "";
        display: block;
        width: 112px;
        height: 8px;
        margin: 14px auto 0;
        border-radius: 999px;
        background:
          linear-gradient(90deg, rgba(178, 138, 50, 0), rgba(178, 138, 50, 0.9), rgba(178, 138, 50, 0));
        box-shadow: 0 8px 20px rgba(178, 138, 50, 0.12);
      }

      .phone-shell {
        display: block;
        padding-top: 0;
      }

      .phone {
        position: relative;
        isolation: isolate;
        overflow: visible;
        width: 100%;
        min-height: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .status-row {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 12px;
        color: var(--green);
        font-size: 12px;
        min-height: 40px;
        margin-bottom: 14px;
        position: relative;
        z-index: 4;
      }

      .status-row.is-hidden {
        display: none;
      }

      .status-context {
        display: none;
      }

      .status-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 4px 4px 10px;
        border-radius: 999px;
        background: rgba(255, 252, 243, 0.92);
        border: 1px solid rgba(178, 138, 50, 0.2);
        box-shadow: 0 10px 18px rgba(31, 24, 18, 0.05);
      }

      .status-actions strong {
        color: var(--green-deep);
        letter-spacing: 0.03em;
      }

      .mini-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 15px;
        border-radius: 15px;
        border: 2px solid rgba(23, 63, 44, 0.5);
        background: linear-gradient(180deg, #2f744f, #173f2c 88%);
        color: #fff8ef;
        font-size: 12px;
        font-weight: 800;
        box-shadow:
          0 16px 24px rgba(24, 47, 34, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      button,
      .btn,
      .mini-btn,
      .chip,
      .tile,
      .action-card {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
        user-select: none;
      }

      .card,
      .panel,
      .history-card,
      .player-card,
      .action-card,
      .preview-card,
      .result-stage,
      .champion-stage {
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.88), rgba(255, 249, 238, 0.8)),
          rgba(255, 255, 255, 0.72);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.86),
          var(--shadow-soft);
      }

      .card,
      .panel {
        position: relative;
        overflow: hidden;
        margin-top: 14px;
        padding: 20px;
        border-radius: 24px;
      }

      .card::before,
      .panel::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        pointer-events: none;
      }

      .card::after,
      .panel::after {
        content: "";
        position: absolute;
        top: -70px;
        right: -56px;
        width: 170px;
        height: 170px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 231, 162, 0.18), rgba(255, 231, 162, 0));
        pointer-events: none;
      }

      .card h2 {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
        color: var(--green);
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 0.03em;
      }

      .panel h3 {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        color: var(--green);
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .card h2::before {
        content: "";
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: linear-gradient(180deg, #e0bc66, #b98b2f);
        box-shadow: 0 0 0 4px rgba(224, 188, 102, 0.14);
      }

      .panel h3::before {
        content: "";
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: linear-gradient(180deg, #d8b45a, #a67f2b);
        box-shadow: 0 0 0 3px rgba(224, 188, 102, 0.1);
      }

      .card h2::after {
        content: "";
        flex: 1 1 auto;
        height: 1px;
        margin-left: 6px;
        background: linear-gradient(90deg, rgba(185, 139, 47, 0.4), rgba(185, 139, 47, 0));
      }

      .panel h3::after {
        content: "";
        flex: 1 1 auto;
        height: 1px;
        margin-left: 6px;
        background: linear-gradient(90deg, rgba(185, 139, 47, 0.24), rgba(185, 139, 47, 0));
      }

      .card p,
      .panel p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .field-stack,
      .player-list,
      .history-list,
      .action-grid,
      .vote-grid {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .card-stack {
        display: grid;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label,
      .section-label {
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
      }

      .input {
        width: 100%;
        min-height: 48px;
        padding: 0 14px;
        border-radius: 16px;
        border: 1px solid rgba(118, 89, 63, 0.22);
        background: rgba(255, 252, 245, 0.98);
        color: var(--ink);
        font: inherit;
      }

      .input:focus {
        outline: 2px solid rgba(184, 138, 50, 0.36);
        outline-offset: 2px;
      }

      .chip-row,
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .button-row.align-left {
        justify-content: flex-start;
      }

      .button-row.align-right {
        justify-content: flex-end;
      }

      .screen-grid,
      .screen-primary,
      .screen-secondary,
      .screen-column,
      .screen-wide {
        display: grid;
        gap: 14px;
        align-content: start;
        min-width: 0;
      }

      .screen-grid {
        gap: 16px;
      }

      .screen-grid > *,
      .screen-primary > *,
      .screen-secondary > *,
      .screen-column > *,
      .decision-layout > *,
      .decision-layout-main > *,
      .decision-layout-cards > *,
      .result-layout > *,
      .result-layout-main > *,
      .result-layout-side > * {
        min-width: 0;
      }

      .button-row.split-actions {
        justify-content: space-between;
        align-items: center;
      }

      .button-row.split-actions .btn.primary {
        margin-left: auto;
      }

      .button-stack {
        display: grid;
        gap: 10px;
        margin-top: 12px;
        justify-items: flex-start;
      }

      .button-stack.align-right {
        justify-items: flex-end;
      }

      .screen-grid--wait.is-complete .screen-secondary {
        max-width: min(100%, 960px);
      }

      .chip-row.compact {
        margin-top: 0;
      }

      .chip-row.compact .chip {
        min-height: 32px;
        padding: 0 10px;
        font-size: 11px;
      }

      .chip,
      .break-dot,
      .tile,
      .action-card {
        appearance: none;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.8);
        color: var(--ink);
      }

      .chip {
        min-height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        box-shadow:
          0 8px 14px rgba(31, 24, 18, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .chip.active {
        border-color: rgba(184, 68, 49, 0.4);
        background: linear-gradient(180deg, rgba(255, 238, 231, 0.98), rgba(247, 209, 193, 0.96));
        color: #8d2d1d;
        box-shadow:
          0 12px 22px rgba(184, 68, 49, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.84);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 18px;
        border: 2px solid transparent;
        border-radius: 16px;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.02em;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          filter 160ms ease,
          background 200ms ease,
          border-color 160ms ease;
        box-shadow: 0 14px 26px rgba(31, 24, 18, 0.12);
      }

      .btn.primary {
        background: linear-gradient(180deg, #db6f50, #af2f1b 88%);
        color: #fff7ef;
        border-color: rgba(127, 29, 18, 0.42);
        box-shadow:
          0 18px 30px rgba(176, 59, 40, 0.28),
          inset 0 1px 0 rgba(255, 240, 235, 0.34);
      }

      .btn.subtle,
      .btn.secondary {
        border-color: rgba(23, 63, 44, 0.44);
        background: linear-gradient(180deg, #2f744f, #173f2c 88%);
        color: #fff8ef;
        box-shadow:
          0 16px 26px rgba(24, 47, 34, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      .btn.neutral {
        border-color: rgba(184, 138, 50, 0.34);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 238, 210, 0.95));
        color: var(--green-deep);
        box-shadow:
          0 14px 24px rgba(31, 24, 18, 0.09),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .btn.danger {
        border-color: rgba(123, 93, 44, 0.34);
        background: linear-gradient(180deg, rgba(255, 253, 246, 0.98), rgba(242, 230, 198, 0.95));
        color: #51401e;
        box-shadow:
          0 14px 24px rgba(62, 45, 20, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .btn.ghost {
        border-color: rgba(142, 118, 67, 0.26);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 242, 227, 0.92));
        color: #5f4c25;
        box-shadow:
          0 8px 16px rgba(62, 45, 20, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.88);
      }

      .btn.compact {
        min-height: 44px;
        padding: 0 14px;
        font-size: 13px;
      }

      .btn:not(:disabled):active,
      .mini-btn:not(:disabled):active,
      .chip:not(:disabled):active,
      .tile:not(:disabled):active,
      .action-card:not(:disabled):active {
        transform: translateY(1px) scale(0.99);
      }

      .btn:disabled,
      .chip:disabled,
      .tile:disabled,
      .action-card:disabled {
        opacity: 0.42;
      }

      .room-code {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 10px;
        background: rgba(251, 247, 236, 0.74);
        border: 1px dashed rgba(184, 138, 50, 0.18);
        color: #7a694c;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        box-shadow: none;
      }

      .player-card,
      .history-card {
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 13px 14px;
        border-radius: 18px;
        backdrop-filter: blur(10px);
      }

      .player-card::after,
      .history-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0));
        pointer-events: none;
      }

      .player-card strong,
      .history-card strong {
        display: block;
      }

      .history-card-main {
        display: grid;
        gap: 4px;
      }

      .history-card-side {
        display: grid;
        justify-items: end;
        gap: 8px;
      }

      .player-card span,
      .history-card span,
      .muted {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .like-btn {
        min-width: 90px;
        justify-content: center;
        border-color: rgba(168, 143, 92, 0.28);
        background: linear-gradient(180deg, rgba(255, 254, 248, 0.98), rgba(247, 239, 218, 0.94));
        color: #715536;
        box-shadow:
          0 12px 18px rgba(92, 67, 35, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.88);
      }

      .like-btn.is-liked {
        border-color: rgba(190, 73, 58, 0.28);
        color: #8f2f25;
        background: linear-gradient(180deg, rgba(255, 244, 240, 0.98), rgba(255, 228, 220, 0.94));
        box-shadow:
          0 12px 18px rgba(184, 68, 49, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .like-btn.is-pending {
        filter: saturate(0.94);
      }

      .player-role-actions,
      .player-admin-actions,
      .player-card-side {
        min-width: 0;
      }

      .player-section {
        display: grid;
        gap: 10px;
      }

      .player-section + .player-section {
        margin-top: 2px;
        padding-top: 12px;
        border-top: 1px solid rgba(184, 138, 50, 0.14);
      }

      .player-section-label {
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .player-section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .player-section-note {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .player-card-main {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .player-card-heading {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
      }

      .player-card--order {
        cursor: grab;
        touch-action: none;
        user-select: none;
      }

      .player-card--order:active {
        cursor: grabbing;
      }

      .player-card--order.is-ordering::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px dashed rgba(184, 138, 50, 0.22);
        pointer-events: none;
      }

      .order-grab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        min-width: 34px;
        min-height: 40px;
        padding: 0 8px;
        border-radius: 14px;
        border: 1px dashed rgba(184, 138, 50, 0.28);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(249, 242, 223, 0.9));
        cursor: grab;
        touch-action: none;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.86),
          0 10px 16px rgba(45, 31, 14, 0.06);
      }

      .order-grab:active {
        cursor: grabbing;
      }

      .order-tool {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        min-height: 28px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.2);
        background: rgba(255, 252, 245, 0.92);
        color: #5f4c25;
        font-size: 12px;
        font-weight: 900;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84);
      }

      .order-tool:disabled {
        opacity: 0.32;
        cursor: default;
      }

      .order-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.2);
        background: rgba(255, 249, 232, 0.96);
        color: #735d31;
        font-size: 11px;
        font-weight: 900;
        white-space: nowrap;
      }

      .order-badge.is-you {
        border-color: rgba(63, 122, 93, 0.24);
        background: linear-gradient(180deg, rgba(234, 248, 240, 0.98), rgba(205, 232, 217, 0.96));
        color: #24553d;
      }

      .order-badge--spectator {
        border-color: rgba(112, 119, 132, 0.22);
        background: rgba(242, 243, 246, 0.96);
        color: #646a75;
      }

      .badge--you {
        background: linear-gradient(180deg, rgba(246, 249, 255, 0.98), rgba(223, 234, 251, 0.95));
        border-color: rgba(92, 126, 183, 0.2);
        color: #33517d;
      }

      .badge--seat {
        background: linear-gradient(180deg, rgba(245, 251, 247, 0.98), rgba(227, 240, 232, 0.94));
        border-color: rgba(35, 87, 60, 0.16);
        color: #2d6347;
      }

      .player-card--order.is-ordering {
        transition:
          transform 150ms ease,
          box-shadow 150ms ease,
          border-color 150ms ease;
      }

      .player-card--order.is-ordering:not(.is-dragging) {
        cursor: grab;
      }

      .player-card--order.is-ordering:not(.is-dragging):hover {
        transform: translateY(-1px);
        border-color: rgba(184, 138, 50, 0.28);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.86),
          0 16px 26px rgba(31, 24, 18, 0.1);
      }

      .player-card--order.is-dragging {
        opacity: 0.96;
        transition: none;
        transform: translate3d(0, var(--drag-offset-y, 0px), 0) scale(1.035) rotate(0.35deg);
        border-color: rgba(184, 68, 49, 0.32);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.88),
          0 28px 42px rgba(31, 24, 18, 0.22);
        pointer-events: none;
        z-index: 18;
      }

      .player-card--order.is-drop-target {
        border-color: rgba(35, 87, 60, 0.34);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.86),
          0 0 0 2px rgba(62, 142, 97, 0.14),
          0 16px 26px rgba(24, 47, 34, 0.1);
      }

      .player-card--spectator {
        background:
          linear-gradient(180deg, rgba(252, 252, 252, 0.9), rgba(243, 244, 246, 0.84)),
          rgba(255, 255, 255, 0.72);
      }

      .player-card--me {
        border-color: rgba(35, 68, 47, 0.28);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.88),
          0 16px 26px rgba(24, 47, 34, 0.1);
      }

      .player-card--me .order-badge {
        border-color: rgba(35, 68, 47, 0.28);
        background: linear-gradient(180deg, rgba(236, 248, 239, 0.98), rgba(214, 236, 221, 0.94));
        color: #29573d;
      }

      .lobby-control-row {
        align-items: center;
      }

    <script>
      const LOCAL_API_BASE_URL = "http://127.0.0.1:8788/v1";
      const PUBLIC_DEV_API_BASE_URL = "https://nglzfg3co5.execute-api.ap-northeast-1.amazonaws.com/dev/v1";
      const FIXTURE_CHAMPIONS_URL = "./mock_api/champions_recent.json";
      const APP_ACTIVE_ROOM_ID_KEY = "omojan-app-active-room-id";
      const APP_SESSION_MAP_KEY = "omojan-app-sessions";
      const APP_ROOM_ID_KEY = "omojan-app-room-id";
      const APP_PLAYER_TOKEN_KEY = "omojan-app-player-token";
      const APP_DEVICE_ID_KEY = "omojan-app-device-id";
      const APP_LAST_DISPLAY_NAME_KEY = "omojan-app-last-display-name";
      const DEFAULT_INVITE_CODE_PREFIX = "OMO-";
      const GOOGLE_FONTS_HREF = "https://fonts.googleapis.com/css2?family=DotGothic16&family=Rampart+One&family=Yusei+Magic&display=swap";
      const REMOTE_FONT_IDS = new Set(["magic", "rampart", "dot"]);

        magic: '700 20px "Yusei Magic"',

      const POLL_INTERVALS_MS = {

      };

      const fonts = [

      const state = {

          landingShellKey: "",
          landingCreateKey: "",

          lobbyRoomKey: "",

          lobbyRecentKey: "",

          submitShellKey: "",

        },

        }
      };

      class AppError extends Error {
        constructor(message, options = {}) {
          super(message);
          this.name = "AppError";
          this.code = options.code || "";
          this.retryable = Boolean(options.retryable);
          this.statusCode = Number(options.statusCode || 0);
          this.cause = options.cause;
        }
      }

      const els = {
        pageHeader: document.querySelector(".page-header"),
        statusRow: document.querySelector(".status-row"),
        statusContext: document.getElementById("statusContext"),
        statusLabel: document.getElementById("statusLabel"),
        refreshTopBtn: document.getElementById("refreshTopBtn"),
        feedbackDock: document.getElementById("feedbackDock"),
        app: document.getElementById("app"),
        revealOverlay: document.getElementById("revealOverlay"),
        revealCard: document.getElementById("revealCard"),
        revealBadge: document.getElementById("revealBadge"),
        revealWord: document.getElementById("revealWord"),
