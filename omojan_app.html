          const tileId = tileButton.dataset.tileId;
          const room = state.room;
          const tile = room?.myHand.find((item) => item.tileId === tileId);
          if (!tile || tile.isUsed) {
            return;
          }
          if (state.draftSelectedTileIds.includes(tileId)) {
            state.draftSelectedTileIds = state.draftSelectedTileIds.filter((id) => id !== tileId);
          } else if (state.draftSelectedTileIds.length >= 2) {
            state.draftSelectedTileIds = [state.draftSelectedTileIds[1], tileId];
          } else {
            state.draftSelectedTileIds = [...state.draftSelectedTileIds, tileId];
          }
          sanitizeManualBreaks(room);
          render();
          return;
        }

        const lineModeButton = event.target.closest("[data-line-mode]");
        if (lineModeButton) {
          state.draftLineMode = lineModeButton.dataset.lineMode;
          sanitizeManualBreaks();
          render();
          return;
        }

        const fontButton = event.target.closest("[data-font-id]");
        if (fontButton) {
          state.draftFontId = fontButton.dataset.fontId;
          render();
          return;
        }

        const breakButton = event.target.closest("[data-break]");
        if (breakButton) {
          const point = Number(breakButton.dataset.break);
          if (state.draftManualBreaks.includes(point)) {
            state.draftManualBreaks = state.draftManualBreaks.filter((value) => value !== point);
          } else {
            state.draftManualBreaks = [...state.draftManualBreaks, point];
          }
          render();
          return;
        }

        const voteButton = event.target.closest("[data-vote-id]");
        if (voteButton) {
          state.selectedVoteTarget = voteButton.dataset.voteId;
          render();
          return;
        }

        const revoteButton = event.target.closest("[data-revote-id]");
        if (revoteButton) {
          state.selectedHostTarget = revoteButton.dataset.revoteId;
          render();
          return;
        }

        const hostPickButton = event.target.closest("[data-host-pick-id]");
        if (hostPickButton) {
          state.selectedHostTarget = hostPickButton.dataset.hostPickId;
          render();
          return;
        }

        const finalVoteButton = event.target.closest("[data-final-vote-id]");
        if (finalVoteButton) {
          state.selectedFinalTarget = finalVoteButton.dataset.finalVoteId;
          render();
          return;
        }

        const finalPickButton = event.target.closest("[data-final-pick-id]");
        if (finalPickButton) {
          state.selectedFinalTarget = finalPickButton.dataset.finalPickId;
          render();
          return;
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) {
          return;
        }

        if (actionButton.dataset.action === "create-room") {
          await runAction(async () => {
            const payload = await fetchJson(`${state.apiBaseUrl}/rooms`, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                displayName: validateDisplayName(state.createDisplayName),
                playerCount: state.playerCount
              })
            });
            setRoom(payload.data.room, { playerToken: payload.data.playerToken, skipReveal: true });
          });
          return;
        }

        if (actionButton.dataset.action === "join-room") {
          await runAction(async () => {
            const payload = await fetchJson(`${state.apiBaseUrl}/rooms/join`, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                inviteCode: String(state.inviteCode || "").trim(),
                displayName: validateDisplayName(state.joinDisplayName)
              })
            });
            setRoom(payload.data.room, { playerToken: payload.data.playerToken, skipReveal: true });
          });
          return;
        }

        if (actionButton.dataset.action === "copy-invite-url") {
          if (state.room?.inviteCode) {
            await copyText(getInviteUrl(state.room.inviteCode), "招待URLをコピーしました。");
          }
          return;
        }

        if (actionButton.dataset.action === "start-game") {
          await runAction(async () => {
            let payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/start-player`, {
              startPlayerId: state.selectedStartPlayerId
            });
            setRoom(payload.data.room);
            payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/start`, { deckId: "default" });
            state.selectedVoteTarget = "";
            state.selectedHostTarget = "";
            state.selectedFinalTarget = "";
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "swap-selection") {
          if (state.draftSelectedTileIds.length === 2) {
            state.draftSelectedTileIds = [state.draftSelectedTileIds[1], state.draftSelectedTileIds[0]];
            sanitizeManualBreaks();
            render();
          }
          return;
        }

        if (actionButton.dataset.action === "clear-selection") {
          state.draftSelectedTileIds = [];
          state.draftManualBreaks = [];
          render();
          return;
        }

        if (actionButton.dataset.action === "submit-word") {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/submit`, buildSubmitPayload(room));
            state.selectedVoteTarget = "";
            state.selectedHostTarget = "";
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "submit-vote") {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/vote`, {
              targetPlayerId: state.selectedVoteTarget
            });
            state.selectedVoteTarget = "";
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "submit-revote") {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/revote`, {
              targetPlayerId: state.selectedHostTarget
            });
            state.selectedHostTarget = "";
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "submit-host-pick") {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/host-decision`, {
              winnerPlayerId: state.selectedHostTarget
            });
            state.selectedHostTarget = "";
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "proceed-round") {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/proceed`, {});
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "submit-final-vote") {
          await runAction(async () => {
            const endpoint = state.room.game.phase === "final_revote" ? "final-revote" : "final-vote";
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/${endpoint}`, {
              candidateId: state.selectedFinalTarget
            });
            state.selectedFinalTarget = "";
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "submit-final-host-pick") {
          await runAction(async () => {
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/final-host-decision`, {
              candidateId: state.selectedFinalTarget
            });
            state.selectedFinalTarget = "";
            setRoom(payload.data.room);
          });
          return;
        }

        if (actionButton.dataset.action === "restart-game") {
          await runAction(async () => {
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/restart`, {});
            state.selectedVoteTarget = "";
            state.selectedHostTarget = "";
            state.selectedFinalTarget = "";
            setRoom(payload.data.room, { skipReveal: true });
          });
          return;
        }
      });

      els.closeRevealBtn.addEventListener("click", closeReveal);

      async function initializeApp() {
        const params = new URLSearchParams(window.location.search);
        const apiBaseUrl = params.get("apiBaseUrl");
        const invite = params.get("invite");
        state.apiBaseUrl = apiBaseUrl ? apiBaseUrl.replace(/\/$/, "") : resolveDefaultApiBaseUrl();
        if (invite) {
          state.inviteCode = invite;
        }

        state.isLoading = true;
        setBanner();
        await loadRecentChampions();

        try {
          const restored = await restoreSession();
          if (!restored) {
            state.isLoading = false;
            render();
            return;
          }
        } catch {
          clearSession();
          state.room = null;
          state.roomId = "";
          state.playerToken = "";
        }

        state.isLoading = false;
        render();
      }

      function render() {
        if (state.isLoading && !state.room) {
          setBanner();
          els.app.innerHTML = `<div class="card"><h2>読み込み中</h2><p>ルーム情報と最近の優勝ワードを確認しています。</p></div>`;
          renderReveal();
          return;
        }

        renderApp();
        renderReveal();
      }

      initializeApp();
    </script>
  </body>
</html>
