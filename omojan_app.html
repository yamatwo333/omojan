              </div>
            </div>
            <div class="button-row">
              <button class="btn primary" type="button" data-action="join-room" ${state.pendingAction ? "disabled" : ""}>参加する</button>
            </div>
          </section>
        `;
      }

      function renderLandingChampions() {
        return renderChampionHistoryTrigger("最近の総合優勝ワード");
      }

      function updateLandingView() {
        if (state.renderCache.landingShellKey !== "landing") {
          state.renderCache.landingShellKey = "landing";
          state.renderCache.landingCreateKey = "";
          state.renderCache.landingJoinKey = "";
          state.renderCache.landingChampionsKey = "";
          els.app.innerHTML = renderLandingShell();
        }

        const createKey = [state.createDisplayName, state.playerCount, state.pendingAction ? "pending" : "idle"].join("|");
        const joinKey = [state.inviteCode, state.joinDisplayName, state.pendingAction ? "pending" : "idle"].join("|");
        const championsKey = getRecentChampionsStamp();

        patchSlot(els.app, "#landingCreateSlot", "landingCreateKey", createKey, renderLandingCreate());
        patchSlot(els.app, "#landingJoinSlot", "landingJoinKey", joinKey, renderLandingJoin());
        patchSlot(els.app, "#landingChampionsSlot", "landingChampionsKey", championsKey, renderLandingChampions());

      function renderLobby(room) {
        return renderLobbyShell();
      }

      function renderLobbyShell() {
        return `
          ${renderScreenAlerts({ includeCopy: true })}
          <section class="card">
            <h2>ルーム待機中</h2>
            <div id="lobbyTopSlot"></div>
            <div id="lobbyPlayersSlot"></div>
            <div id="lobbyUtilitySlot"></div>
          </section>

          <div id="lobbyOrderSlot"></div>
          <div id="lobbyChampionsSlot"></div>
        `;
      }

      function renderLobbyTop(room) {
        const players = room.game.players || [];
        return `
          ${renderSummaryPills([
            { label: "ROOM", value: room.inviteCode },
            { label: "参加", value: `${players.length}/${room.playerCount}人` },
            { label: "あなた", value: room.me.isHost ? "ホスト" : room.me.displayName }
          ])}
          <div class="button-row">
            <span class="room-code">${escapeHtml(room.inviteCode)}</span>
            <button class="btn subtle" type="button" data-action="copy-invite-url">招待URLをコピー</button>
          </div>
        `;
      }

      function renderLobbyPlayers(room) {
        return `
          <div class="player-list">
            ${room.game.players
              .map(
                (player) => `
                  <div class="player-card">
                    <div>
                      <strong>${escapeHtml(player.displayName)}</strong>
                      <span>${player.playerId === room.me.playerId ? "あなた" : `席順 ${player.seatOrder}`}</span>
                    </div>
                    <span class="badge">${player.isHost ? "ホスト" : "参加中"}</span>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderLobbyUtility(room) {
        return renderSyncUtility({
          title: "このルーム",
          description: room.me.isHost ? "開始や更新はこの画面で進めます。" : "開始や更新は自動で反映します。",
          showReconnect: true,
          showLeave: true
        });
      }

      function renderLobbyOrder(room) {
        return `
          <section class="panel">
            <h3>開始順</h3>
            ${
              room.me.isHost
                ? `
                  <div class="chip-row">
                    ${room.game.players
                      .map(
                        (player) => `
                          <button class="chip${state.selectedStartPlayerId === player.playerId ? " active" : ""}" type="button" data-start-player-id="${player.playerId}">
                            ${escapeHtml(player.displayName)}
                          </button>
                        `
                      )
                      .join("")}
                  </div>
                  ${renderPlayerOrderPreview(room)}
                  <div class="button-row">
                    <button class="btn primary" type="button" data-action="start-game" ${state.pendingAction ? "disabled" : ""}>この順で開始</button>
                  </div>
                `
                : `
                    <div class="info-box">ホストの開始待ちです。</div>
                    ${renderPlayerOrderPreview(room)}
                  `
            }
          </section>
        `;
      }

      function renderLobbyChampions() {
        return renderChampionHistoryTrigger("最近の総合優勝ワード");
      }

      function updateLobbyView(room) {
        const shellKey = `${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.lobbyShellKey !== shellKey) {
          state.renderCache.lobbyShellKey = shellKey;
          state.renderCache.lobbyTopKey = "";
          state.renderCache.lobbyPlayersKey = "";
          state.renderCache.lobbyUtilityKey = "";
          state.renderCache.lobbyOrderKey = "";
          state.renderCache.lobbyChampionsKey = "";
          els.app.innerHTML = renderLobbyShell();
        }

        const playersKey = room.game.players
          .map((player) => `${player.playerId}:${player.displayName}:${player.seatOrder}:${player.isHost ? 1 : 0}`)
          .join("|");
        const topKey = `${room.inviteCode}|${room.playerCount}|${room.me.playerId}|${room.me.isHost ? 1 : 0}|${room.game.players.length}`;
        const utilityKey = `${room.me.isHost ? "host" : "guest"}|${getSyncUtilityKey()}`;
        const orderKey = `${playersKey}|${state.selectedStartPlayerId}|${room.startPlayerId || ""}|${state.pendingAction ? "pending" : "idle"}|${room.me.isHost ? "host" : "guest"}`;
        const championsKey = getRecentChampionsStamp();

        patchSlot(els.app, "#lobbyTopSlot", "lobbyTopKey", topKey, renderLobbyTop(room));
        patchSlot(els.app, "#lobbyPlayersSlot", "lobbyPlayersKey", playersKey, renderLobbyPlayers(room));
        patchSlot(els.app, "#lobbyUtilitySlot", "lobbyUtilityKey", utilityKey, renderLobbyUtility(room));
        patchSlot(els.app, "#lobbyOrderSlot", "lobbyOrderKey", orderKey, renderLobbyOrder(room));
        patchSlot(els.app, "#lobbyChampionsSlot", "lobbyChampionsKey", championsKey, renderLobbyChampions());
      }

      function renderSubmit(room) {
        return renderSubmitShell(room);

      function renderSubmitShell(room) {
        return `
          ${renderScreenAlerts()}

          <section class="card">
            <h2>${escapeHtml(getCurrentRound(room)?.wind || "提出")} / ${escapeHtml(room.me.displayName)} の手番</h2>
            <div id="submitTopSlot"></div>
          </section>

          <div id="submitSubmissionsSlot"></div>
          <div id="submitLineModeSlot"></div>
          <div id="submitFontSlot"></div>
          <div id="submitHandSlot"></div>
        `;
      }

      function renderSubmitTop(room) {
        const layout = computeDraftLayout();
        return `
          ${renderSubmitHero(room, layout)}
          <section class="preview-card">
            <small>提出前プレビュー</small>
            <div id="previewWord" class="word-board preview-word ${getFontClass(state.draftFontId)}${state.draftLineMode === "single" ? " is-single-line" : ""}">
              ${layout.lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("")}
            </div>
            <p class="preview-caption">
              ${
                getDraftText(room)
                  ? layout.safetyAdjusted
                    ? "提出時に自動で整えます。"

                  : ""
              }
            </p>
          </section>
        `;

      function renderSubmitSubmissions(room) {
        const submissions = getCurrentRound(room)?.submissions || [];
        return renderSection(
          `すでに公開されたワード${submissions.length ? ` (${submissions.length})` : ""}`,
          renderSubmissionList(submissions, "まだ公開されたワードはありません。"),
          { className: "panel" }
        );

      function renderSubmitLineMode(room) {
        const chars = Array.from(getDraftText(room));
        return `
          <section class="panel">
            <h3>改行モード</h3>
            <div class="chip-row">
              ${lineModes
                .map(
                  (mode) => `
                    <button class="chip${state.draftLineMode === mode.id ? " active" : ""}" type="button" data-line-mode="${mode.id}">
                      ${escapeHtml(mode.label)}
                    </button>
                  `
                )
                .join("")}
            </div>
            ${state.draftLineMode === "manual" && chars.length > 1
              ? `
                <section class="break-panel">
                  <p>${state.draftManualBreaks.length ? `${state.draftManualBreaks.join(" / ")}文字目のあとで改行` : "改行を入れない"}</p>
                  <div class="break-track">
                    ${chars
                      .map((char, index) => {
                        const gap =
                          index < chars.length - 1
                            ? `<button class="break-dot${state.draftManualBreaks.includes(index + 1) ? " active" : ""}" type="button" data-break="${index + 1}" aria-label="${index + 1}文字目のあとで改行"></button>`
                            : "";
                        return `<span class="char-box">${escapeHtml(char)}</span>${gap}`;
                      })
                      .join("")}
                  </div>
                </section>
              `
              : ""}
          </section>

      function renderSubmitFonts() {
        return `
          <section class="panel">
            <h3>書体</h3>
            <div class="chip-row">
              ${fonts
                .map(
                  (font) => `
                    <button class="chip${state.draftFontId === font.id ? " active" : ""}" type="button" data-font-id="${font.id}">
                      ${escapeHtml(font.label)}
                    </button>
                  `
                )
                .join("")}
            </div>
          </section>
        `;
      }

      function renderSubmitHand(room) {
        const selectedTiles = getSelectedTiles(room);
        return `
          <section class="panel">
            <h3>手札</h3>
            <div class="tile-grid">
              ${room.myHand
                .map(
                  (tile) => `
                    <button class="tile${state.draftSelectedTileIds.includes(tile.tileId) ? " selected" : ""}${tile.isUsed ? " used" : ""}" type="button" data-tile-id="${tile.tileId}" ${tile.isUsed ? "disabled" : ""}>
                      ${escapeHtml(tile.text)}
                    </button>
                  `
                )
                .join("")}
            </div>
            <div class="button-row">
              <button class="btn subtle" type="button" data-action="swap-selection" ${selectedTiles.length === 2 ? "" : "disabled"}>順番入替</button>
              <button class="btn subtle" type="button" data-action="clear-selection">選択をクリア</button>
              <button class="btn primary" type="button" data-action="submit-word" ${selectedTiles.length === 2 && !state.pendingAction ? "" : "disabled"}>この見た目で提出</button>
            </div>
          </section>
        `;
      }

      function updateSubmitView(room) {
        const shellKey = `${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.submitShellKey !== shellKey) {
          state.renderCache.submitShellKey = shellKey;
          state.renderCache.submitTopKey = "";
          state.renderCache.submitSubmissionsKey = "";
          state.renderCache.submitLineModeKey = "";
          state.renderCache.submitFontKey = "";
          state.renderCache.submitHandKey = "";
          els.app.innerHTML = renderSubmitShell(room);
        }

        const round = getCurrentRound(room);
        const submissions = round?.submissions || [];
        const topKey = [
          room.revision,
          state.draftSelectedTileIds.join(","),
          state.draftFontId,
          state.draftLineMode,
          state.draftManualBreaks.join(",")
        ].join("|");
        const submissionsKey = submissions
          .map((submission) => `${submission.playerId}:${submission.phrase}:${submission.fontId}:${(submission.renderedLines || []).join("/")}`)
          .join("|");
        const lineModeKey = [
          state.draftLineMode,
          getDraftText(room),
          state.draftManualBreaks.join(",")
        ].join("|");
        const fontKey = state.draftFontId;
        const handKey = [
          room.revision,
          state.draftSelectedTileIds.join(","),
          state.pendingAction ? "pending" : "idle",
          room.myHand.map((tile) => `${tile.tileId}:${tile.isUsed ? 1 : 0}`).join("|")
        ].join("|");

        patchSlot(els.app, "#submitTopSlot", "submitTopKey", topKey, renderSubmitTop(room));
        patchSlot(els.app, "#submitSubmissionsSlot", "submitSubmissionsKey", submissionsKey, renderSubmitSubmissions(room));
        patchSlot(els.app, "#submitLineModeSlot", "submitLineModeKey", lineModeKey, renderSubmitLineMode(room));
        patchSlot(els.app, "#submitFontSlot", "submitFontKey", fontKey, renderSubmitFonts());
        patchSlot(els.app, "#submitHandSlot", "submitHandKey", handKey, renderSubmitHand(room));
      }

      function renderWait(room) {
        const submissions = getCurrentRound(room)?.submissions || [];
        return `
          ${renderScreenAlerts()}
          <section class="card">
            <h2>待機</h2>
            <div id="waitFocusSlot"></div>
            <div id="waitSyncSlot"></div>
          </section>

          <div id="waitSubmissionsSlot"></div>
        `;
      }

      function renderWaitFocus(room) {
        const submissions = getCurrentRound(room)?.submissions || [];
        return renderFocusCallout({
          label: getCurrentRound(room)?.label || "進行中",
          title: getWaitingMessage(room),
          description: "",
          pills: [
            { label: "公開", value: submissions.length ? `${submissions.length}語` : "まだなし" }
          ]
        });
      }

      function renderWaitSync(room) {
        return renderSyncUtility({
          title: "同期",
          description: "この画面は自動で更新します。止まったら手動で更新できます。",
          showReconnect: true,
          showLeave: true
        });
      }

      function renderWaitSubmissions(room) {
        const submissions = getCurrentRound(room)?.submissions || [];
        return renderSection(
          `公開済みワード${submissions.length ? ` (${submissions.length})` : ""}`,
          renderSubmissionList(submissions),
          { className: "panel" }
        );
      }

      function updateWaitView(room) {
        const shellKey = `${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.waitShellKey !== shellKey) {
          state.renderCache.waitShellKey = shellKey;
          state.renderCache.waitFocusKey = "";
          state.renderCache.waitSyncKey = "";
          state.renderCache.waitSubmissionsKey = "";
          els.app.innerHTML = renderWait(room);
        }

        const round = getCurrentRound(room);
        const submissions = round?.submissions || [];
        const focusKey = [
          room.game.phase,
          room.game.currentTurnPlayerId || "",
          round?.roundIndex ?? "",
          submissions.length
        ].join("|");
        const syncKey = getSyncUtilityKey();
        const submissionsKey = submissions
          .map((submission) => `${submission.playerId}:${submission.phrase}:${submission.fontId}:${(submission.renderedLines || []).join("/")}`)
          .join("|");

        patchSlot(els.app, "#waitFocusSlot", "waitFocusKey", focusKey, renderWaitFocus(room));
        patchSlot(els.app, "#waitSyncSlot", "waitSyncKey", syncKey, renderWaitSync(room));
        patchSlot(els.app, "#waitSubmissionsSlot", "waitSubmissionsKey", submissionsKey, renderWaitSubmissions(room));
      }

      function renderPassiveSyncUi(room = state.room, view = deriveView(room)) {
        setBanner();
        if (!room || !state.roomId) {
          return;
        }

        if (view === "wait") {
          patchSlot(els.app, "#waitSyncSlot", "waitSyncKey", getSyncUtilityKey(), renderWaitSync(room));
          return;
        }

        if (isLobbyView(view)) {
          const utilityKey = `${room.me.isHost ? "host" : "guest"}|${getSyncUtilityKey()}`;
          patchSlot(els.app, "#lobbyUtilitySlot", "lobbyUtilityKey", utilityKey, renderLobbyUtility(room));
        }
      }

      function isDecisionView(view) {
        return ["vote", "revote", "hostDecide", "finalVote", "finalHostDecide"].includes(view);
      }

      function isResultView(view) {
        return ["roundResult", "finalResult"].includes(view);
      }

      function isSubmitView(view) {
        return view === "submit";
      }

      function isLobbyView(view) {
        return view === "lobby";
      }

      function isLandingView(view) {
        return view === "welcome";
      }

      function resetIncrementalViewCaches() {
        state.renderCache.landingShellKey = "";
        state.renderCache.landingCreateKey = "";
        state.renderCache.landingJoinKey = "";
        state.renderCache.landingChampionsKey = "";
        state.renderCache.lobbyShellKey = "";
        state.renderCache.lobbyTopKey = "";
        state.renderCache.lobbyPlayersKey = "";
        state.renderCache.lobbyUtilityKey = "";
        state.renderCache.lobbyOrderKey = "";
        state.renderCache.lobbyChampionsKey = "";
        state.renderCache.submitShellKey = "";
        state.renderCache.submitTopKey = "";
        state.renderCache.submitSubmissionsKey = "";
        state.renderCache.submitLineModeKey = "";
        state.renderCache.submitFontKey = "";
        state.renderCache.submitHandKey = "";
        state.renderCache.waitShellKey = "";
        state.renderCache.waitFocusKey = "";
        state.renderCache.waitSyncKey = "";
        state.renderCache.waitSubmissionsKey = "";
        state.renderCache.decisionShellKey = "";
        state.renderCache.decisionFocusKey = "";
        state.renderCache.decisionSummaryKey = "";
        state.renderCache.decisionCardsKey = "";
        state.renderCache.decisionActionsKey = "";
        state.renderCache.resultShellKey = "";
        state.renderCache.resultHeroKey = "";
        state.renderCache.resultExtraKey = "";
        state.renderCache.resultCountsKey = "";
        state.renderCache.resultActionsKey = "";
      }

      function renderDecisionShell(title) {
        return `
          ${renderScreenAlerts()}
          <section class="card">
            <h2>${escapeHtml(title)}</h2>
            <div id="decisionFocusSlot"></div>
            <div id="decisionSummarySlot"></div>
            <div id="decisionCardsSlot"></div>
            <div id="decisionActionsSlot"></div>
          </section>
        `;
      }

      function buildDecisionConfig(room, view) {
        const round = getCurrentRound(room);
        const isFinal = view === "finalVote" || view === "finalHostDecide";
        const isRevote = view === "revote" || room.game.phase === "final_revote";
        const allowSelfVote = allowsSelfVote(room);

        if (view === "vote" || view === "revote" || view === "finalVote") {
          const candidates = isFinal ? getFinalCandidates(room, isRevote ? "revote" : "vote") : getVoteCandidates(room, view === "revote" ? "revote" : "vote");
          const source = isFinal ? room.game.finalVote : round;
          return {
            type: "vote",
            title: isFinal ? (isRevote ? "最終再投票" : "最終投票") : (view === "revote" ? "再投票" : "このラウンドで一番おもしろいワードに投票"),
            label: isFinal ? (isRevote ? "最終再投票" : "総合優勝を決める投票") : (view === "revote" ? "同票の再投票" : getCurrentRound(room)?.label || "投票"),
            description: isFinal
              ? (isRevote ? (allowSelfVote ? "2人戦なので自分のワードも選べます。" : "同票の候補から選びます。") : (allowSelfVote ? "2人戦なので自分のワードも選べます。" : "総合優勝を1つ選びます。"))
              : (view === "revote" ? (allowSelfVote ? "2人戦なので自分のワードも選べます。" : "同票のワードから選びます。") : (allowSelfVote ? "2人戦なので自分のワードも選べます。" : "自分以外のワードから選びます。")),
            summaryTitle: isRevote ? "同票になったワード" : "",
            summaryHtml:
              isRevote && source?.voteSummary
                ? renderTiedCountSummary(
                    source.voteSummary.counts,
                    isFinal ? source.voteSummary.tiedCandidateIds : source.voteSummary.tiedPlayerIds,
                    isFinal ? "candidateId" : "playerId"
                  )
                : "",
            candidates,
            selectedId: isFinal ? state.selectedFinalTarget : (view === "revote" ? state.selectedHostTarget : state.selectedVoteTarget),
            dataAttr: isFinal ? "final-vote-id" : (view === "revote" ? "revote-id" : "vote-id"),
            selfId: room.me.playerId,
            allowSelfVote,
            action: isFinal ? "submit-final-vote" : (view === "revote" ? "submit-revote" : "submit-vote"),
            buttonLabel: isFinal ? (isRevote ? "このワードに再投票" : "このワードに投票") : (view === "revote" ? "このワードに再投票" : "このワードに投票")
          };
        }

        const source = isFinal ? room.game.finalVote : round;
        const counts = source?.voteSummary?.counts || [];
        const tiedIds = isFinal ? source?.voteSummary?.tiedCandidateIds || [] : source?.voteSummary?.tiedPlayerIds || [];
        return {
          type: "host",
          title: isFinal ? "最終ホスト裁定" : "ホスト裁定",
          label: isFinal ? "最終裁定" : getCurrentRound(room)?.label || "ホスト裁定",
          description: isFinal ? "ホストが総合優勝を決めます。" : "ホストが勝ちワードを決めます。",
          summaryTitle: "同票になったワード",
          summaryHtml: renderTiedCountSummary(counts, tiedIds, isFinal ? "candidateId" : "playerId"),
          candidates: isFinal ? source.candidates.filter((candidate) => tiedIds.includes(candidate.candidateId)) : getVoteCandidates(room, "revote"),
          selectedId: isFinal ? state.selectedFinalTarget : state.selectedHostTarget,
          dataAttr: isFinal ? "final-pick-id" : "host-pick-id",
          selfId: "__none__",
          allowSelfVote: true,
          action: isFinal ? "submit-final-host-pick" : "submit-host-pick",
          buttonLabel: "このワードで確定"
        };
      }

      function renderDecisionFocus(config) {
        const selectedCandidate = config.candidates.find((candidate) => (candidate.candidateId ?? candidate.playerId) === config.selectedId) || null;
        const pills =
          config.type === "host"
            ? [
                { label: "同票", value: `${config.candidates.length}語` },
                { label: "選択", value: selectedCandidate ? selectedCandidate.displayName : "未選択" }
              ]
            : [
                { label: "候補", value: `${config.candidates.length}語` },
                { label: "選択", value: selectedCandidate ? selectedCandidate.displayName : "未選択" }
              ];
        return renderFocusCallout({
          label: config.label,
          title: selectedCandidate ? selectedCandidate.phrase : (config.type === "host" ? "ホストが勝ちワードを決めます" : "まだワードを選んでいません"),
          description: selectedCandidate ? (config.type === "host" ? "このワードで決定します。" : "このワードで確定します。") : config.description,
          pills
        });
      }

      function renderDecisionSummary(config) {
        if (!config.summaryHtml) {
          return "";
        }
        return renderSection(config.summaryTitle, config.summaryHtml, { className: "panel" });
      }

      function renderDecisionCards(config) {
        return renderVoteCards(config.candidates, config.selectedId, config.dataAttr, config.selfId, {
          allowSelfVote: config.allowSelfVote,
          disableSelf: config.type === "host" ? false : undefined
        });
      }

      function renderDecisionActions(config) {
        return `
          <div class="button-row">
            <button class="btn primary" type="button" data-action="${config.action}" ${config.selectedId && !state.pendingAction ? "" : "disabled"}>
              ${escapeHtml(config.buttonLabel)}
            </button>
          </div>
        `;
      }

      function updateDecisionView(room, view) {
        const config = buildDecisionConfig(room, view);
        const shellKey = `${view}|${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.decisionShellKey !== shellKey) {
          state.renderCache.decisionShellKey = shellKey;
          state.renderCache.decisionFocusKey = "";
          state.renderCache.decisionSummaryKey = "";
          state.renderCache.decisionCardsKey = "";
          state.renderCache.decisionActionsKey = "";
          els.app.innerHTML = renderDecisionShell(config.title);
        }

        const candidatesStamp = config.candidates
          .map((candidate) => `${candidate.candidateId ?? candidate.playerId}:${candidate.phrase}:${candidate.fontId}:${(candidate.renderedLines || []).join("/")}`)
          .join("|");
        const focusKey = [view, room.revision, config.selectedId || "", state.pendingAction ? "pending" : "idle", candidatesStamp].join("|");
        const summaryKey = [view, room.revision, config.summaryTitle, config.summaryHtml].join("|");
        const cardsKey = [view, room.revision, config.selectedId || "", candidatesStamp].join("|");
        const actionsKey = [view, config.selectedId || "", state.pendingAction ? "pending" : "idle", config.action].join("|");

        patchSlot(els.app, "#decisionFocusSlot", "decisionFocusKey", focusKey, renderDecisionFocus(config));
        patchSlot(els.app, "#decisionSummarySlot", "decisionSummaryKey", summaryKey, renderDecisionSummary(config));
        patchSlot(els.app, "#decisionCardsSlot", "decisionCardsKey", cardsKey, renderDecisionCards(config));
        patchSlot(els.app, "#decisionActionsSlot", "decisionActionsKey", actionsKey, renderDecisionActions(config));
      }

      function renderResultShell(title) {
        return `
          ${renderScreenAlerts()}
          <section class="card">
            <h2>${escapeHtml(title)}</h2>
            <div id="resultHeroSlot"></div>
            <div id="resultExtraSlot"></div>
            <div id="resultCountsSlot"></div>
            <div id="resultActionsSlot"></div>
          </section>
        `;
      }

      function buildResultConfig(room, view) {
        if (view === "roundResult") {
          const round = getCurrentRound(room);
          const winner = round?.winner;
          return {
            title: round?.label || "ラウンド結果",
            heroHtml: renderWordStage({
              stageClass: "result-stage",
              label: "勝利ワード",
              entry: winner,
              wordClass: "result-word",
              maxFont: 40,
              minFont: 20,
              emptyText: "結果待ちです。",
              footerHtml: winner
                ? renderSummaryPills([
                    { label: "勝ちワードの持ち主", value: winner.displayName },
                    { label: "得票", value: `${winner.voteCount}票` }
                  ])
                : ""
            }),
            extraHtml: "",
            countsHtml: renderCountBreakdown("票数内訳", round?.voteSummary?.counts || [], (item) => `${item.count}票 / ${item.displayName}`),
            actionsHtml: room.me.isHost
              ? `
                  <div class="button-row">
                    <button class="btn primary" type="button" data-action="proceed-round" ${state.pendingAction ? "disabled" : ""}>
                      ${room.game.roundIndex === room.game.rounds.length - 1 ? "最終投票へ進む" : "次のラウンドへ"}
                    </button>
                    <button class="btn subtle" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>この端末の参加情報を消す</button>
                  </div>
                `
              : `
                  <div class="button-row">
                    <div class="info-box">ホストの進行待ちです。</div>
                    <button class="btn subtle" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>この端末の参加情報を消す</button>
                  </div>
                `
          };
        }

        const champion = room.game.champion;
        return {
          title: "総合優勝",
          heroHtml: `
            ${renderFocusCallout({
              label: "本日の決着",
              title: champion ? `${champion.phrase}` : "総合優勝を集計中",
              description: champion ? "最終投票で決まった総合優勝です。" : "",
              pills: champion ? [{ label: "持ち主", value: champion.displayName }] : []
            })}
            ${renderWordStage({
              stageClass: "champion-stage",
              label: "総合優勝",
              entry: champion,
              wordClass: "champion-word",
              maxFont: 48,
              minFont: 22,
              emptyText: "未確定です。",
              footerHtml: champion ? `<p class="stage-footnote">${escapeHtml(champion.displayName)} のワード</p>` : ""
            })}
          `,
          extraHtml: renderSection("各ラウンドの勝ちワード", renderRoundWinnerGrid(room.game.rounds), { className: "panel" }),
          countsHtml: room.game.finalVote?.voteSummary
            ? renderCountBreakdown("最終投票の票数内訳", room.game.finalVote.voteSummary.counts, (item) => `${item.count}票 / ${item.displayName}`)
            : "",
          actionsHtml: room.me.isHost
            ? `
                <div class="button-row">
                  <button class="btn primary" type="button" data-action="restart-game" ${state.pendingAction ? "disabled" : ""}>もう一度最初から</button>
                  <button class="btn subtle" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>この端末の参加情報を消す</button>
                </div>
              `
            : `
                <div class="button-row">
                  <div class="info-box">ホストの再開待ちです。</div>
                  <button class="btn subtle" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>この端末の参加情報を消す</button>
                </div>
              `
        };
      }

      function updateResultView(room, view) {
        const config = buildResultConfig(room, view);
        const shellKey = `${view}|${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.resultShellKey !== shellKey) {
          state.renderCache.resultShellKey = shellKey;
          state.renderCache.resultHeroKey = "";
          state.renderCache.resultExtraKey = "";
          state.renderCache.resultCountsKey = "";
          state.renderCache.resultActionsKey = "";
          els.app.innerHTML = renderResultShell(config.title);
        }

        const heroKey = [view, room.revision, config.heroHtml].join("|");
        const extraKey = [view, room.revision, config.extraHtml].join("|");
        const countsKey = [view, room.revision, config.countsHtml].join("|");
        const actionsKey = [view, room.revision, state.pendingAction ? "pending" : "idle", room.me.isHost ? "host" : "guest"].join("|");

        patchSlot(els.app, "#resultHeroSlot", "resultHeroKey", heroKey, config.heroHtml);
        patchSlot(els.app, "#resultExtraSlot", "resultExtraKey", extraKey, config.extraHtml);
        patchSlot(els.app, "#resultCountsSlot", "resultCountsKey", countsKey, config.countsHtml);
        patchSlot(els.app, "#resultActionsSlot", "resultActionsKey", actionsKey, config.actionsHtml);
      }

      function renderVoteCards(candidates, selectedId, dataAttr, selfId, options = {}) {
        return `
          <div class="action-grid">
            ${candidates
              .map((candidate) => {
                const disabled = options.disableSelf !== false && candidate.playerId === selfId && !Boolean(options.allowSelfVote);
                const value = candidate.candidateId ?? candidate.playerId;
                return `
                  <button
                    class="action-card${selectedId === value ? " selected" : ""}${disabled ? " disabled" : ""}"
                    type="button"
                    aria-pressed="${selectedId === value ? "true" : "false"}"
                    data-${dataAttr}="${escapeHtml(value)}"
                    ${disabled ? "disabled" : ""}
                  >
                    <span class="badge">${escapeHtml(candidate.displayName)}</span>
                    ${renderWordBoard(candidate.renderedLines, candidate.fontId, "vote-word", { maxFont: 34, minFont: 18 })}
                    <div class="muted">${escapeHtml(candidate.phrase)}</div>
                  </button>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function renderVote(room, mode = "vote") {
        const round = getCurrentRound(room);
        const candidates = getVoteCandidates(room, mode);
        const allowSelfVote = allowsSelfVote(room);
        const selectedId = mode === "revote" ? state.selectedHostTarget : state.selectedVoteTarget;
        return renderVoteDecisionScreen({
          label: mode === "revote" ? "同票の再投票" : getCurrentRound(room)?.label || "投票",
          title: mode === "revote" ? "再投票" : "このラウンドで一番おもしろいワードに投票",
          description:
            mode === "revote"
              ? allowSelfVote ? "2人戦なので自分のワードも選べます。" : "同票のワードから選びます。"
              : allowSelfVote ? "2人戦なので自分のワードも選べます。" : "自分以外のワードから選びます。",
          summaryHtml:
            mode === "revote" && round?.voteSummary
              ? renderSection(
                  "同票になったワード",
                  renderTiedCountSummary(round.voteSummary.counts, round.voteSummary.tiedPlayerIds, "playerId"),
                  { className: "panel" }
                )
              : "",
          candidates,
          selectedId,
          dataAttr: mode === "revote" ? "revote-id" : "vote-id",
          selfId: room.me.playerId,
          allowSelfVote,
          action: mode === "revote" ? "submit-revote" : "submit-vote",
          buttonLabel: mode === "revote" ? "このワードに再投票" : "このワードに投票"
        });
      }

      function renderHostDecide(room, isFinal = false) {
        const source = isFinal ? room.game.finalVote : getCurrentRound(room);
        const counts = source?.voteSummary?.counts || [];
        const tiedIds = isFinal ? source?.voteSummary?.tiedCandidateIds || [] : source?.voteSummary?.tiedPlayerIds || [];
        const candidates = isFinal
          ? source.candidates.filter((candidate) => tiedIds.includes(candidate.candidateId))
          : getVoteCandidates(room, "revote");
        const selectedId = isFinal ? state.selectedFinalTarget : state.selectedHostTarget;
        const dataAttr = isFinal ? "final-pick-id" : "host-pick-id";

        return renderHostDecisionScreen({
          label: isFinal ? "最終裁定" : getCurrentRound(room)?.label || "ホスト裁定",
          title: isFinal ? "最終ホスト裁定" : "ホスト裁定",
          description: isFinal
            ? "ホストが総合優勝を決めます。"
            : "ホストが勝ちワードを決めます。",
          counts,
          tiedIds,
          idField: isFinal ? "candidateId" : "playerId",
          candidates,
          selectedId,
          dataAttr,
          action: isFinal ? "submit-final-host-pick" : "submit-host-pick"
        });
      }

      function renderRoundResult(room) {
        const round = getCurrentRound(room);
        const winner = round?.winner;
        return `
          ${renderScreenAlerts()}
          <section class="card">
            <h2>${escapeHtml(round?.label || "ラウンド結果")}</h2>
            ${renderWordStage({
              stageClass: "result-stage",
              label: "勝利ワード",
              entry: winner,
              wordClass: "result-word",
              maxFont: 40,
              minFont: 20,
              emptyText: "結果待ちです。",
              footerHtml: winner
                ? `
                    ${renderSummaryPills([
                      { label: "勝ちワードの持ち主", value: winner.displayName },
                      { label: "得票", value: `${winner.voteCount}票` }
                    ])}
                  `
                : ""
            })}
            ${renderCountBreakdown("票数内訳", round?.voteSummary?.counts || [], (item) => `${item.count}票 / ${item.displayName}`)}
            ${
              room.me.isHost
                ? `
                  <div class="button-row">
                    <button class="btn primary" type="button" data-action="proceed-round" ${state.pendingAction ? "disabled" : ""}>
                      ${room.game.roundIndex === room.game.rounds.length - 1 ? "最終投票へ進む" : "次のラウンドへ"}
                    </button>
                    <button class="btn subtle" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>この端末の参加情報を消す</button>
                  </div>
                `
                : `
                  <div class="button-row">
                    <div class="info-box">ホストの進行待ちです。</div>
                    <button class="btn subtle" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>この端末の参加情報を消す</button>
                  </div>
                `
            }
          </section>
        `;
      }

      function renderFinalVote(room) {
        const isRevote = room.game.phase === "final_revote";
        const finalVote = room.game.finalVote;
        const candidates = getFinalCandidates(room, isRevote ? "revote" : "vote");
        const allowSelfVote = allowsSelfVote(room);
        return renderVoteDecisionScreen({
          label: isRevote ? "最終再投票" : "総合優勝を決める投票",

      function updateSubmitPreview(room) {
        const previewWord = document.getElementById("previewWord");
        if (!previewWord || deriveView(room) !== "submit") {
          return;
        }
        const layout = computeDraftLayout();
        previewWord.dataset.variant = "preview-word";
        applyWordMarkup(previewWord, layout.lines, getFontClass(state.draftFontId), state.draftLineMode, layout.fontSize);
      }

      function updateCurrentViewOnly(room = state.room, view = deriveView(room)) {
        ensureGoogleFontsLoaded(collectVisibleFontIds(room, view));

        if (isLandingView(view)) {
          updateLandingView();
          return true;
        }
        if (isLobbyView(view) && room) {
          updateLobbyView(room);
          return true;
        }
        if (isSubmitView(view) && room) {
          updateSubmitView(room);
          updateSubmitPreview(room);
          return true;
        }
        if (view === "wait" && room) {
          updateWaitView(room);
          return true;
        }
        if (isDecisionView(view) && room) {
          updateDecisionView(room, view);
          return true;
        }
        if (isResultView(view) && room) {
          updateResultView(room, view);
          return true;
        }
        return false;
      }

      function renderCurrentView(options = {}) {
        if (state.isLoading && !state.room) {
          render(options);
          return;
        }

        const room = state.room;
        const view = deriveView(room);
        const appKey = getAppRenderKey(room, view);
        if (state.renderCache.appKey !== appKey) {
          render(options);
          return;
        }

        if (!updateCurrentViewOnly(room, view)) {
          render(options);
          return;
        }

        setBanner();
        if (options.includeReveal !== false) {
          renderReveal();
        }
        renderChampionHistoryOverlay();
      }

      function getActiveReveal() {
        return state.room?.game?.reveal || null;
      }

      function buildRevealPresentation(reveal, room = state.room) {
        if (!reveal) {
          return null;
        }
        const round = reveal.roundIndex !== null && reveal.roundIndex !== undefined ? room?.game?.rounds?.[reveal.roundIndex] : null;
        const meAcknowledged = reveal.acknowledgedPlayerIds?.includes(room?.me?.playerId);
        if (reveal.kind === "champion") {
          return {
            badge: "総合優勝",
            lines: clone(reveal.renderedLines || [reveal.phrase]),
            fontId: reveal.fontId || "classic",
            meta: `${reveal.displayName} のワード`,
            buttonLabel: meAcknowledged ? "ほかの人を待っています" : "結果一覧を見る",
            acknowledged: meAcknowledged,
            kind: "champion"
          };
        }
        if (reveal.kind === "round_winner") {
          return {
            badge: round?.label || "ラウンド勝利",
            lines: clone(reveal.renderedLines || [reveal.phrase]),
            fontId: reveal.fontId || "classic",
            meta: `${reveal.displayName} のワード`,
            buttonLabel: meAcknowledged ? "ほかの人を待っています" : "閉じる",
            acknowledged: meAcknowledged,
            kind: "round_winner"
          };
        }
        return {
          badge: reveal.displayName,
          lines: clone(reveal.renderedLines || [reveal.phrase]),
          fontId: reveal.fontId || "broadcast",
          meta: round?.wind ? `${round.wind} で公開` : "場に公開",
          buttonLabel: meAcknowledged ? "ほかの人を待っています" : "閉じる",
          acknowledged: meAcknowledged,
          kind: "submission"
        };
      }

      function renderReveal() {
        const reveal = getActiveReveal();
        if (!reveal) {
          state.renderCache.revealKey = "";
          els.revealOverlay.hidden = true;
          return;
        }
        const presentation = buildRevealPresentation(reveal);
        ensureGoogleFontsLoaded([presentation.fontId || "classic"]);
        const revealKey = [
          reveal.revealId,
          reveal.kind,
          presentation.badge,
          presentation.meta,
          presentation.buttonLabel,
          presentation.acknowledged ? "ack" : "open",
          state.pendingAction ? "pending" : "idle",
          presentation.lines.join("|"),
          presentation.fontId || "classic"
        ].join("|");

        if (state.renderCache.revealKey === revealKey) {
          els.revealOverlay.hidden = false;
          return;
        }
        state.renderCache.revealKey = revealKey;

        els.revealOverlay.hidden = false;
        els.revealCard.classList.toggle("is-champion", presentation.kind === "champion");
        els.revealBadge.textContent = presentation.badge;
        els.revealMeta.textContent = presentation.meta;
        els.revealWord.dataset.variant = presentation.kind === "champion" ? "champion-word" : "result-word";
        els.revealWord.dataset.fontId = presentation.fontId || "classic";
        els.revealWord.dataset.lineMode = presentation.lines.length <= 1 ? "single" : "manual";
        els.revealWord.dataset.maxFont = presentation.kind === "champion" ? "46" : "42";
        els.revealWord.dataset.minFont = presentation.kind === "champion" ? "22" : "18";
        els.revealWord.className = `word-board auto-fit-word ${els.revealWord.dataset.variant}`;
        els.revealWord.innerHTML = presentation.lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("");
        hydrateWordBoard(els.revealWord);
        els.closeRevealBtn.textContent = presentation.buttonLabel;
        els.closeRevealBtn.disabled = Boolean(presentation.acknowledged || state.pendingAction);
      }

      async function copyText(text, successMessage) {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          window.prompt("コピーしてください", text);
        }
        setFeedback(successMessage, false, 2400);
        renderCurrentView({ includeReveal: false });
      }

      async function runAction(action, options = {}) {
        const { pendingMode = "action" } = options;
        state.pendingAction = true;
        state.pendingMode = pendingMode;
        setFeedback("");
        renderCurrentView();
        try {
          await action();
        } catch (error) {
          if (!recoverLostSession(error, "action")) {
            setFeedback(describeAppError(error, "action"), true);
          }
        } finally {
          state.pendingAction = false;
          state.pendingMode = "";
          renderCurrentView();
        }
      }

      function validateDisplayName(value) {
        const name = String(value || "").trim().slice(0, 20);
        if (!name) {
          throw new Error("表示名を入力してください。");
        }
        return name;
      }

      function buildSubmitPayload(room) {
        const layout = computeDraftLayout();
        const selectedTiles = getSelectedTiles(room);
        return {
          tileIds: selectedTiles.map((tile) => tile.tileId),
          tileOrder: [0, 1],
          phrase: selectedTiles.map((tile) => tile.text).join(""),
          fontId: state.draftFontId,
          lineMode: state.draftLineMode,
          manualBreaks: clone(state.draftManualBreaks),
          renderedLines: clone(layout.lines)
        };
      }

      function updateFieldState(field, value) {
        if (field in state) {
          state[field] = value;
        }
      }

      function clearDecisionState() {
        state.selectedVoteTarget = "";
        state.selectedHostTarget = "";
        state.selectedFinalTarget = "";

        return state.pendingAction && ["sync", "refresh", "reconnect"].includes(state.pendingMode);
      }

        if (state.pendingMode === "reconnect") {
          return {
            short: "再接続中",
            detail: "もう一度つなぎ直しています。"

        }
        return {
          short: "同期中",

        };
      }

      function clearBackgroundSyncIssue() {
        state.pollFailureCount = 0;
        state.syncIssueMessage = "";
      }

      function setBackgroundSyncIssue(error) {
        state.pollFailureCount += 1;
        state.syncIssueMessage = describeAppError(error, "refresh");
      }

      async function openChampionHistory() {
        state.championHistoryOpen = true;
        state.championHistoryPending = true;
        state.championHistoryError = "";
        if (!state.championHistoryItems.length && state.recentChampions.length) {
          state.championHistoryItems = clone(state.recentChampions);
        }
        renderCurrentView({ includeReveal: false });

        try {
          await loadChampionHistory(80);
        } finally {
          state.championHistoryPending = false;
          renderCurrentView({ includeReveal: false });
        }
      }

      function closeChampionHistory() {
        state.championHistoryOpen = false;
        state.championHistoryPending = false;
        state.championHistoryError = "";
        renderCurrentView({ includeReveal: false });
      }

      function toggleDraftTile(tileId) {
        const room = state.room;
        const tile = room?.myHand.find((item) => item.tileId === tileId);
        if (!tile || tile.isUsed) {
          return;
        }
        if (state.draftSelectedTileIds.includes(tileId)) {
          state.draftSelectedTileIds = state.draftSelectedTileIds.filter((id) => id !== tileId);
        } else if (state.draftSelectedTileIds.length >= 2) {
          state.draftSelectedTileIds = [state.draftSelectedTileIds[1], tileId];
        } else {
          state.draftSelectedTileIds = [...state.draftSelectedTileIds, tileId];
        }
        sanitizeManualBreaks(room);
        renderCurrentView({ includeReveal: false });
      }

      function toggleManualBreak(point) {
        if (state.draftManualBreaks.includes(point)) {
          state.draftManualBreaks = state.draftManualBreaks.filter((value) => value !== point);
        } else {
          state.draftManualBreaks = [...state.draftManualBreaks, point];
        }
        renderCurrentView({ includeReveal: false });
      }

      const actionHandlers = {
        "refresh-latest": async () => {
          await runAction(async () => {
            if (state.roomId && state.playerToken) {
              await refreshRoom();
              return;
            }
            await loadRecentChampions();
          }, { pendingMode: "refresh" });
        },
        "retry-room-connection": async () => {
          await runAction(async () => {
            await reconnectRoom();
          }, { pendingMode: "reconnect" });
        },
        "clear-messages": async () => {
          setFeedback("");
          renderCurrentView({ includeReveal: false });
        },
        "close-reveal": async () => {
          const reveal = getActiveReveal();
          if (!reveal || state.pendingAction || reveal.acknowledgedPlayerIds?.includes(state.room?.me?.playerId)) {
            return;
          }
          await runAction(async () => {
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/reveal-close`, {
              revealId: reveal.revealId
            });
            setRoom(payload.data.room, { skipReveal: true });
          });
        },
        "leave-room": async () => {
          const isHost = Boolean(state.room?.me?.isHost);
          const confirmed = window.confirm(
            isHost
              ? "この端末の参加情報を消します。ホストとしては入り直せない可能性があります。続けますか？"
              : "この端末の参加情報を消して、参加し直せる状態に戻します。続けますか？"
          );
          if (!confirmed) {
            return;
          }
          exitToWelcome({
            copyMessage: "この端末の参加情報を消しました。必要なら招待コードですぐ入り直せます。"
          });
          render();
        },
        "create-room": async () => {
          await runAction(async () => {
            const payload = await fetchJson(`${state.apiBaseUrl}/rooms`, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                displayName: validateDisplayName(state.createDisplayName),
                playerCount: state.playerCount
              })
            });
            setRoom(payload.data.room, { playerToken: payload.data.playerToken, skipReveal: true });
          });
        },
        "join-room": async () => {
          await runAction(async () => {
            const payload = await fetchJson(`${state.apiBaseUrl}/rooms/join`, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                inviteCode: String(state.inviteCode || "").trim(),
                displayName: validateDisplayName(state.joinDisplayName)
              })
            });
            setRoom(payload.data.room, { playerToken: payload.data.playerToken, skipReveal: true });
          });
        },
        "copy-invite-url": async () => {
          if (state.room?.inviteCode) {
            await copyText(getInviteUrl(state.room.inviteCode), "招待URLをコピーしました。");
          }
        },
        "open-champion-history": async () => {
          await openChampionHistory();
        },
        "close-champion-history": async () => {
          closeChampionHistory();
        },
        "start-game": async () => {
          await runAction(async () => {
            let payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/start-player`, {
              startPlayerId: state.selectedStartPlayerId
            });
            setRoom(payload.data.room);
            payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/start`, { deckId: "default" });
            clearDecisionState();
            setRoom(payload.data.room);
          });
        },
        "swap-selection": async () => {
          if (state.draftSelectedTileIds.length === 2) {
            state.draftSelectedTileIds = [state.draftSelectedTileIds[1], state.draftSelectedTileIds[0]];
            sanitizeManualBreaks();
            renderCurrentView({ includeReveal: false });
          }
        },
        "clear-selection": async () => {
          state.draftSelectedTileIds = [];
          state.draftManualBreaks = [];
          renderCurrentView({ includeReveal: false });
        },
        "submit-word": async () => {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/submit`, buildSubmitPayload(room));
            state.selectedVoteTarget = "";
            state.selectedHostTarget = "";
            setRoom(payload.data.room);
          });
        },
        "submit-vote": async () => {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/vote`, {
              targetPlayerId: state.selectedVoteTarget
            });
            state.selectedVoteTarget = "";
            setRoom(payload.data.room);
          });
        },
        "submit-revote": async () => {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/revote`, {
              targetPlayerId: state.selectedHostTarget
            });
            state.selectedHostTarget = "";
            setRoom(payload.data.room);
          });
        },
        "submit-host-pick": async () => {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/host-decision`, {
              winnerPlayerId: state.selectedHostTarget
            });
            state.selectedHostTarget = "";
            setRoom(payload.data.room);
          });
        },
        "proceed-round": async () => {
          await runAction(async () => {
            const room = state.room;
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/rounds/${room.game.roundIndex}/proceed`, {});
            setRoom(payload.data.room);
          });
        },
        "submit-final-vote": async () => {
          await runAction(async () => {
            const endpoint = state.room.game.phase === "final_revote" ? "final-revote" : "final-vote";
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/${endpoint}`, {
              candidateId: state.selectedFinalTarget
            });
            state.selectedFinalTarget = "";
            setRoom(payload.data.room);
          });
        },
        "submit-final-host-pick": async () => {
          await runAction(async () => {
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/final-host-decision`, {
              candidateId: state.selectedFinalTarget
            });
            state.selectedFinalTarget = "";
            setRoom(payload.data.room);
          });
        },
        "restart-game": async () => {
          await runAction(async () => {
            const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/restart`, {});
            clearDecisionState();
            setRoom(payload.data.room, { skipReveal: true });
          });
        }
      };

      document.addEventListener("input", (event) => {
        const field = event.target.closest("[data-field]");
        if (!field) {
          return;
        }
        updateFieldState(field.dataset.field, field.value);
      });

      document.addEventListener("click", async (event) => {
        for (const { selector, handle } of selectionClickHandlers) {
          const matched = event.target.closest(selector);
          if (matched) {
            handle(matched);
            return;
          }
        }

        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) {
          return;
        }
        const actionHandler = actionHandlers[actionButton.dataset.action];
        if (actionHandler) {
          await actionHandler();
        }
      });

      els.closeRevealBtn.addEventListener("click", () => {
        actionHandlers["close-reveal"]();
      });

      els.closeHistoryBtn.addEventListener("click", () => {
        actionHandlers["close-champion-history"]();
      });

      els.historyOverlay.addEventListener("click", (event) => {
        if (event.target === els.historyOverlay) {
          actionHandlers["close-champion-history"]();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.championHistoryOpen) {
          actionHandlers["close-champion-history"]();
        }
      });

      async function initializeApp() {
        const params = new URLSearchParams(window.location.search);
        const apiBaseUrl = params.get("apiBaseUrl");
        const invite = params.get("invite");
        state.apiBaseUrl = apiBaseUrl ? apiBaseUrl.replace(/\/$/, "") : resolveDefaultApiBaseUrl();
        if (invite) {
          state.inviteCode = invite;
        }

        ensureApiNetworkHints();
        warmApiConnection();

        state.isLoading = false;
        render({ immediate: true });

        const championsTask = loadRecentChampions()
          .then(() => {
            renderCurrentView({ includeReveal: false });
          })
          .catch(() => {});

        try {
          const restored = await restoreSession();
          if (restored) {
            render({ immediate: true });
          }
        } catch (error) {
          exitToWelcome({
            errorMessage: describeAppError(error, "restore"),
            preserveInviteCode: false
          });
          render({ immediate: true });
        }

        await championsTask;
      }

      document.addEventListener("visibilitychange", async () => {
        clearPollTimer();
        if (document.visibilityState === "visible" && shouldPoll() && !state.pendingAction) {
          try {
            const changed = await refreshRoom();
            if (changed) {
              render();
              return;
            }
          } catch (error) {
            if (!recoverLostSession(error, "refresh")) {
              setBackgroundSyncIssue(error);
            }
          }
          renderPassiveSyncUi();
          schedulePoll();
          return;
        }
        schedulePoll();
      });

      function flushRender() {
        if (state.isLoading && !state.room) {
          setBanner();
          const loadingKey = "loading";
          if (state.renderCache.loadingKey !== loadingKey) {
            state.renderCache.loadingKey = loadingKey;
            state.renderCache.appKey = "";
          els.app.innerHTML = `<div class="card"><h2>読み込み中</h2><p>ルーム情報と最近の優勝ワードを確認しています。</p></div>`;
          }
          renderReveal();
          renderChampionHistoryOverlay();
          return;
        }

        state.renderCache.loadingKey = "";
        renderApp();
        renderReveal();
        renderChampionHistoryOverlay();
      }

      function render(options = {}) {
        if (options.immediate) {
          if (state.renderFrame) {
            window.cancelAnimationFrame(state.renderFrame);
            state.renderFrame = 0;
          }
          flushRender();
          return;
        }

        if (state.renderFrame) {
          return;
        }

        state.renderFrame = window.requestAnimationFrame(() => {
          state.renderFrame = 0;
          flushRender();
        });
      }

      initializeApp();
    </script>
  </body>
</html>
