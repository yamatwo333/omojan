<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おもじゃん 管理画面</title>
    <style>
      :root {
        --paper: #f6efdb;
        --paper-deep: #ecdfb7;
        --ink: #1f1812;
        --green: #24452f;
        --gold: #b28a32;
        --red: #b84431;
        --line: rgba(118, 89, 63, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 34%),
          repeating-linear-gradient(
            -35deg,
            rgba(102, 86, 58, 0.04) 0,
            rgba(102, 86, 58, 0.04) 2px,
            transparent 2px,
            transparent 15px
          ),
          linear-gradient(180deg, #f7f1df, #ecdfb7);
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .hero {
        display: grid;
        gap: 8px;
      }

      .hero h1 {
        color: var(--green);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-size: clamp(30px, 5vw, 42px);
      }

      .hero p {
        line-height: 1.7;
      }

      .meta {
        display: inline-flex;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(36, 69, 47, 0.08);
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
      }

      .stack {
        display: grid;
        gap: 16px;
        margin-top: 22px;
      }

      .admin-tabs {
        display: flex;
        gap: 10px;
      }

      .admin-tab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.32);
        background: rgba(255, 250, 238, 0.94);
        color: var(--green);
        font-weight: 800;
      }

      .admin-tab.active {
        background: linear-gradient(180deg, rgba(47, 106, 66, 0.98), rgba(36, 79, 49, 0.98));
        color: #f7f1df;
        border-color: rgba(24, 53, 33, 0.24);
      }

      .card {
        padding: 18px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 14px 32px rgba(29, 22, 15, 0.08);
      }

      .card h2 {
        color: var(--green);
        font-size: 20px;
      }

      .field-grid {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--green);
        font-weight: 700;
        font-size: 14px;
      }

      .input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid rgba(100, 73, 47, 0.18);
        border-radius: 14px;
        background: rgba(255, 250, 242, 0.95);
        color: var(--ink);
        font: inherit;
      }

      .input[readonly] {
        color: rgba(31, 24, 18, 0.72);
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        cursor: pointer;
        font: inherit;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        padding: 13px 16px;
        border-radius: 16px;
        font-weight: 800;
      }

      .btn.primary {
        background: linear-gradient(180deg, #c7523d, #b0402d);
        color: #fff6ef;
      }

      .btn.secondary {
        background: rgba(255, 250, 238, 0.96);
        color: var(--green);
        border: 1px solid rgba(184, 138, 50, 0.38);
      }

      .btn.accent {
        background: linear-gradient(180deg, #2f6a42, #244f31);
        color: #f7f1df;
        border: 1px solid rgba(24, 53, 33, 0.24);
      }

      .btn:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .summary-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .summary-pill {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(36, 69, 47, 0.08);
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
      }

      .summary-pill strong {
        color: var(--ink);
      }

      .toolbar {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .action-block {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .action-title {
        color: var(--green);
        font-size: 14px;
        font-weight: 800;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.38);
        background: rgba(255, 250, 238, 0.96);
        color: var(--green);
        font-weight: 800;
      }

      .chip.active {
        background: rgba(36, 69, 47, 0.12);
        border-color: rgba(36, 69, 47, 0.28);
      }

      .message,
      .error {
        padding: 12px 14px;
        border-radius: 14px;
        line-height: 1.6;
        box-shadow: 0 10px 24px rgba(29, 22, 15, 0.08);
      }

      .message {
        background: rgba(255, 250, 242, 0.98);
        border: 1px solid rgba(36, 69, 47, 0.18);
        color: var(--green);
      }

      .error {
        background: rgba(255, 244, 240, 0.98);
        border: 1px solid rgba(184, 68, 49, 0.18);
        color: #8b2319;
      }

      .feedback-dock {
        position: sticky;
        top: 12px;
        z-index: 12;
        margin-top: 14px;
      }

      .feedback-dock:empty {
        display: none;
      }

      .tile-list {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .history-list {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 16px;
      }

      .pagination-label {
        color: rgba(31, 24, 18, 0.68);
        font-size: 13px;
        font-weight: 700;
      }

      .pagination-actions {
        display: flex;
        gap: 8px;
      }

      .page-btn {
        min-width: 88px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(184, 138, 50, 0.28);
        background: rgba(255, 250, 238, 0.96);
        color: var(--green);
        font-weight: 800;
      }

      .page-btn:disabled {
        cursor: default;
        opacity: 0.45;
      }

      .history-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(100, 73, 47, 0.14);
        background: rgba(255, 252, 246, 0.92);
      }

      .history-main {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .history-phrase {
        color: var(--ink);
        font-size: 18px;
        font-weight: 800;
        line-height: 1.4;
        word-break: break-word;
      }

      .history-meta-line {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
        color: rgba(31, 24, 18, 0.62);
        font-size: 13px;
        line-height: 1.5;
      }

      .history-meta-line strong {
        color: var(--green);
        font-weight: 800;
      }

      .tile-row {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid rgba(100, 73, 47, 0.14);
        background: rgba(255, 252, 246, 0.92);
      }

      .tile-order {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: rgba(36, 69, 47, 0.08);
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
      }

      .tile-main {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .tile-input {
        min-width: 0;
        padding: 10px 12px;
        border-radius: 12px;
      }

      .tile-id {
        color: rgba(31, 24, 18, 0.62);
        font-size: 12px;
        line-height: 1.4;
        word-break: break-all;
      }

      .tile-meta {
        display: flex;
        align-items: center;
      }

      .toggle {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        color: var(--green);
        font-weight: 700;
        font-size: 14px;
        white-space: nowrap;
      }

      .tile-remove {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(184, 68, 49, 0.1);
        color: var(--red);
        font-weight: 800;
        white-space: nowrap;
      }

      .hint {
        margin-top: 10px;
        color: rgba(31, 24, 18, 0.68);
        font-size: 13px;
      }

      .subhint {
        margin-top: 6px;
        color: rgba(31, 24, 18, 0.58);
        font-size: 12px;
        line-height: 1.6;
      }

      .empty-state {
        padding: 18px 14px;
        border-radius: 16px;
        border: 1px dashed rgba(100, 73, 47, 0.22);
        color: rgba(31, 24, 18, 0.62);
        text-align: center;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 640px) {
        main {
          padding-inline: 12px;
        }

        .card {
          padding: 16px;
        }

        .tile-row {
          grid-template-columns: 42px minmax(0, 1fr);
        }

        .history-row {
          grid-template-columns: minmax(0, 1fr);
        }

        .tile-meta {
          grid-column: 1 / 2;
        }

        .tile-remove {
          grid-column: 2 / 3;
          justify-self: end;
        }

        .history-row .tile-remove {
          justify-self: end;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>おもじゃん 管理画面</h1>
        <p>次の新規ゲームから使うデッキを編集します。</p>
        <div class="meta" id="apiMeta">API 接続先を確認中</div>
      </section>

      <div class="feedback-dock" id="feedback"></div>

      <section class="stack">
        <section class="card">
          <h2>接続</h2>
          <div class="field-grid">
            <div class="field">
              <label for="apiBaseUrl">API</label>
              <input id="apiBaseUrl" class="input" type="text" readonly />
            </div>
            <div class="field">
              <label for="adminPasscode">共通パスコード</label>
              <input id="adminPasscode" class="input" type="password" placeholder="管理用パスコード" />
            </div>
          </div>
          <div class="button-row">
            <button class="btn primary" id="loadDeckBtn" type="button">デッキを読む</button>
            <button class="btn secondary" id="clearPasscodeBtn" type="button">パスコードを消す</button>
          </div>
        </section>

        <div class="admin-tabs" id="adminTabs" hidden>
          <button class="admin-tab active" id="deckTabBtn" type="button" data-admin-tab="deck">ワード一覧</button>
          <button class="admin-tab" id="historyTabBtn" type="button" data-admin-tab="history">総合優勝ワード履歴</button>
        </div>

        <section class="card" id="deckCard" hidden>
          <h2>default デッキ</h2>
          <div class="field-grid">
            <div class="field">
              <label for="deckName">デッキ名</label>
              <input id="deckName" class="input" type="text" maxlength="40" />
            </div>
            <div class="field">
              <label for="searchInput">ワードを検索</label>
              <input id="searchInput" class="input" type="text" maxlength="40" placeholder="ワードや tileId で検索" />
            </div>
          </div>

          <div class="summary-pills" id="summaryPills"></div>

          <section class="toolbar">
            <div class="chip-row" id="filterChipRow">
              <button class="chip active" type="button" data-filter-mode="all">すべて</button>
              <button class="chip" type="button" data-filter-mode="enabled">有効</button>
              <button class="chip" type="button" data-filter-mode="disabled">無効</button>
            </div>

            <div class="button-row">
              <button class="btn secondary" id="appendCsvBtn" type="button">CSVから追加</button>
              <button class="btn secondary" id="replaceCsvBtn" type="button">CSVで置換</button>
            </div>
            <p class="subhint">CSV は `text` 列だけでも使えます。`tileId,text,enabled` 形式にも対応します。</p>
          </section>

          <input id="csvFileInput" class="sr-only" type="file" accept=".csv,text/csv" />
          <div class="hint">空のワードは保存できません。削除したいワードは行ごと消します。</div>
          <section class="action-block">
            <div class="action-title">ワード一覧の操作</div>
            <div class="button-row">
              <button class="btn accent" id="addTileBtn" type="button">新しいワードを追加</button>
              <button class="btn primary" id="saveDeckBtn" type="button">保存する</button>
              <button class="btn secondary" id="reloadDeckBtn" type="button">読み直す</button>
            </div>
          </section>
          <div class="tile-list" id="tileList"></div>
          <div class="pagination" id="tilePagination"></div>
        </section>

        <section class="card" id="historyCard" hidden>
          <h2>総合優勝ワード履歴</h2>
          <div class="summary-pills" id="historySummaryPills"></div>
          <div class="button-row">
            <button class="btn secondary" id="reloadHistoryBtn" type="button">履歴を読み直す</button>
          </div>
          <div class="history-list" id="historyList"></div>
          <div class="pagination" id="historyPagination"></div>
        </section>
      </section>
    </main>

    <script>
      const LOCAL_API_BASE_URL = "http://127.0.0.1:8788/v1";
      const PUBLIC_DEV_API_BASE_URL = "https://nglzfg3co5.execute-api.ap-northeast-1.amazonaws.com/dev/v1";
      const PASSCODE_KEY = "omojan-admin-passcode";
      const TILE_PAGE_SIZE = 20;
      const HISTORY_PAGE_SIZE = 12;

      const state = {
        apiBaseUrl: "",
        passcode: "",
        deck: null,
        searchQuery: "",
        filterMode: "all",
        activeTab: "deck",
        tilePage: 1,
        historyPage: 1,
        importMode: "append",
        championHistory: [],
        pending: false,
        feedback: "",
        error: "",
        feedbackTimer: 0
      };

      const els = {
        apiMeta: document.getElementById("apiMeta"),
        apiBaseUrl: document.getElementById("apiBaseUrl"),
        adminPasscode: document.getElementById("adminPasscode"),
        loadDeckBtn: document.getElementById("loadDeckBtn"),
        clearPasscodeBtn: document.getElementById("clearPasscodeBtn"),
        feedback: document.getElementById("feedback"),
        adminTabs: document.getElementById("adminTabs"),
        deckTabBtn: document.getElementById("deckTabBtn"),
        historyTabBtn: document.getElementById("historyTabBtn"),
        deckCard: document.getElementById("deckCard"),
        deckName: document.getElementById("deckName"),
        searchInput: document.getElementById("searchInput"),
        summaryPills: document.getElementById("summaryPills"),
        saveDeckBtn: document.getElementById("saveDeckBtn"),
        reloadDeckBtn: document.getElementById("reloadDeckBtn"),
        historyCard: document.getElementById("historyCard"),
        historySummaryPills: document.getElementById("historySummaryPills"),
        reloadHistoryBtn: document.getElementById("reloadHistoryBtn"),
        historyList: document.getElementById("historyList"),
        historyPagination: document.getElementById("historyPagination"),
        addTileBtn: document.getElementById("addTileBtn"),
        appendCsvBtn: document.getElementById("appendCsvBtn"),
        replaceCsvBtn: document.getElementById("replaceCsvBtn"),
        csvFileInput: document.getElementById("csvFileInput"),
        tileList: document.getElementById("tileList"),
        tilePagination: document.getElementById("tilePagination")
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function resolveDefaultApiBaseUrl() {
        const { hostname, protocol } = window.location;
        if (protocol === "file:") {
          return LOCAL_API_BASE_URL;
        }
        if (hostname === "localhost" || hostname === "127.0.0.1") {
          return LOCAL_API_BASE_URL;
        }
        return PUBLIC_DEV_API_BASE_URL;
      }

      function createLocalTile() {
        return {
          tileId: `tile_local_${Date.now()}_${Math.random().toString(16).slice(2, 6)}`,
          text: "",
          enabled: true
        };
      }

      function setFeedback(message = "", isError = false, autoHideMs = 0) {
        if (state.feedbackTimer) {
          window.clearTimeout(state.feedbackTimer);
          state.feedbackTimer = 0;
        }
        state.feedback = isError ? "" : message;
        state.error = isError ? message : "";
        const duration = message ? (autoHideMs || (isError ? 4200 : 2600)) : 0;
        if (duration > 0) {
          state.feedbackTimer = window.setTimeout(() => {
            state.feedback = "";
            state.error = "";
            state.feedbackTimer = 0;
            renderFeedback();
          }, duration);
        }
      }

      function buildSummaryPills() {
        if (!state.deck) {
          return "";
        }
        const enabledCount = state.deck.tiles.filter((tile) => tile.enabled !== false).length;
        const visibleCount = getFilteredTiles().length;
        const totalPages = Math.max(1, Math.ceil(visibleCount / TILE_PAGE_SIZE));
        return `
          <span class="summary-pill">version<strong>${escapeHtml(state.deck.version)}</strong></span>
          <span class="summary-pill">総数<strong>${escapeHtml(state.deck.tiles.length)}</strong></span>
          <span class="summary-pill">有効<strong>${escapeHtml(enabledCount)}</strong></span>
          <span class="summary-pill">表示<strong>${escapeHtml(visibleCount)}</strong></span>
          <span class="summary-pill">ページ<strong>${escapeHtml(totalPages)}</strong></span>
        `;
      }

      function buildHistorySummaryPills() {
        const totalPages = Math.max(1, Math.ceil(state.championHistory.length / HISTORY_PAGE_SIZE));
        return `
          <span class="summary-pill">履歴<strong>${escapeHtml(state.championHistory.length)}</strong></span>
          <span class="summary-pill">ページ<strong>${escapeHtml(totalPages)}</strong></span>
        `;
      }

      function renderFeedback() {
        if (state.error) {
          els.feedback.innerHTML = `<div class="error">${escapeHtml(state.error)}</div>`;
          return;
        }
        if (state.feedback) {
          els.feedback.innerHTML = `<div class="message">${escapeHtml(state.feedback)}</div>`;
          return;
        }
        els.feedback.innerHTML = "";
      }

      function getFilteredTiles() {
        if (!state.deck) {
          return [];
        }
        const query = String(state.searchQuery || "").trim().toLowerCase();
        return state.deck.tiles
          .map((tile, index) => ({ tile, index }))
          .filter(({ tile }) => {
            if (state.filterMode === "enabled" && tile.enabled === false) {
              return false;
            }
            if (state.filterMode === "disabled" && tile.enabled !== false) {
              return false;
            }
            if (!query) {
              return true;
            }
            return `${tile.text} ${tile.tileId || ""}`.toLowerCase().includes(query);
          });
      }

      function buildPaginationMarkup({ page, totalPages, target }) {
        if (totalPages <= 1) {
          return "";
        }
        return `
          <div class="pagination-label">${escapeHtml(page)} / ${escapeHtml(totalPages)} ページ</div>
          <div class="pagination-actions">
            <button
              class="page-btn"
              type="button"
              data-page-target="${escapeHtml(target)}"
              data-page-direction="prev"
              ${page <= 1 ? "disabled" : ""}
            >前へ</button>
            <button
              class="page-btn"
              type="button"
              data-page-target="${escapeHtml(target)}"
              data-page-direction="next"
              ${page >= totalPages ? "disabled" : ""}
            >次へ</button>
          </div>
        `;
      }

      function getTilePaginationState() {
        const filteredTiles = getFilteredTiles();
        const totalPages = Math.max(1, Math.ceil(filteredTiles.length / TILE_PAGE_SIZE));
        state.tilePage = Math.min(Math.max(state.tilePage, 1), totalPages);
        const startIndex = (state.tilePage - 1) * TILE_PAGE_SIZE;
        return {
          filteredTiles,
          totalPages,
          page: state.tilePage,
          pageItems: filteredTiles.slice(startIndex, startIndex + TILE_PAGE_SIZE)
        };
      }

      function renderTiles() {
        if (!state.deck) {
          els.tileList.innerHTML = "";
          els.tilePagination.innerHTML = "";
          return;
        }
        const { filteredTiles, pageItems, totalPages, page } = getTilePaginationState();
        if (!filteredTiles.length) {
          els.tileList.innerHTML = `<div class="empty-state">一致するワードはありません。</div>`;
          els.tilePagination.innerHTML = "";
          return;
        }
        els.tileList.innerHTML = pageItems
          .map(
            ({ tile, index }) => `
              <article class="tile-row">
                <div class="tile-order">${index + 1}</div>
                <div class="tile-main">
                  <input
                    id="tile-text-${index}"
                    class="input tile-input"
                    type="text"
                    maxlength="40"
                    value="${escapeHtml(tile.text || "")}"
                    data-tile-text-index="${index}"
                    placeholder="ワード"
                  />
                  <div class="tile-id">${escapeHtml(tile.tileId || "新規ワード")}</div>
                </div>
                <div class="tile-meta">
                  <label class="toggle">
                    <input type="checkbox" data-tile-enabled-index="${index}" ${tile.enabled !== false ? "checked" : ""} />
                    有効
                  </label>
                </div>
                <button class="tile-remove" type="button" data-remove-index="${index}">削除</button>
              </article>
            `
          )
          .join("");
        els.tilePagination.innerHTML = buildPaginationMarkup({ page, totalPages, target: "tiles" });
      }

      function formatWonAt(value) {
        if (!value) {
          return "日時不明";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return date.toLocaleString("ja-JP", {
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function renderChampionHistory() {
        if (!state.championHistory.length) {
          els.historyList.innerHTML = `<div class="empty-state">総合優勝ワード履歴はまだありません。</div>`;
          els.historyPagination.innerHTML = "";
          return;
        }

        const totalPages = Math.max(1, Math.ceil(state.championHistory.length / HISTORY_PAGE_SIZE));
        state.historyPage = Math.min(Math.max(state.historyPage, 1), totalPages);
        const startIndex = (state.historyPage - 1) * HISTORY_PAGE_SIZE;
        const pageItems = state.championHistory.slice(startIndex, startIndex + HISTORY_PAGE_SIZE);

        els.historyList.innerHTML = pageItems
          .map(
            (item) => `
              <article class="history-row">
                <div class="history-main">
                  <div class="history-phrase">${escapeHtml(item.phrase)}</div>
                  <div class="history-meta-line">
                    <strong>${escapeHtml(item.displayName)}</strong>
                    <span>${escapeHtml(formatWonAt(item.wonAt))}</span>
                  </div>
                  <div class="tile-id">${escapeHtml(item.championId)}</div>
                </div>
                <button class="tile-remove" type="button" data-remove-champion-id="${escapeHtml(item.championId)}">削除</button>
              </article>
            `
          )
          .join("");
        els.historyPagination.innerHTML = buildPaginationMarkup({
          page: state.historyPage,
          totalPages,
          target: "history"
        });
      }

      function render() {
        els.apiBaseUrl.value = state.apiBaseUrl;
        els.apiMeta.textContent = `API: ${state.apiBaseUrl}`;
        els.adminPasscode.value = state.passcode;
        els.loadDeckBtn.disabled = state.pending;
        els.clearPasscodeBtn.disabled = state.pending;
        els.saveDeckBtn.disabled = state.pending || !state.deck;
        els.reloadDeckBtn.disabled = state.pending || !state.deck;
        els.reloadHistoryBtn.disabled = state.pending || !state.deck;
        els.addTileBtn.disabled = state.pending || !state.deck;
        els.appendCsvBtn.disabled = state.pending || !state.deck;
        els.replaceCsvBtn.disabled = state.pending || !state.deck;
        renderFeedback();

        if (!state.deck) {
          els.adminTabs.hidden = true;
          els.deckCard.hidden = true;
          els.historyCard.hidden = true;
          return;
        }

        els.adminTabs.hidden = false;
        els.deckTabBtn.classList.toggle("active", state.activeTab === "deck");
        els.historyTabBtn.classList.toggle("active", state.activeTab === "history");
        els.deckCard.hidden = state.activeTab !== "deck";
        els.historyCard.hidden = state.activeTab !== "history";
        els.deckName.value = state.deck.deckName || "";
        els.searchInput.value = state.searchQuery;
        els.summaryPills.innerHTML = buildSummaryPills();
        els.historySummaryPills.innerHTML = buildHistorySummaryPills();
        document.querySelectorAll("[data-filter-mode]").forEach((button) => {
          button.classList.toggle("active", button.dataset.filterMode === state.filterMode);
        });
        renderTiles();
        renderChampionHistory();
      }

      async function fetchJson(pathname, options = {}) {
        const response = await fetch(`${state.apiBaseUrl}${pathname}`, {
          method: options.method || "GET",
          headers: {
            "content-type": "application/json",
            "X-Omojan-Admin-Passcode": state.passcode,
            ...(options.headers || {})
          },
          body: options.body ? JSON.stringify(options.body) : undefined
        });
        const payload = await response.json();
        if (!response.ok || payload.ok === false) {
          throw new Error(payload?.error?.message || "通信に失敗しました。");
        }
        return payload.data;
      }

      async function loadChampionHistory() {
        const data = await fetchJson("/admin/champions?limit=300");
        state.championHistory = data.items || [];
      }

      function validateDeckBeforeSave() {
        if (!state.passcode.trim()) {
          throw new Error("共通パスコードを入力してください。");
        }
        if (!state.deck) {
          throw new Error("先にデッキを読んでください。");
        }
        if (!state.deck.tiles.length) {
          throw new Error("ワードを1つ以上入れてください。");
        }
        for (const [index, tile] of state.deck.tiles.entries()) {
          if (!String(tile.text || "").trim()) {
            throw new Error(`ワード ${index + 1} を入力してください。`);
          }
        }
      }

      function parseCsv(text) {
        const rows = [];
        let currentCell = "";
        let currentRow = [];
        let insideQuotes = false;
        const source = String(text || "").replace(/^\uFEFF/, "");

        for (let index = 0; index < source.length; index += 1) {
          const char = source[index];
          const nextChar = source[index + 1];

          if (char === '"') {
            if (insideQuotes && nextChar === '"') {
              currentCell += '"';
              index += 1;
            } else {
              insideQuotes = !insideQuotes;
            }
            continue;
          }

          if (!insideQuotes && char === ",") {
            currentRow.push(currentCell);
            currentCell = "";
            continue;
          }

          if (!insideQuotes && (char === "\n" || char === "\r")) {
            if (char === "\r" && nextChar === "\n") {
              index += 1;
            }
            currentRow.push(currentCell);
            if (currentRow.some((cell) => String(cell).trim() !== "")) {
              rows.push(currentRow);
            }
            currentCell = "";
            currentRow = [];
            continue;
          }

          currentCell += char;
        }

        currentRow.push(currentCell);
        if (currentRow.some((cell) => String(cell).trim() !== "")) {
          rows.push(currentRow);
        }

        return rows.map((row) => row.map((cell) => String(cell).trim()));
      }

      function parseEnabledValue(value) {
        const normalized = String(value || "").trim().toLowerCase();
        if (!normalized) {
          return true;
        }
        if (["false", "0", "off", "no", "disabled", "無効"].includes(normalized)) {
          return false;
        }
        return true;
      }

      function buildImportedTiles(csvText) {
        const rows = parseCsv(csvText);
        if (!rows.length) {
          throw new Error("CSV にデータがありません。");
        }

        const normalizedHeaders = rows[0].map((cell) => cell.toLowerCase());
        const hasHeader = normalizedHeaders.some((cell) => ["tileid", "tile_id", "text", "word", "enabled"].includes(cell));
        const dataRows = hasHeader ? rows.slice(1) : rows;
        const tileIdIndex = hasHeader ? normalizedHeaders.findIndex((cell) => ["tileid", "tile_id"].includes(cell)) : -1;
        const textIndex = hasHeader ? normalizedHeaders.findIndex((cell) => ["text", "word"].includes(cell)) : 0;
        const enabledIndex = hasHeader ? normalizedHeaders.findIndex((cell) => cell === "enabled") : 1;

        const tiles = dataRows
          .map((row, index) => {
            const text = String(row[textIndex] || "").trim();
            if (!text) {
              return null;
            }
            const importedTileId = tileIdIndex >= 0 ? String(row[tileIdIndex] || "").trim() : "";
            return {
              tileId: importedTileId || createLocalTile().tileId,
              text,
              enabled: parseEnabledValue(enabledIndex >= 0 ? row[enabledIndex] : "")
            };
          })
          .filter(Boolean);

        if (!tiles.length) {
          throw new Error("CSV に有効なワードがありません。");
        }

        return tiles;
      }

      function dedupeTilesByText(tiles) {
        const seenTexts = new Set();
        const deduped = [];
        let removedCount = 0;

        for (const tile of tiles) {
          const text = String(tile?.text || "").trim();
          if (!text) {
            deduped.push(tile);
            continue;
          }
          if (seenTexts.has(text)) {
            removedCount += 1;
            continue;
          }
          seenTexts.add(text);
          deduped.push(tile);
        }

        return { tiles: deduped, removedCount };
      }

      async function loadDeck() {
        state.pending = true;
        setFeedback("");
        render();
        try {
          const [data] = await Promise.all([
            fetchJson("/admin/decks/default"),
            loadChampionHistory()
          ]);
          state.deck = {
            deckId: data.deckId,
            deckName: data.deckName,
            version: data.version,
            tiles: (data.tiles || []).map((tile) => ({
              tileId: tile.tileId,
              text: tile.text,
              enabled: tile.enabled !== false
            }))
          };
          state.tilePage = 1;
          state.historyPage = 1;
          state.activeTab = "deck";
          window.localStorage.setItem(PASSCODE_KEY, state.passcode);
          setFeedback("デッキを読み込みました。");
        } catch (error) {
          setFeedback(error instanceof Error ? error.message : "デッキの取得に失敗しました。", true);
        } finally {
          state.pending = false;
          render();
        }
      }

      async function saveDeck() {
        try {
          validateDeckBeforeSave();
        } catch (error) {
          setFeedback(error instanceof Error ? error.message : "保存前チェックに失敗しました。", true);
          render();
          return;
        }

        state.pending = true;
        setFeedback("");
        render();
        try {
          const deduped = dedupeTilesByText(state.deck.tiles);
          const data = await fetchJson("/admin/decks/default", {
            method: "PUT",
            body: {
              deckName: state.deck.deckName,
              version: state.deck.version,
              tiles: deduped.tiles.map((tile) => ({
                tileId: tile.tileId,
                text: String(tile.text || "").trim(),
                enabled: tile.enabled !== false
              }))
            }
          });
          state.deck = {
            deckId: data.deckId,
            deckName: data.deckName,
            version: data.version,
            tiles: (data.tiles || []).map((tile) => ({
              tileId: tile.tileId,
              text: tile.text,
              enabled: tile.enabled !== false
            }))
          };
          state.tilePage = 1;
          window.localStorage.setItem(PASSCODE_KEY, state.passcode);
          setFeedback(
            deduped.removedCount
              ? `保存しました。重複ワードを${deduped.removedCount}件自動削除し、次の新規ゲームから反映されます。`
              : "保存しました。次の新規ゲームから反映されます。"
          );
        } catch (error) {
          setFeedback(error instanceof Error ? error.message : "保存に失敗しました。", true);
        } finally {
          state.pending = false;
          render();
        }
      }

      async function importCsv(file) {
        if (!state.deck) {
          setFeedback("先にデッキを読んでください。", true);
          render();
          return;
        }
        if (!file) {
          return;
        }

        try {
          const csvText = await file.text();
          const importedTiles = buildImportedTiles(csvText);
          const mergedTiles =
            state.importMode === "replace"
              ? importedTiles
              : [...importedTiles, ...state.deck.tiles];
          const deduped = dedupeTilesByText(mergedTiles);
          state.deck.tiles = deduped.tiles;
          state.searchQuery = "";
          state.filterMode = "all";
          state.tilePage = 1;
          setFeedback(
            state.importMode === "replace"
              ? `${state.deck.tiles.length}件で置き換えました${deduped.removedCount ? `。重複ワードを${deduped.removedCount}件自動削除しました` : ""}。`
              : `${importedTiles.length}件を追加しました${deduped.removedCount ? `。重複ワードを${deduped.removedCount}件自動削除しました` : ""}。`
          );
        } catch (error) {
          setFeedback(error instanceof Error ? error.message : "CSV の取り込みに失敗しました。", true);
        } finally {
          els.csvFileInput.value = "";
          render();
        }
      }

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.id === "adminPasscode") {
          state.passcode = target.value;
          return;
        }
        if (target.id === "deckName" && state.deck) {
          state.deck.deckName = target.value;
          return;
        }
        if (target.id === "searchInput") {
          state.searchQuery = target.value;
          state.tilePage = 1;
          render();
          return;
        }
        if (target.matches("[data-tile-text-index]") && state.deck) {
          const index = Number(target.dataset.tileTextIndex);
          state.deck.tiles[index].text = target.value;
          return;
        }
        if (target.matches("[data-tile-enabled-index]") && state.deck) {
          const index = Number(target.dataset.tileEnabledIndex);
          state.deck.tiles[index].enabled = target.checked;
        }
      });

      document.addEventListener("click", async (event) => {
        const removeChampionButton = event.target.closest("[data-remove-champion-id]");
        if (removeChampionButton) {
          const championId = removeChampionButton.dataset.removeChampionId;
          const confirmed = window.confirm("この総合優勝ワード履歴を削除します。続けますか？");
          if (!confirmed) {
            return;
          }
          state.pending = true;
          setFeedback("");
          render();
          try {
            await fetchJson(`/admin/champions/${encodeURIComponent(championId)}`, {
              method: "DELETE"
            });
            state.championHistory = state.championHistory.filter((item) => item.championId !== championId);
            state.historyPage = Math.max(1, state.historyPage);
            setFeedback("総合優勝ワード履歴を削除しました。");
          } catch (error) {
            setFeedback(error instanceof Error ? error.message : "履歴の削除に失敗しました。", true);
          } finally {
            state.pending = false;
            render();
          }
          return;
        }

        const removeButton = event.target.closest("[data-remove-index]");
        if (removeButton && state.deck) {
          const index = Number(removeButton.dataset.removeIndex);
          state.deck.tiles.splice(index, 1);
          render();
          return;
        }

        const pageButton = event.target.closest("[data-page-target]");
        if (pageButton) {
          const { pageTarget, pageDirection } = pageButton.dataset;
          if (pageTarget === "tiles") {
            state.tilePage = Math.max(1, state.tilePage + (pageDirection === "next" ? 1 : -1));
          }
          if (pageTarget === "history") {
            state.historyPage = Math.max(1, state.historyPage + (pageDirection === "next" ? 1 : -1));
          }
          render();
          return;
        }

        const tabButton = event.target.closest("[data-admin-tab]");
        if (tabButton && state.deck) {
          state.activeTab = tabButton.dataset.adminTab === "history" ? "history" : "deck";
          render();
          return;
        }

        if (event.target.id === "loadDeckBtn") {
          await loadDeck();
          return;
        }

        if (event.target.id === "saveDeckBtn") {
          await saveDeck();
          return;
        }

        if (event.target.id === "reloadDeckBtn") {
          await loadDeck();
          return;
        }

        if (event.target.id === "reloadHistoryBtn") {
          state.pending = true;
          setFeedback("");
          render();
          try {
            await loadChampionHistory();
            setFeedback("総合優勝ワード履歴を読み込みました。");
          } catch (error) {
            setFeedback(error instanceof Error ? error.message : "履歴の取得に失敗しました。", true);
          } finally {
            state.pending = false;
            render();
          }
          return;
        }

        if (event.target.id === "addTileBtn" && state.deck) {
          state.deck.tiles.unshift(createLocalTile());
          state.tilePage = 1;
          render();
          return;
        }

        const filterButton = event.target.closest("[data-filter-mode]");
        if (filterButton) {
          state.filterMode = filterButton.dataset.filterMode;
          state.tilePage = 1;
          render();
          return;
        }

        if (event.target.id === "appendCsvBtn") {
          state.importMode = "append";
          els.csvFileInput.click();
          return;
        }

        if (event.target.id === "replaceCsvBtn") {
          state.importMode = "replace";
          els.csvFileInput.click();
          return;
        }

        if (event.target.id === "clearPasscodeBtn") {
          state.passcode = "";
          window.localStorage.removeItem(PASSCODE_KEY);
          setFeedback("保存したパスコードを消しました。");
          render();
        }
      });

      els.csvFileInput.addEventListener("change", async () => {
        const [file] = els.csvFileInput.files || [];
        await importCsv(file);
      });

      function initialize() {
        const params = new URLSearchParams(window.location.search);
        state.apiBaseUrl = (params.get("apiBaseUrl") || resolveDefaultApiBaseUrl()).replace(/\/$/, "");
        state.passcode = window.localStorage.getItem(PASSCODE_KEY) || "";
        render();
        if (state.passcode) {
          loadDeck();
        }
      }

      initialize();
    </script>
  </body>
</html>
