        historyOverlay: document.getElementById("historyOverlay"),
        historyDialogBody: document.getElementById("historyDialogBody"),
        closeHistoryBtn: document.getElementById("closeHistoryBtn"),
        measureWord: document.getElementById("measureWord")
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function resolveDefaultApiBaseUrl() {
        const { hostname, protocol } = window.location;
        if (protocol === "file:") {
          return LOCAL_API_BASE_URL;
        }
        if (hostname === "localhost" || hostname === "127.0.0.1") {
          return LOCAL_API_BASE_URL;
        }
        return PUBLIC_DEV_API_BASE_URL;
      }

      function resolveApiOrigin(apiBaseUrl = state.apiBaseUrl) {
        try {
          return new URL(apiBaseUrl, window.location.href).origin;
        } catch {
          return "";
        }
      }

      function ensureApiNetworkHints(apiBaseUrl = state.apiBaseUrl) {
        const origin = resolveApiOrigin(apiBaseUrl);
        if (!origin || state.apiHintsOrigin === origin) {
          return;
        }
        state.apiHintsOrigin = origin;

        if (!document.head.querySelector(`link[data-omojan-api-hint="${origin}"][rel="dns-prefetch"]`)) {
          const dnsPrefetch = document.createElement("link");
          dnsPrefetch.rel = "dns-prefetch";
          dnsPrefetch.href = origin;
          dnsPrefetch.dataset.omojanApiHint = origin;
          document.head.appendChild(dnsPrefetch);
        }

        if (!document.head.querySelector(`link[data-omojan-api-preconnect="${origin}"]`)) {
          const preconnect = document.createElement("link");
          preconnect.rel = "preconnect";
          preconnect.href = origin;
          preconnect.crossOrigin = "anonymous";
          preconnect.dataset.omojanApiPreconnect = origin;
          document.head.appendChild(preconnect);
        }
      }

      function warmApiConnection(apiBaseUrl = state.apiBaseUrl) {
        const origin = resolveApiOrigin(apiBaseUrl);
        if (!origin || state.apiWarmupOrigin === origin) {
          return;
        }
        state.apiWarmupOrigin = origin;

        scheduleIdleTask(() => {
          fetch(`${apiBaseUrl.replace(/\/$/, "")}/health`, {
            method: "GET",
            cache: "no-store"
          }).catch(() => {});
        });
      }

      function scheduleIdleTask(task) {
        if (typeof window.requestIdleCallback === "function") {
          window.requestIdleCallback(task, { timeout: 1200 });
          return;
        }
        window.setTimeout(task, 180);
      }

      function normalizeInviteCodeInput(value) {
        const compact = String(value || "").toUpperCase().replace(/\s+/g, "");
        if (!compact) {
          return DEFAULT_INVITE_CODE_PREFIX;
        }
        if (compact === "OMO") {
          return DEFAULT_INVITE_CODE_PREFIX;
        }
        if (compact.startsWith(DEFAULT_INVITE_CODE_PREFIX)) {
          return compact;
        }
        if (compact.startsWith("OMO")) {
          return `${DEFAULT_INVITE_CODE_PREFIX}${compact.slice(3).replace(/^-+/, "")}`;
        }
        return `${DEFAULT_INVITE_CODE_PREFIX}${compact.replace(/^[-]+/, "")}`;
      }

      function hasUsableInviteCode(inviteCode) {
        return Boolean(inviteCode && inviteCode !== DEFAULT_INVITE_CODE_PREFIX);
      }

      function getStoredDisplayName() {
        return String(window.localStorage.getItem(APP_LAST_DISPLAY_NAME_KEY) || "").trim();
      }

      function saveStoredDisplayName(displayName) {
        const normalized = String(displayName || "").trim();
        if (!normalized) {
          return;
        }
        window.localStorage.setItem(APP_LAST_DISPLAY_NAME_KEY, normalized);
      }

      function getAutoJoinDisplayName() {
        const stored = getStoredDisplayName();
        if (stored) {
          return stored;
        }
        const suffix = String(state.deviceId || "").replace(/[^a-zA-Z0-9]/g, "").slice(-4).toUpperCase() || "0001";
        return `ゲスト${suffix}`;
      }

      function normalizeSizePresetId(sizePresetId) {
        if (sizePresetId === "xl") {
          return "large";
        }
        if (sizePresetId === "small" || sizePresetId === "medium") {
          return "medium";
        }
        if (sizePresetId === "tiny") {
          return "tiny";
        }
        return "large";
      }

      function ensureGoogleFontsLoaded(fontIds = []) {
        if (!fontIds.some((fontId) => REMOTE_FONT_IDS.has(fontId))) {
          return Promise.resolve();
        }
        if (state.googleFonts.promise) {
          return state.googleFonts.promise;
        }
        state.googleFonts.requested = true;
        state.googleFonts.promise = new Promise((resolve) => {
          if (!document.head.querySelector('link[data-omojan-fonts="preconnect-google"]')) {
            const preconnectGoogle = document.createElement("link");
            preconnectGoogle.rel = "preconnect";
            preconnectGoogle.href = "https://fonts.googleapis.com";
            preconnectGoogle.dataset.omojanFonts = "preconnect-google";
            document.head.appendChild(preconnectGoogle);
          }

          if (!document.head.querySelector('link[data-omojan-fonts="preconnect-gstatic"]')) {
            const preconnectGstatic = document.createElement("link");
            preconnectGstatic.rel = "preconnect";
            preconnectGstatic.href = "https://fonts.gstatic.com";
            preconnectGstatic.crossOrigin = "anonymous";
            preconnectGstatic.dataset.omojanFonts = "preconnect-gstatic";
            document.head.appendChild(preconnectGstatic);
          }

          const existing = document.head.querySelector('link[data-omojan-fonts="stylesheet"]');
          if (existing) {
            resolve(existing);
            return;
          }

          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = GOOGLE_FONTS_HREF;
          link.dataset.omojanFonts = "stylesheet";
          link.onload = () => {
            state.googleFonts.loaded = true;
            state.renderCache.appKey = "";
            resetIncrementalViewCaches();
            state.renderCache.revealKey = "";
            render();
            resolve(link);
          };
          link.onerror = () => resolve(link);
          document.head.appendChild(link);
        });
        return state.googleFonts.promise;
      }

      async function ensureFontsReady(fontIds = []) {
        const remoteFontIds = [...new Set(fontIds.filter((fontId) => REMOTE_FONT_IDS.has(fontId)))];
        if (!remoteFontIds.length) {
          return;
        }
        await ensureGoogleFontsLoaded(remoteFontIds);
        if (!document.fonts?.load) {
          return;
        }
        await Promise.all(
          remoteFontIds.map((fontId) => document.fonts.load(GOOGLE_FONT_DESCRIPTORS[fontId], "おもじゃん"))
        );
      }

      function collectVisibleFontIds(room = state.room, view = deriveView(room)) {
        const fontIds = new Set();
        if (view === "submit") {
          fontIds.add(state.draftFontId);
        }

        const reveal = getActiveReveal();
        if (reveal?.fontId) {
          fontIds.add(reveal.fontId);
        }

        const round = getCurrentRound(room);
        if (round?.submissions?.length) {
          round.submissions.forEach((submission) => fontIds.add(submission.fontId || "classic"));
        }
        if (round?.winner?.fontId) {
          fontIds.add(round.winner.fontId);
        }

        room?.game?.finalVote?.candidates?.forEach((candidate) => fontIds.add(candidate.fontId || "classic"));
        if (room?.game?.champion?.fontId) {
          fontIds.add(room.game.champion.fontId);
        }

        return [...fontIds];
      }

      function getCurrentRound(room = state.room) {
        if (!room || room.game.roundIndex === null || room.game.roundIndex === undefined) {
          return null;
        }
        return room.game.rounds?.[room.game.roundIndex] || null;
      }

      function getSelectedTiles(room = state.room) {
        if (!room) {
          return [];
        }
        const tileMap = new Map(room.myHand.map((tile) => [tile.tileId, tile]));
        return state.draftSelectedTileIds.map((tileId) => tileMap.get(tileId)).filter(Boolean);
      }

      function getDraftText(room = state.room) {
        return getSelectedTiles(room).map((tile) => tile.text).join("");
      }

      function getDraftDisplayText(room = state.room) {
        const tiles = getSelectedTiles(room);
        if (!tiles.length) {
          return "";
        }
        if (tiles.length === 1) {
          return tiles[0].text;
        }
        return `${tiles[0].text}${getWordGapSpaces(state.draftLineGapPreset)}${tiles[1].text}`;
      }

      function getBoundaryIndex(room = state.room) {
        const [first] = getSelectedTiles(room);
        return Array.from(first?.text || "").length || 0;
      }

      function normalizeBreaks(breaks, length) {
        return [...new Set(breaks)]
          .filter((value) => Number.isInteger(value) && value > 0 && value < length)
          .sort((a, b) => a - b);
      }

      function sanitizeManualBreaks(room = state.room) {
        const chars = Array.from(getDraftText(room));
        if (chars.length <= 1) {
          state.draftManualBreaks = [];
          return;
        }
        state.draftManualBreaks = normalizeBreaks(state.draftManualBreaks, chars.length);
      }

      function getFontClass(fontId) {
        return fonts.find((font) => font.id === fontId)?.className || "font-classic";
      }

      function getSizePreset(sizePresetId) {
        const normalizedId = normalizeSizePresetId(sizePresetId);
        return sizePresets.find((preset) => preset.id === normalizedId) || sizePresets[0];
      }

      function getSizePresetScale(sizePresetId) {
        return getSizePreset(sizePresetId).renderScale;
      }

      function getDraftReferenceBoardSize(previewNode) {
        const previewSize = getWordBoardInnerSize(previewNode, 320, 148);
        if (window.innerWidth > 767) {
          return previewSize;
        }
        const popupCardWidth = Math.min(window.innerWidth * 0.92, 520);
        return {
          width: Math.max(220, Math.round(popupCardWidth - 32)),
          height: Math.max(220, Math.round(Math.min(window.innerHeight * 0.42, 300)))
        };
      }

      function getPreviewDisplayFontSize(fontSize) {
        if (window.innerWidth > 767) {
          return fontSize;
        }
        const previewNode = document.getElementById("previewWord");
        const previewSize = getWordBoardInnerSize(previewNode, 280, 96);
        const referenceSize = getDraftReferenceBoardSize(previewNode);
        const widthScale = referenceSize.width ? previewSize.width / referenceSize.width : 0.76;
        const sizePreset = getSizePreset(state.draftSizePreset);
        const previewScaleMap = {
          large: 0.9,
          medium: 0.72,
          tiny: 0.52
        };
        const scale = Math.max(0.56, Math.min(1.04, widthScale * (previewScaleMap[sizePreset.id] || 0.72)));
        return Math.max(16, Math.min(128, Math.round(fontSize * scale)));
      }

      function getLineGapPreset(lineGapPresetId) {
        return lineGapPresets.find((preset) => preset.id === lineGapPresetId) || lineGapPresets[0];
      }

      function getWordGapSpaces(lineGapPresetId) {
        return getLineGapPreset(lineGapPresetId).spaces || "";
      }

      function getActivePlayerCount(room = state.room) {
        return Number(room?.activePlayerCount || room?.game?.activePlayerIds?.length || room?.playerCount || room?.game?.players?.length || 0);
      }

      function getHostPlayer(room = state.room) {
        return room?.game?.players?.find((player) => player.isHost) || null;
      }

      function isSpectator(room = state.room) {
        return room?.me?.role === "spectator" || room?.me?.isSpectator === true;
      }

      function allowsSelfVote(room = state.room) {
        return getActivePlayerCount(room) === 2;
      }

      function getStoredSessions() {
        try {
          const raw = window.localStorage.getItem(APP_SESSION_MAP_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function saveStoredSessions(sessions) {
        window.localStorage.setItem(APP_SESSION_MAP_KEY, JSON.stringify(sessions));
      }

      function migrateLegacySessionIfNeeded() {
        const legacyRoomId = window.localStorage.getItem(APP_ROOM_ID_KEY);
        const legacyToken = window.localStorage.getItem(APP_PLAYER_TOKEN_KEY);
        if (!legacyRoomId || !legacyToken) {
          return;
        }
        const sessions = getStoredSessions();
        if (!sessions[legacyRoomId]) {
          sessions[legacyRoomId] = {
            roomId: legacyRoomId,
            playerToken: legacyToken,
            inviteCode: "",
            updatedAt: new Date().toISOString()
          };
          saveStoredSessions(sessions);
        }
        window.sessionStorage.setItem(APP_ACTIVE_ROOM_ID_KEY, legacyRoomId);
        window.localStorage.removeItem(APP_ROOM_ID_KEY);
        window.localStorage.removeItem(APP_PLAYER_TOKEN_KEY);
      }

      function makeDeviceId() {
        if (window.crypto?.randomUUID) {
          return `dv_${window.crypto.randomUUID()}`;
        }
        return `dv_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;
      }

      function getOrCreateDeviceId() {
        const stored = String(window.localStorage.getItem(APP_DEVICE_ID_KEY) || "").trim();
        if (stored) {
          return stored;
        }
        const created = makeDeviceId();
        window.localStorage.setItem(APP_DEVICE_ID_KEY, created);
        return created;
      }

      function setFeedback(message = "", isError = false, autoHideMs = 0) {
        if (state.feedbackTimer) {
          window.clearTimeout(state.feedbackTimer);
          state.feedbackTimer = 0;
        }
        state.copyMessage = isError ? "" : message;
        state.errorMessage = isError ? message : "";
        const duration = message ? (autoHideMs || (isError ? 4200 : 2600)) : 0;
        if (duration > 0) {
          state.feedbackTimer = window.setTimeout(() => {
            state.copyMessage = "";
            state.errorMessage = "";
            state.feedbackTimer = 0;
            renderCurrentView({ includeReveal: false });
          }, duration);
        }
      }

      function applyWordMarkup(container, lines, fontClass, lineMode, fontSize, lineGapPreset = "none") {
        const classNames = ["word-board", fontClass];
        if (container.classList.contains("measure-word")) {
          classNames.push("measure-word");
        }
        if (container.dataset.variant) {
          classNames.push(container.dataset.variant);
        }
        if (container.dataset.boardSkin) {
          classNames.push(`board-skin-${container.dataset.boardSkin}`);
        }
        if (lineMode === "single") {
          classNames.push("is-single-line");
        }
        container.className = classNames.join(" ");
        container.style.fontSize = `${fontSize}px`;
        container.style.setProperty("--word-line-gap", getLineGapPreset(lineGapPreset).value);
        container.innerHTML = lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("");
      }

      function getWordBoardInnerSize(node, fallbackWidth = 320, fallbackHeight = 148) {
        if (!node) {
          return {
            width: fallbackWidth,
            height: fallbackHeight
          };
        }
        const styles = window.getComputedStyle(node);
        const horizontalPadding = Number.parseFloat(styles.paddingLeft || "0") + Number.parseFloat(styles.paddingRight || "0");
        const verticalPadding = Number.parseFloat(styles.paddingTop || "0") + Number.parseFloat(styles.paddingBottom || "0");
        return {
          width: Math.max(24, Math.round((node.clientWidth || fallbackWidth) - horizontalPadding)),
          height: Math.max(24, Math.round((node.clientHeight || fallbackHeight) - verticalPadding))
        };
      }

      function doesWordFit(lines, fontClass, lineMode, fontSize, width, height, lineGapPreset = "none") {
        const tolerance = 1;
        els.measureWord.dataset.variant = "";
        els.measureWord.style.width = `${width}px`;
        els.measureWord.style.height = `${height}px`;
        applyWordMarkup(els.measureWord, lines, fontClass, lineMode, fontSize, lineGapPreset);
        const lineEls = Array.from(els.measureWord.querySelectorAll(".word-line"));
        const tooWide = lineEls.some((line) => line.scrollWidth > width + tolerance);
        const tooTall = els.measureWord.scrollHeight > height + tolerance;
        return !(tooWide || tooTall);
      }

      function getMinimumFontSize(charsLength, lineMode, sizePresetId = "large") {
        const preset = getSizePreset(sizePresetId);
        const baseMin = lineMode === "single" ? preset.singleMin : preset.multiMin;
        if (lineMode === "single") {
          if (charsLength >= 18) {
            return Math.max(12, baseMin - 10);
          }
          if (charsLength >= 14) {
            return Math.max(12, baseMin - 6);
          }
          if (charsLength >= 10) {
            return Math.max(12, baseMin - 3);
          }
          return baseMin;
        }
        if (charsLength >= 18) {
          return Math.max(12, baseMin - 10);
        }
        if (charsLength >= 14) {
          return Math.max(12, baseMin - 6);
        }
        if (charsLength >= 10) {
          return Math.max(12, baseMin - 3);
        }
        return baseMin;
      }

      function measureLineFits(text, fontClass, fontSize, width, lineGapPreset = "none") {
        const tolerance = 6;
        els.measureWord.dataset.variant = "";
        els.measureWord.style.width = `${width}px`;
        els.measureWord.style.height = "120px";
        applyWordMarkup(els.measureWord, [text || " "], fontClass, "single", fontSize, lineGapPreset);
        const lineEl = els.measureWord.querySelector(".word-line");
        return lineEl ? lineEl.scrollWidth <= width + tolerance : true;
      }

      function getLastFittingEnd(chars, start, endLimit, fontClass, fontSize, width, lineGapPreset = "none") {
        let lastFit = start;
        for (let end = start + 1; end <= endLimit; end += 1) {
          const sample = chars.slice(start, end).join("");
          if (measureLineFits(sample, fontClass, fontSize, width, lineGapPreset)) {
            lastFit = end;
            continue;
          }
          break;
        }
        return lastFit > start ? lastFit : Math.min(start + 1, endLimit);
      }

      function splitForcedRange(chars, start, endLimit, fontClass, fontSize, width, lineGapPreset = "none") {
        const lines = [];
        let cursor = start;
        while (cursor < endLimit) {
          const next = getLastFittingEnd(chars, cursor, endLimit, fontClass, fontSize, width, lineGapPreset);
          lines.push(chars.slice(cursor, next).join(""));
          cursor = next;
        }
        return lines;
      }

      function buildBoundaryLines(chars, fontClass, fontSize, width, lineGapPreset = "none") {
        const boundary = getBoundaryIndex();
        const breaks = normalizeBreaks([boundary], chars.length);
        if (!breaks.length) {
          return splitForcedRange(chars, 0, chars.length, fontClass, fontSize, width, lineGapPreset);
        }
        const lines = [];
        let start = 0;
        [...breaks, chars.length].forEach((end) => {
          lines.push(...splitForcedRange(chars, start, end, fontClass, fontSize, width, lineGapPreset));
          start = end;
        });
        return lines.filter(Boolean);
      }

      function buildManualLines(chars, fontClass, fontSize, width, lineGapPreset = "none") {
        sanitizeManualBreaks();
        const forcedBreaks = normalizeBreaks(state.draftManualBreaks, chars.length);
        if (!forcedBreaks.length) {
          return splitForcedRange(chars, 0, chars.length, fontClass, fontSize, width, lineGapPreset).filter(Boolean);
        }

        const lines = [];
        let start = 0;
        let forcedIndex = 0;

        while (start < chars.length) {
          const forcedEnd = forcedBreaks[forcedIndex];
          if (forcedEnd) {
            const forcedText = chars.slice(start, forcedEnd).join("");
            if (measureLineFits(forcedText, fontClass, fontSize, width, lineGapPreset)) {
              lines.push(forcedText);
              start = forcedEnd;
              forcedIndex += 1;
              continue;
            }

            lines.push(...splitForcedRange(chars, start, forcedEnd, fontClass, fontSize, width, lineGapPreset));
            start = forcedEnd;
            forcedIndex += 1;
            continue;
          }

          lines.push(...splitForcedRange(chars, start, chars.length, fontClass, fontSize, width, lineGapPreset));
          break;
        }

        return lines.filter(Boolean);
      }

      function buildDraftLines(chars, fontClass, fontSize, width, lineGapPreset = "none") {
        if (state.draftLineMode === "single") {
          return [chars.join("")];
        }
        if (state.draftLineMode === "manual") {
          return buildManualLines(chars, fontClass, fontSize, width, lineGapPreset);
        }
        return buildBoundaryLines(chars, fontClass, fontSize, width, lineGapPreset);
      }

      function getBreaksFromLines(lines) {
        const breaks = [];
        let cursor = 0;
        lines.forEach((line, index) => {
          cursor += Array.from(line).length;
          if (index < lines.length - 1) {
            breaks.push(cursor);
          }
        });
        return breaks;
      }

      function computeDraftLayout() {
        const sizePreset = getSizePreset(state.draftSizePreset);
        const text = state.draftLineMode === "single" ? getDraftDisplayText() : getDraftText();
        if (!text) {
          const emptySizeMap = {
            large: 40,
            medium: 22,
            tiny: 9
          };
          return {
            lines: ["牌を2つ選ぶ"],
            fontSize: emptySizeMap[sizePreset.id] || 26,
            effectiveBreaks: [],
            safetyAdjusted: false
          };
        }

        const previewBox = document.getElementById("previewWord");
        const { width, height } = getDraftReferenceBoardSize(previewBox);
        const chars = Array.from(text);
        const fontClass = getFontClass(state.draftFontId);
        const universalMax = Math.max(
          ...sizePresets.map((preset) => (state.draftLineMode === "single" ? preset.singleMax : preset.multiMax))
        );
        const minFontSize = getMinimumFontSize(chars.length, state.draftLineMode, state.draftSizePreset);
        const manualBreaks = normalizeBreaks(state.draftManualBreaks, chars.length);

        function buildLayoutForFont(fontSize, forceAdjusted = false) {
          const lines = buildDraftLines(chars, fontClass, fontSize, width, state.draftLineGapPreset);
          const effectiveBreaks = getBreaksFromLines(lines);
          const safetyAdjusted =
            forceAdjusted ||
            (state.draftLineMode === "manual" && effectiveBreaks.some((point) => !manualBreaks.includes(point))) ||
            (state.draftLineMode === "boundary" && effectiveBreaks.some((point) => point !== getBoundaryIndex()));
          return { lines, fontSize, effectiveBreaks, safetyAdjusted };
        }

        let bestFitLayout = null;
        let fallbackLayout = null;

        for (let fontSize = universalMax; fontSize >= minFontSize; fontSize -= 1) {
          const layout = buildLayoutForFont(fontSize, fontSize < universalMax);
          if (doesWordFit(layout.lines, fontClass, state.draftLineMode, fontSize, width, height, state.draftLineGapPreset)) {
            bestFitLayout = layout;
            break;
          }
          fallbackLayout = { ...layout, safetyAdjusted: true };
        }

        if (!bestFitLayout) {
          for (let fontSize = minFontSize - 1; fontSize >= 4; fontSize -= 1) {
            const layout = buildLayoutForFont(fontSize, true);
            if (doesWordFit(layout.lines, fontClass, state.draftLineMode, fontSize, width, height, state.draftLineGapPreset)) {
              return layout;
            }
            fallbackLayout = { ...layout, safetyAdjusted: true };
          }
          return fallbackLayout || {
            lines: [text],
            fontSize: 4,
            effectiveBreaks: [],
            safetyAdjusted: true
          };
        }

        const presetScale = getSizePresetScale(sizePreset.id);
        const scaledFont = Math.round(bestFitLayout.fontSize * presetScale);
        const targetFontSize = Math.max(
          minFontSize,
          Math.min(bestFitLayout.fontSize, scaledFont || bestFitLayout.fontSize)
        );

        for (let fontSize = targetFontSize; fontSize >= minFontSize; fontSize -= 1) {
          const layout = buildLayoutForFont(fontSize, fontSize !== bestFitLayout.fontSize);
          if (doesWordFit(layout.lines, fontClass, state.draftLineMode, fontSize, width, height, state.draftLineGapPreset)) {
            return {
              ...layout,
              fontSize
            };
          }
        }

        return bestFitLayout;
      }

      function renderWordBoard(lines, fontId, variant, options = {}) {
        const mode = options.lineMode || (lines.length <= 1 ? "single" : "manual");
        const sizePreset = getSizePreset(options.sizePreset || "large");
        const maxFontBase = options.maxFont || 46;
        const minFontBase = options.minFont || 18;
        const fontSizeHint = Number.isFinite(Number(options.fontSizeHint)) ? Math.round(Number(options.fontSizeHint)) : 0;
        const maxFont = Math.max(minFontBase, Math.round(maxFontBase * sizePreset.renderScale), fontSizeHint);
        const minFont = Math.max(12, Math.round(minFontBase * Math.max(0.68, sizePreset.renderScale - 0.08)));
        const lineGapPreset = options.lineGapPreset || "none";
        const boardSkin = options.boardSkin || "bare";
        return `
          <div
            class="word-board auto-fit-word ${variant} board-skin-${boardSkin} ${getFontClass(fontId)}${mode === "single" ? " is-single-line" : ""}"
            data-font-id="${escapeHtml(fontId)}"
            data-line-mode="${mode}"
            data-max-font="${maxFont}"
            data-min-font="${minFont}"
            ${fontSizeHint ? `data-font-size-hint="${fontSizeHint}"` : ""}
            data-size-preset="${escapeHtml(sizePreset.id)}"
            data-line-gap-preset="${escapeHtml(lineGapPreset)}"
            data-board-skin="${escapeHtml(boardSkin)}"
          >
            ${lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("")}
          </div>
        `;
      }

      function hydrateWordBoard(node) {
        if (!node) {
          return;
        }
        const lines = Array.from(node.querySelectorAll(".word-line")).map((line) => line.textContent || "");
        const fontClass = getFontClass(node.dataset.fontId || "classic");
        const lineMode = node.dataset.lineMode || (lines.length <= 1 ? "single" : "manual");
        const lineGapPreset = node.dataset.lineGapPreset || "none";
        const maxFont = Number(node.dataset.maxFont || "46");
        const minFont = Number(node.dataset.minFont || "18");
        const fontSizeHint = Number(node.dataset.fontSizeHint || "0");
        const { width, height } = getWordBoardInnerSize(node, 300, 120);
        let chosen = minFont;
        if (fontSizeHint >= minFont && fontSizeHint <= maxFont && doesWordFit(lines, fontClass, lineMode, fontSizeHint, width, height, lineGapPreset)) {
          chosen = fontSizeHint;
        } else
        for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 1) {
          if (doesWordFit(lines, fontClass, lineMode, fontSize, width, height, lineGapPreset)) {
            chosen = fontSize;
            break;
          }
        }
        if (!doesWordFit(lines, fontClass, lineMode, chosen, width, height, lineGapPreset)) {
          for (let fontSize = minFont - 1; fontSize >= 4; fontSize -= 1) {
            if (doesWordFit(lines, fontClass, lineMode, fontSize, width, height, lineGapPreset)) {
              chosen = fontSize;
              break;
            }
          }
        }
        node.dataset.variant = Array.from(node.classList).find((className) => className.endsWith("-word")) || node.dataset.variant || "";
        applyWordMarkup(node, lines, fontClass, lineMode, chosen, lineGapPreset);
      }

      function hydrateWordBoards(root = document) {
        if (!root) {
          return;
        }
        const nodes = [];
        if (root.matches?.(".auto-fit-word")) {
          nodes.push(root);
        }
        if (root.querySelectorAll) {
          nodes.push(...root.querySelectorAll(".auto-fit-word"));
        }
        nodes.forEach((node) => hydrateWordBoard(node));
      }

      function getInviteUrl(code) {
        const url = new URL(window.location.href);
        url.search = "";
        url.searchParams.set("invite", code);
        return url.toString();
      }

      function getVoteCandidates(room, mode = "vote") {
        const round = getCurrentRound(room);
        if (!round) {
          return [];
        }
        if (mode === "revote" && round.voteSummary?.tiedPlayerIds?.length) {
          return round.submissions.filter((submission) => round.voteSummary.tiedPlayerIds.includes(submission.playerId));
        }
        return round.submissions || [];
      }

      function getFinalCandidates(room, mode = "vote") {
        const finalVote = room.game.finalVote;
        if (!finalVote) {
          return [];
        }
        if (mode === "revote" && finalVote.voteSummary?.tiedCandidateIds?.length) {
          return finalVote.candidates.filter((candidate) => finalVote.voteSummary.tiedCandidateIds.includes(candidate.candidateId));
        }
        return finalVote.candidates || [];
      }

      function canPlayerVoteFinal(room, playerId, mode = "vote") {
        if (allowsSelfVote(room)) {
          return getFinalCandidates(room, mode).length > 0;
        }
        return getFinalCandidates(room, mode).some((candidate) => candidate.playerId !== playerId);
      }

      function getDecisionCompletion(room = state.room) {
        if (!room || isSpectator(room)) {
          return null;
        }
        const phase = room.game?.phase || "";
        const round = getCurrentRound(room);
        const isEditingCurrentPhase = state.decisionEditPhase === phase;
        if (isEditingCurrentPhase) {
          return null;
        }

        if (phase === "round_vote" && round?.myVoteTargetId) {
          const candidate = getVoteCandidates(room, "vote").find((item) => item.playerId === round.myVoteTargetId);
          return {
            phase,
            heading: "投票完了",
            label: `${round?.label || "ラウンド"}の投票`,
            phrase: candidate?.phrase || "",
            displayName: candidate ? resolvePlayerDisplayName(room, candidate.playerId, candidate.displayName) : "",
            buttonLabel: "投票画面に戻る"
          };
        }

        if (phase === "round_revote" && round?.myRevoteTargetId) {
          const candidate = getVoteCandidates(room, "revote").find((item) => item.playerId === round.myRevoteTargetId);
          return {
            phase,
            heading: "再投票完了",
            label: `${round?.label || "ラウンド"}の再投票`,
            phrase: candidate?.phrase || "",
            displayName: candidate ? resolvePlayerDisplayName(room, candidate.playerId, candidate.displayName) : "",
            buttonLabel: "投票画面に戻る"
          };
        }

        if (phase === "final_vote" && room.game.finalVote?.myVoteCandidateId) {
          const candidate = getFinalCandidates(room, "vote").find((item) => item.candidateId === room.game.finalVote.myVoteCandidateId);
          return {
            phase,
            heading: "最終投票完了",
            label: "最終投票",
            phrase: candidate?.phrase || "",
            displayName: candidate ? resolvePlayerDisplayName(room, candidate.playerId, candidate.displayName) : "",
            buttonLabel: "投票画面に戻る"
          };
        }

        if (phase === "final_revote" && room.game.finalVote?.myRevoteCandidateId) {
          const candidate = getFinalCandidates(room, "revote").find((item) => item.candidateId === room.game.finalVote.myRevoteCandidateId);
          return {
            phase,
            heading: "最終再投票完了",
            label: "最終再投票",
            phrase: candidate?.phrase || "",
            displayName: candidate ? resolvePlayerDisplayName(room, candidate.playerId, candidate.displayName) : "",
            buttonLabel: "投票画面に戻る"
          };
        }

        return null;
      }

      function resolvePlayerDisplayName(room, playerId, fallback = "") {
        const players = room?.game?.players || room?.players || [];
        return players.find((player) => player.playerId === playerId)?.displayName || fallback || playerId || "";
      }

      function deriveView(room = state.room) {
        if (!room) {
          if (state.inviteEntryMode && hasUsableInviteCode(state.inviteCode)) {
            return "inviteJoin";
          }
          return "welcome";
        }
        if (isSpectator(room)) {
          if (room.game.phase === "lobby") {
            return "lobby";
          }
          if (room.game.phase === "round_result") {
            return "roundResult";
          }
          if (room.game.phase === "final_result") {
            return "finalResult";
          }
          return "wait";
        }
        const phase = room.game.phase;
        const round = getCurrentRound(room);
        const meCanFinalVote = canPlayerVoteFinal(room, room.me.playerId, "vote");
        const meCanFinalRevote = canPlayerVoteFinal(room, room.me.playerId, "revote");

        if (phase === "lobby") {
          return "lobby";
        }
        if (phase === "round_submit") {
          return room.game.currentTurnPlayerId === room.me.playerId ? "submit" : "wait";
        }
        if (phase === "round_vote") {
          if (round?.myVoteTargetId && state.decisionEditPhase !== phase) {
            return "wait";
          }
          return "vote";
        }
        if (phase === "round_revote") {
          if (round?.myRevoteTargetId && state.decisionEditPhase !== phase) {
            return "wait";
          }
          return "revote";
        }
        if (phase === "round_host_decide") {
          return room.me.isHost ? "hostDecide" : "wait";
        }
        if (phase === "round_result") {
          return "roundResult";
        }
        if (phase === "final_vote") {
          if (room.game.finalVote?.myVoteCandidateId && state.decisionEditPhase !== phase) {
            return "wait";
          }
          return meCanFinalVote ? "finalVote" : "wait";
        }
        if (phase === "final_revote") {
          if (room.game.finalVote?.myRevoteCandidateId && state.decisionEditPhase !== phase) {
            return "wait";
          }
          return meCanFinalRevote ? "finalVote" : "wait";
        }
        if (phase === "final_host_decide") {
          return room.me.isHost ? "finalHostDecide" : "wait";
        }
        if (phase === "final_result") {
          return "finalResult";
        }
        return "welcome";
      }

      function getStatusText() {
        if (state.pendingAction) {
          return isSyncPending() ? getSyncPendingCopy().short : "送信中";
        }
        if (state.isLoading) {
          return "同期中";
        }
        if (state.errorMessage) {
          return "要確認";
        }
        if (state.syncIssueMessage) {
          return "再試行中";
        }
        return "接続中";
      }

      function formatLastSyncValue() {
        if (!state.lastSyncAt) {
          return "未同期";
        }
        return new Date(state.lastSyncAt).toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function formatLastSync() {
        if (!state.lastSyncAt) {
          return "まだ同期していません。";
        }
        return `最終同期 ${new Date(state.lastSyncAt).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
      }

      function getRecentChampionsStamp() {
        return state.recentChampions
          .map((item) => `${item.championId}:${item.phrase}:${item.displayName}:${item.wonAt}:${item.likeCount || 0}:${item.likedByMe ? 1 : 0}`)
          .join("|");
      }

      function getChampionRankingStamp() {
        return state.championRankingItems
          .map((item) => `${item.championId}:${item.phrase}:${item.displayName}:${item.wonAt}:${item.likeCount || 0}:${item.likedByMe ? 1 : 0}`)
          .join("|");
      }

      function getAppRenderKey(room = state.room, view = deriveView(room)) {
        const base = [view, state.pendingAction ? "pending" : "idle"];
        if (!room) {
          return base.concat([
            view === "inviteJoin" ? "inviteJoin" : "landing"
          ]).join("|");
        }

        const revision = String(room.revision ?? "no-revision");
        base.push(revision);

        switch (view) {
          case "welcome":
            return base.concat([
              "landing"
            ]).join("|");
          case "inviteJoin":
            return base.concat([
              "inviteJoin",
              state.inviteCode || "",
              state.joinDisplayName || ""
            ]).join("|");
          case "lobby":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          case "submit":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          case "wait":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          case "vote":
          case "revote":
          case "hostDecide":
          case "finalVote":
          case "finalHostDecide":
          case "roundResult":
          case "finalResult":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          default:
            return base.join("|");
        }
      }

      function getStatusContext() {
        return "";
      }

      function renderFeedbackDock() {
        const feedbackKey = state.errorMessage
          ? `error|${state.errorMessage}`
          : state.copyMessage
            ? `message|${state.copyMessage}`
            : "empty";
        if (state.renderCache.feedbackKey === feedbackKey) {
          return;
        }
        state.renderCache.feedbackKey = feedbackKey;

        if (state.errorMessage) {
          els.feedbackDock.innerHTML = `<div class="error">${escapeHtml(state.errorMessage)}</div>`;
          return;
        }
        if (state.copyMessage) {
          els.feedbackDock.innerHTML = `<div class="message">${escapeHtml(state.copyMessage)}</div>`;
          return;
        }
        els.feedbackDock.innerHTML = "";
      }

      function setBanner() {
        const currentView = deriveView();
        els.pageHeader?.classList.toggle("is-hidden", !["welcome", "inviteJoin", "lobby"].includes(currentView));
        const bannerKey = [
          getStatusText(),
          getStatusContext(),
          state.pendingAction ? "pending" : "idle",
          state.pendingMode,
          state.isLoading ? "loading" : "ready",
          state.roomId ? "room" : "welcome",
          currentView
        ].join("|");
        if (state.renderCache.bannerKey !== bannerKey) {
          state.renderCache.bannerKey = bannerKey;
          els.statusLabel.textContent = getStatusText();
          els.statusContext.textContent = "";
          els.refreshTopBtn.disabled = state.pendingAction || state.isLoading;
          els.refreshTopBtn.textContent = state.isLoading
            ? "同期中"
            : isSyncPending()
              ? getSyncPendingCopy().short
              : "更新";
        }
        renderFeedbackDock();
      }

      function persistSession() {
        if (!state.roomId || !state.playerToken) {
          return;
        }
        const sessions = getStoredSessions();
        sessions[state.roomId] = {
          roomId: state.roomId,
          playerToken: state.playerToken,
          inviteCode: state.room?.inviteCode || state.inviteCode || "",
          updatedAt: new Date().toISOString()
        };
        saveStoredSessions(sessions);
        window.sessionStorage.setItem(APP_ACTIVE_ROOM_ID_KEY, state.roomId);
        saveStoredDisplayName(state.room?.me?.displayName || state.createDisplayName || state.joinDisplayName);
      }

      function clearSession(roomId = state.roomId) {
        const sessions = getStoredSessions();
        if (roomId && sessions[roomId]) {
          delete sessions[roomId];
          saveStoredSessions(sessions);
        }
        const activeRoomId = window.sessionStorage.getItem(APP_ACTIVE_ROOM_ID_KEY);
        if (!roomId || activeRoomId === roomId) {
          window.sessionStorage.removeItem(APP_ACTIVE_ROOM_ID_KEY);
        }
      }

      function resetDraftAndDecisionState() {
        state.selectedStartPlayerId = "";
        state.draftSelectedTileIds = [];
        state.draftManualBreaks = [];
        clearDecisionState();
      }

      function exitToWelcome(options = {}) {
        const room = state.room;
        const inviteCode =
          options.preserveInviteCode === false
            ? DEFAULT_INVITE_CODE_PREFIX
            : normalizeInviteCodeInput(options.inviteCode || room?.inviteCode || state.inviteCode || DEFAULT_INVITE_CODE_PREFIX);
        const myName = room?.me?.displayName || "";

        clearPollTimer();
        clearSession();

        state.room = null;
        state.roomId = "";
        state.playerToken = "";
        state.pendingMode = "";
        state.inviteCode = inviteCode;
        state.inviteEntryMode = options.inviteEntryMode !== undefined ? Boolean(options.inviteEntryMode) : hasUsableInviteCode(inviteCode);
        clearBackgroundSyncIssue();
        setFeedback(options.errorMessage || options.copyMessage || "", Boolean(options.errorMessage), options.copyMessage ? 2800 : 0);

        if (myName) {
          saveStoredDisplayName(myName);
          if (room?.me?.isHost) {
            state.createDisplayName = myName;
          } else {
            state.joinDisplayName = myName;
          }
        }

        resetDraftAndDecisionState();
      }

      function buildAppError(error, fallbackMessage = "操作に失敗しました。") {
        if (error instanceof AppError) {
          return error;
        }
        if (error instanceof Error) {
          return new AppError(error.message || fallbackMessage, {
            cause: error
          });
        }
        return new AppError(fallbackMessage);
      }

      function describeAppError(error, context = "") {
        const appError = buildAppError(error);
        const messageMap = {
          INVITE_NOT_FOUND: "招待コードが見つかりません。招待URLかコードをもう一度確認してください。",
          ROOM_FULL: "このルームは満員です。別のルームを使ってください。",
          ROOM_ALREADY_STARTED: "このルームはすでに始まっています。ホストに新しいルームを作ってもらってください。",
          ROOM_ALREADY_FINISHED: "このルームはすでに終了しています。新しいルームに参加してください。",
          DECK_EMPTY: "デッキに使えるワードがありません。管理画面で有効ワードを確認してください。",
          DECK_TOO_SMALL: "デッキのワード数が足りません。重複なしで配るため、管理画面で有効ワードを増やしてください。",
          PLAYER_COUNT_NOT_READY: "参加プレイヤーがそろってから開始してください。",
          ROOM_NOT_FOUND: context === "restore" || context === "reconnect"
            ? "このルームは見つかりませんでした。終了した可能性があります。もう一度参加してください。"
            : "このルームは見つかりませんでした。",
          PLAYER_TOKEN_INVALID: context === "restore" || context === "reconnect"
            ? "この端末の参加情報が使えません。もう一度参加してください。"
            : "この端末の参加情報が使えません。",
          NETWORK_ERROR: "通信に失敗しました。時間をおいてからもう一度お試しください。",
          CONFLICT_RETRY: "操作が重なりました。もう一度お試しください。"
        };
        return messageMap[appError.code] || appError.message || "操作に失敗しました。";
      }

      function isLostSessionError(error) {
        const appError = buildAppError(error);
        return ["ROOM_NOT_FOUND", "PLAYER_TOKEN_INVALID"].includes(appError.code);
      }

      function recoverLostSession(error, context = "") {
        if (!state.roomId && context !== "restore") {
          return false;
        }
        if (!isLostSessionError(error)) {
          return false;
        }
        exitToWelcome({
          errorMessage: describeAppError(error, context)
        });
        return true;
      }

      async function fetchJson(url, options = {}) {
        let response;
        try {
          response = await fetch(url, options);
        } catch (error) {
          throw new AppError("通信に失敗しました。", {
            code: "NETWORK_ERROR",
            retryable: true,
            cause: error
          });
        }
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.ok === false) {
          const detail = payload?.error?.message || payload?.message || `${url} の取得に失敗しました。`;
          throw new AppError(detail, {
            code: payload?.error?.code || "",
            retryable: Boolean(payload?.error?.retryable),
            statusCode: response.status
          });
        }
        return payload;
      }

      async function apiRequest(path, options = {}) {
        const { method = "GET", body, playerToken = state.playerToken, headers = {} } = options;
        return fetchJson(`${state.apiBaseUrl}${path}`, {
          method,
          headers: {
            ...(body === undefined ? {} : { "content-type": "application/json" }),
            ...(state.deviceId ? { "X-Omojan-Device-Id": state.deviceId } : {}),
            ...(playerToken ? { "X-Omojan-Player-Token": playerToken } : {}),
            ...headers
          },
          ...(body === undefined ? {} : { body: JSON.stringify(body) })
        });
      }

      async function postApi(path, body = {}) {
        return apiRequest(path, { method: "POST", body });
      }

      async function loadRecentChampions() {
        try {
          const payload = await apiRequest("/champions/recent?limit=10", { playerToken: "" });
          state.recentChampions = payload.data.items || [];
        } catch {
          const payload = await fetchJson(FIXTURE_CHAMPIONS_URL);
          state.recentChampions = (payload.data.items || []).slice(0, 10).map((item) => ({
            ...item,
            likeCount: Number(item.likeCount || 0),
            likedByMe: false
          }));
        }
      }

      async function loadChampionHistory(limit = 50) {
        try {
          const payload = await apiRequest(`/champions/history?limit=${limit}`, { playerToken: "" });
          state.championHistoryItems = payload.data.items || [];
          state.championHistoryHasMore = state.championHistoryItems.length >= limit;
          state.championHistoryError = "";
        } catch (error) {
          state.championHistoryError = error instanceof Error ? error.message : "履歴の取得に失敗しました。";
          if (!state.championHistoryItems.length) {
            const payload = await fetchJson(FIXTURE_CHAMPIONS_URL);
            state.championHistoryItems = (payload.data.items || []).map((item) => ({
              ...item,
              likeCount: Number(item.likeCount || 0),
              likedByMe: false
            }));
            state.championHistoryHasMore = state.championHistoryItems.length >= limit;
          }
        }
      }

      async function loadChampionRanking(limit = 10) {
        try {
          const payload = await apiRequest(`/champions/ranking?limit=${limit}`, { playerToken: "" });
          state.championRankingItems = payload.data.items || [];
        } catch {
          state.championRankingItems = state.championHistoryItems
            .slice()
            .sort((left, right) => Number(right.likeCount || 0) - Number(left.likeCount || 0))
            .slice(0, limit);
        }
      }

      function syncDraftWithRoom(room = state.room) {
        if (!room || deriveView(room) !== "submit") {
          state.draftSelectedTileIds = [];
          state.draftManualBreaks = [];
          return;
        }

        const availableTiles = room.myHand.filter((tile) => !tile.isUsed);
        const currentValid = state.draftSelectedTileIds.filter((tileId) => availableTiles.some((tile) => tile.tileId === tileId));

        if (currentValid.length === 2) {
          state.draftSelectedTileIds = currentValid;
        } else {
          state.draftSelectedTileIds = availableTiles.slice(0, 2).map((tile) => tile.tileId);
        }

        sanitizeManualBreaks(room);
      }

      function syncDecisionStateWithRoom(room = state.room) {
        if (!room) {
          clearDecisionState();
          return;
        }
        const round = getCurrentRound(room);
        const phase = room.game?.phase || "";
        const isEditingCurrentPhase = state.decisionEditPhase === phase;
        const roundVoteCandidateIds = getVoteCandidates(room, "vote").map((item) => item.playerId);
        const roundRevoteCandidateIds = getVoteCandidates(room, "revote").map((item) => item.playerId);
        const finalVoteCandidateIds = getFinalCandidates(room, "vote").map((item) => item.candidateId);
        const finalRevoteCandidateIds = getFinalCandidates(room, "revote").map((item) => item.candidateId);
        if (!["round_vote", "round_revote", "final_vote", "final_revote"].includes(phase)) {
          state.decisionEditPhase = "";
        } else if (state.decisionEditPhase && state.decisionEditPhase !== phase) {
          state.decisionEditPhase = "";
        }
        switch (room.game?.phase) {
          case "round_vote":
            if (state.selectedVoteTarget && roundVoteCandidateIds.includes(state.selectedVoteTarget)) {
              state.selectedVoteTarget = state.selectedVoteTarget;
            } else if (isEditingCurrentPhase) {
              state.selectedVoteTarget = roundVoteCandidateIds.includes(state.selectedVoteTarget) ? state.selectedVoteTarget : "";
            } else {
              state.selectedVoteTarget = round?.myVoteTargetId || "";
            }
            state.selectedHostTarget = "";
            state.selectedFinalTarget = "";
            return;
          case "round_revote":
            if (state.selectedHostTarget && roundRevoteCandidateIds.includes(state.selectedHostTarget)) {
              state.selectedHostTarget = state.selectedHostTarget;
            } else if (isEditingCurrentPhase) {
              state.selectedHostTarget = roundRevoteCandidateIds.includes(state.selectedHostTarget) ? state.selectedHostTarget : "";
            } else {
              state.selectedHostTarget = round?.myRevoteTargetId || "";
            }
            state.selectedVoteTarget = "";
            state.selectedFinalTarget = "";
            return;
          case "final_vote":
            if (state.selectedFinalTarget && finalVoteCandidateIds.includes(state.selectedFinalTarget)) {
              state.selectedFinalTarget = state.selectedFinalTarget;
            } else if (isEditingCurrentPhase) {
              state.selectedFinalTarget = finalVoteCandidateIds.includes(state.selectedFinalTarget) ? state.selectedFinalTarget : "";
            } else {
              state.selectedFinalTarget = room.game.finalVote?.myVoteCandidateId || "";
            }
            state.selectedVoteTarget = "";
            state.selectedHostTarget = "";
            return;
          case "final_revote":
            if (state.selectedFinalTarget && finalRevoteCandidateIds.includes(state.selectedFinalTarget)) {
              state.selectedFinalTarget = state.selectedFinalTarget;
            } else if (isEditingCurrentPhase) {
              state.selectedFinalTarget = finalRevoteCandidateIds.includes(state.selectedFinalTarget) ? state.selectedFinalTarget : "";
            } else {
              state.selectedFinalTarget = room.game.finalVote?.myRevoteCandidateId || "";
            }
            state.selectedVoteTarget = "";
            state.selectedHostTarget = "";
            return;
          case "round_host_decide":
          case "final_host_decide":
            state.decisionEditPhase = "";
            return;
          default:
            clearDecisionState();
        }
      }

      function setRoom(room, options = {}) {
        state.room = clone(room);
        state.roomId = room.roomId;
        state.inviteEntryMode = false;
        state.selectedStartPlayerId = room.startPlayerId || room.game?.activePlayerIds?.[0] || room.me.playerId;
        state.lastSyncAt = new Date().toISOString();
        clearBackgroundSyncIssue();
        if (options.playerToken) {
          state.playerToken = options.playerToken;
        }
        syncDraftWithRoom(state.room);
        syncDecisionStateWithRoom(state.room);
        saveStoredDisplayName(room?.me?.displayName);
        persistSession();
      }

      async function refreshRoom() {
        if (!state.roomId || !state.playerToken) {
          return;
        }
        try {
          const knownRevision = Number(state.room?.revision);
          const query = Number.isInteger(knownRevision) && knownRevision >= 1 ? `?sinceRevision=${knownRevision}` : "";
          const payload = await apiRequest(`/rooms/${encodeURIComponent(state.roomId)}${query}`);
          if (payload.data?.notModified) {
            state.lastSyncAt = new Date().toISOString();
            clearBackgroundSyncIssue();
            return false;
          }
          setRoom(payload.data.room);
          return true;
        } catch (error) {
          if (recoverLostSession(error, "refresh")) {
            return false;
          }
          throw error;
        }
      }

      async function reconnectRoom(roomId = state.roomId, playerToken = state.playerToken) {
        if (!roomId || !playerToken) {
          return;
        }
        try {
          const payload = await apiRequest(`/rooms/${encodeURIComponent(roomId)}/reconnect`, {
            method: "POST",
            body: {},
            playerToken
          });
          setRoom(payload.data.room, { playerToken, skipReveal: true });
        } catch (error) {
          if (recoverLostSession(error, "reconnect")) {
            return;
          }
          throw error;
        }
      }

      async function autoJoinInviteRoom(inviteCode = state.inviteCode) {
        if (!hasUsableInviteCode(inviteCode) || state.roomId) {
          return false;
        }
        const displayName = getAutoJoinDisplayName();
        state.joinDisplayName = displayName;
        const payload = await fetchJson(`${state.apiBaseUrl}/rooms/join`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            inviteCode,
            displayName
          })
        });
        setRoom(payload.data.room, { playerToken: payload.data.playerToken, skipReveal: true });
        if (payload.data.room.me.role === "spectator") {
          setFeedback("観戦として参加しました。", false, 2600);
        }
        return true;
      }

      function clearPollTimer() {
        if (state.pollTimer) {
          window.clearTimeout(state.pollTimer);
          state.pollTimer = 0;
        }
      }

      function shouldPoll() {
        return Boolean(state.roomId && state.playerToken && deriveView() !== "welcome");
      }

      function getPollIntervalMs() {
        if (!shouldPoll()) {
          return 0;
        }

        const view = deriveView();
        let baseInterval = POLL_INTERVALS_MS.activeTurn;

        if (document.visibilityState === "hidden") {
          baseInterval = POLL_INTERVALS_MS.hidden;
        } else if (getActiveReveal()) {
          baseInterval = POLL_INTERVALS_MS.waiting;
        } else if (view === "wait") {
          baseInterval = POLL_INTERVALS_MS.waiting;
        } else if (view === "lobby") {
          baseInterval = POLL_INTERVALS_MS.lobby;
        } else if (view === "roundResult" || view === "finalResult") {
          baseInterval = POLL_INTERVALS_MS.result;
        }

        return Math.min(
          baseInterval + state.pollFailureCount * POLL_INTERVALS_MS.backoffStep,
          POLL_INTERVALS_MS.max
        );
      }

      function schedulePoll() {
        clearPollTimer();
        if (!shouldPoll() || state.pendingAction || !state.roomId || !state.playerToken) {
          return;
        }
        const intervalMs = getPollIntervalMs();
        if (!intervalMs) {
          return;
        }
        state.pollTimer = window.setTimeout(async () => {
          try {
            const changed = await refreshRoom();
            if (changed) {
              render();
              return;
            }
            renderPassiveSyncUi();
            schedulePoll();
          } catch (error) {
            setBackgroundSyncIssue(error);
            renderPassiveSyncUi();
            schedulePoll();
          }
        }, intervalMs);
      }

      async function restoreSession() {
        migrateLegacySessionIfNeeded();

        const sessions = getStoredSessions();
        const activeRoomId = window.sessionStorage.getItem(APP_ACTIVE_ROOM_ID_KEY);
        const prioritized = [];
        const allSessions = Object.values(sessions).sort((left, right) =>
          String(right.updatedAt || "").localeCompare(String(left.updatedAt || ""))
        );

        if (hasUsableInviteCode(state.inviteCode)) {
          if (activeRoomId && sessions[activeRoomId]?.inviteCode === state.inviteCode) {
            prioritized.push(sessions[activeRoomId]);
          }
          allSessions
            .filter((session) => session.roomId !== activeRoomId && session.inviteCode === state.inviteCode)
            .forEach((session) => prioritized.push(session));
        } else {
          if (activeRoomId && sessions[activeRoomId]) {
            prioritized.push(sessions[activeRoomId]);
          }
          allSessions
            .filter((session) => session.roomId !== activeRoomId)
            .forEach((session) => prioritized.push(session));
        }
        const targetSession = prioritized.find((session) => session.roomId && session.playerToken);
        if (!targetSession) {
          return false;
        }

        state.roomId = targetSession.roomId;
        state.playerToken = targetSession.playerToken;
        try {
          await reconnectRoom(targetSession.roomId, targetSession.playerToken);
        } catch (error) {
          if (recoverLostSession(error, "restore")) {
            return false;
          }
          throw error;
        }
        return true;
      }

        if (isSpectator(room)) {

        const cannotRevoteFinal = room.game.phase === "final_revote" && !canPlayerVoteFinal(room, room.me.playerId, "revote");

        const phaseMessageMap = {
          lobby: room.me.isHost ? "開始順を決めて始めます。" : "ホストの開始待ちです。",
          round_vote: "ほかの投票を待っています。",

          return `${currentPlayer.displayName} の手番です。`;

      function patchChampionCollection(items, nextItem) {
        return items.map((item) => (item.championId === nextItem.championId ? { ...item, ...nextItem } : item));

      function buildOptimisticChampionLikeItem(item) {
        if (!item) {

        const nextLiked = !item.likedByMe;
        return {
          ...item,
          likedByMe: nextLiked,
          likeCount: Math.max(0, Number(item.likeCount || 0) + (nextLiked ? 1 : -1))
        };
      }

        state.recentChampions = patchChampionCollection(state.recentChampions, nextItem);
        state.championHistoryItems = patchChampionCollection(state.championHistoryItems, nextItem);
        state.championRankingItems = patchChampionCollection(state.championRankingItems, nextItem)

      function getLobbyPlayerOrder(room) {
        const players = [...room.game.players]
          .filter((player) => player.role !== "spectator")
          .sort((left, right) => left.seatOrder - right.seatOrder);
        const playerMap = new Map(players.map((player) => [player.playerId, player]));
        const orderedIds = Array.isArray(room.playerOrder) && room.playerOrder.length
          ? room.playerOrder
          : players.map((player) => player.playerId);
        const orderedPlayers = orderedIds.map((playerId) => playerMap.get(playerId)).filter(Boolean);
        return orderedPlayers.length ? orderedPlayers : players;

        const order = getLobbyPlayerOrder(room).findIndex((item) => item.playerId === playerId);
