        const fontLabel = fonts.find((font) => font.id === state.draftFontId)?.label || "";
        const selectedTiles = getSelectedTiles(room);
        return renderFocusCallout({
          label: getCurrentRound(room)?.label || "提出中",
          title: draftText || "まずは2牌を選ぶ",
          description: draftText ? "この見た目で公開されます。" : "",
          pills: [
            { label: "選択", value: `${selectedTiles.length}/2牌` },
            { label: "改行", value: modeLabel || "-" },
            { label: "書体", value: fontLabel || "-" },
            ...(layout.safetyAdjusted ? [{ label: "調整", value: "自動補正あり" }] : [])
          ]
        });
      }

      function scrollAppToTop() {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
        if (document.scrollingElement) {
          document.scrollingElement.scrollTop = 0;
        }
      }

      function getScrollResetKey(room = state.room, view = deriveView(room)) {
        if (!room) {
          return "welcome";
        }
        return [
          view,
          room.game?.phase || "",
          room.game?.roundIndex ?? "",
          room.game?.currentTurnPlayerId || "",
          room.game?.reveal?.revealId || ""
        ].join("|");
      }

      function renderLanding() {
        return renderLandingShell();
      }

      function renderLandingShell() {
        return `
          ${renderScreenAlerts({ includeCopy: true })}
          <div class="screen-grid screen-grid--landing">
            <div id="landingCreateSlot"></div>
            <div id="landingJoinSlot"></div>
            <div id="landingRecentSlot"></div>
            <div id="landingRankingSlot"></div>
          </div>
        `;
      }

      function renderLandingCreate() {
        return `
          <section class="card card--form">
            <h2>ルームを作る</h2>
            <div class="field-stack">
              <div class="field">
                <label for="createDisplayName">表示名</label>
                <input id="createDisplayName" class="input" type="text" maxlength="20" placeholder="例: やまだ" value="${escapeHtml(state.createDisplayName)}" data-field="createDisplayName" />
              </div>
            </div>
            <div class="section-label">人数</div>
            <div class="chip-row">
              ${[2, 3, 4]
                .map(
                  (count) => `
                    <button class="chip${state.playerCount === count ? " active" : ""}" type="button" data-player-count="${count}">
                      ${count}人
                    </button>
                  `
                )
                .join("")}
            </div>
            <div class="button-row align-right">
              <button class="btn primary" type="button" data-action="create-room" ${state.pendingAction ? "disabled" : ""}>ルームを作る</button>
            </div>
          </section>
        `;
      }

      function renderLandingJoin() {
        return `
          <section class="card card--form">
            <h2>招待 URL から参加</h2>
            ${
              hasUsableInviteCode(state.inviteCode)
                ? renderFocusCallout({
                    label: "招待コード入力済み",
                    title: state.inviteCode,
                    description: ""
                  })
                : ""
            }
            <div class="field-stack">
              <div class="field">
                <label for="inviteCode">招待コード</label>
                <input id="inviteCode" class="input" type="text" maxlength="20" placeholder="例: OMO-2048" value="${escapeHtml(state.inviteCode)}" data-field="inviteCode" />
              </div>
              <div class="field">
                <label for="joinDisplayName">表示名</label>
                <input id="joinDisplayName" class="input" type="text" maxlength="20" placeholder="例: たなか" value="${escapeHtml(state.joinDisplayName)}" data-field="joinDisplayName" />
              </div>
            </div>
            <div class="button-row align-right">
              <button class="btn primary" type="button" data-action="join-room" ${state.pendingAction ? "disabled" : ""}>参加する</button>
            </div>
          </section>
        `;
      }

      function renderInviteJoin() {
        return `
          ${renderScreenAlerts({ includeCopy: true })}
          <div class="screen-grid screen-grid--invite-entry">
            <section class="card card--form">
              <h2>このルームに参加</h2>
              ${renderFocusCallout({
                label: "招待コード",
                title: state.inviteCode,
                description: "表示名だけ決めたら、そのままロビーに入れます。"
              })}
              <div class="field-stack">
                <div class="field">
                  <label for="joinDisplayNameInvite">表示名</label>
                  <input id="joinDisplayNameInvite" class="input" type="text" maxlength="20" placeholder="例: たなか" value="${escapeHtml(state.joinDisplayName)}" data-field="joinDisplayName" />
                </div>
              </div>
              <div class="button-row split-actions">
                <button class="btn ghost" type="button" data-action="cancel-invite-entry" ${state.pendingAction ? "disabled" : ""}>トップへ戻る</button>
                <button class="btn primary" type="button" data-action="join-room" ${state.pendingAction ? "disabled" : ""}>この表示名で参加</button>
              </div>
            </section>
          </div>
        `;
      }

      function renderLandingChampions() {
        return renderRecentChampionsSection("最近の総合優勝ワード");
      }

      function updateLandingView() {
        if (state.renderCache.landingShellKey !== "landing") {
          state.renderCache.landingShellKey = "landing";
          state.renderCache.landingCreateKey = "";
          state.renderCache.landingJoinKey = "";
          state.renderCache.landingRecentKey = "";
          state.renderCache.landingRankingKey = "";
          els.app.innerHTML = renderLandingShell();
        }

        const createKey = [state.createDisplayName, state.playerCount, state.pendingAction ? "pending" : "idle"].join("|");
        const joinKey = [state.inviteCode, state.joinDisplayName, state.pendingAction ? "pending" : "idle"].join("|");
        const recentKey = getRecentChampionsStamp();
        const rankingKey = getChampionRankingStamp();

        patchSlot(els.app, "#landingCreateSlot", "landingCreateKey", createKey, renderLandingCreate());
        patchSlot(els.app, "#landingJoinSlot", "landingJoinKey", joinKey, renderLandingJoin());
        patchSlot(els.app, "#landingRecentSlot", "landingRecentKey", recentKey, renderLandingChampions());
        patchSlot(els.app, "#landingRankingSlot", "landingRankingKey", rankingKey, renderChampionRankingSection());
      }

      function renderLobby(room) {
        return renderLobbyShell();
      }

      function renderLobbyShell() {
        return `
          ${renderScreenAlerts({ includeCopy: true })}
          <div class="screen-grid screen-grid--lobby">
            <div class="lobby-stage-heading">
              <div class="section-heading">
                <h2>ルーム待機中</h2>
              </div>
            </div>
            <div id="lobbyRoomSlot"></div>
            <div id="lobbyPlayersPanelSlot"></div>
            <div id="lobbyRecentSlot"></div>
            <div id="lobbyRankingSlot"></div>
          </div>
        `;
      }

      function renderLobbyTop(room) {
        const hostPlayer = getHostPlayer(room);
        const activePlayerCount = getActivePlayerCount(room);
        const spectatorCount = Number(room.spectatorCount || room.game?.spectatorPlayerIds?.length || 0);
        const mySeatLabel = getLobbySeatLabel(room, room.me.playerId);
        const mySeatValue = room.me.role === "spectator" ? `${room.me.displayName} / 観戦` : `${room.me.displayName} / ${mySeatLabel}`;
        return `
          <section class="lobby-room-card">
            <h3>ルーム情報</h3>
            <div class="lobby-top-stack">
              ${renderSummaryPills([
                { label: "ROOM", value: room.inviteCode },
                { label: "参加", value: `${activePlayerCount}/${room.playerCount}人` },
                ...(spectatorCount ? [{ label: "観戦", value: `${spectatorCount}人` }] : []),
                { label: "あなた", value: mySeatValue },
                ...(hostPlayer ? [{ label: "ホスト", value: hostPlayer.displayName }] : [])
              ])}
              <div class="lobby-inline-actions">
                <span class="room-code">${escapeHtml(room.inviteCode)}</span>
                <button class="btn secondary" type="button" data-action="copy-invite-url">招待URLをコピー</button>
              </div>
            </div>
          </section>
        `;
      }

      function getPlayerRoleBadge(player) {
        if (player.isHost) {
          return { label: "ホスト", className: "badge badge--host" };
        }
        if (player.role === "spectator") {
          return { label: "観戦", className: "badge badge--spectator" };
        }
        return null;
      }

      function renderLobbyPlayers(room) {
        const orderedPlayers = getLobbyPlayerOrder(room);
        const canReorder = room.me.isHost && orderedPlayers.length > 1;
        const ready = orderedPlayers.length === room.playerCount;
        const spectatorPlayers = [...room.game.players]
          .filter((player) => player.role === "spectator")
          .sort((left, right) => left.seatOrder - right.seatOrder);
        const randomizeButton = room.me.isHost
          ? `<button class="btn neutral compact" type="button" data-action="randomize-player-order" ${canReorder && !state.pendingAction ? "" : "disabled"}>ランダムに並び替え</button>`
          : "";
        return `
          <section class="lobby-players-panel">
            <div class="lobby-player-panel">
              <div class="lobby-player-panel-header">
                <div class="section-heading">
                  <h3>参加プレイヤー</h3>
                </div>
                ${room.me.isHost && randomizeButton ? `<div class="lobby-player-panel-toolbar">${randomizeButton}</div>` : ""}
              </div>
              <div class="lobby-player-list">
              ${orderedPlayers
                .map((player, index) => {
                  const isMe = player.playerId === room.me.playerId;
                  const seatNumber = index + 1;
                  const orderBadge = `<span class="order-badge${isMe ? " is-you" : ""}">座順 ${seatNumber}</span>`;
                  const roleToggle =
                    room.me.isHost && !player.isHost
                      ? player.role === "spectator"
                        ? `<button class="btn positive compact" type="button" data-action="set-player-role" data-target-player-id="${player.playerId}" data-role="player" ${state.pendingAction ? "disabled" : ""}>参加にする</button>`
                        : `<button class="btn neutral compact" type="button" data-action="set-player-role" data-target-player-id="${player.playerId}" data-role="spectator" ${state.pendingAction ? "disabled" : ""}>観戦にする</button>`
                      : "";
                  const hostTransfer =
                    room.me.isHost && !player.isHost
                      ? `<button class="btn ghost compact" type="button" data-action="set-host-player" data-target-player-id="${player.playerId}" ${state.pendingAction ? "disabled" : ""}>ホストにする</button>`
                      : "";
                  const kickButton =
                    room.me.isHost && !player.isHost
                      ? `<button class="btn danger compact" type="button" data-action="kick-player" data-target-player-id="${player.playerId}" ${state.pendingAction ? "disabled" : ""}>退出させる</button>`
                      : "";
                  const actionButtons = [roleToggle, hostTransfer, kickButton].filter(Boolean).join("");
                  return `
                  <div
                    class="player-card lobby-player-card player-card--order${isMe ? " player-card--me" : ""}${room.me.isHost ? " is-ordering" : ""}${state.draggingLobbyPlayerId === player.playerId ? " is-dragging" : ""}"
                    data-order-player-id="${player.playerId}"
                    draggable="false"
                  >
                    <div class="player-card-handle">
                      ${canReorder ? `<span class="order-grab" data-order-handle="true" aria-label="順番をドラッグして変更"></span>` : ""}
                    </div>
                    <div class="player-card-main">
                      <div class="player-card-topline">
                        <div class="player-card-heading">
                          ${orderBadge}
                          ${isMe ? `<span class="badge badge--you">あなた</span>` : ""}
                          ${player.isHost ? `<span class="badge badge--host player-card-role">ホスト</span>` : ""}
                        </div>
                      </div>
                      <strong>${escapeHtml(player.displayName)}</strong>
                      ${actionButtons ? `<div class="player-card-actions">${actionButtons}</div>` : ""}
                    </div>
                  </div>
                `;
                })
                .join("")}
              </div>
            ${
              spectatorPlayers.length
                ? `
                  <div class="player-section">
                      <div class="player-section-heading">
                        <div class="player-section-label">観戦者</div>
                      </div>
                      ${spectatorPlayers
                        .map((player) => {
                        const isMe = player.playerId === room.me.playerId;
                        const roleToggle =
                          room.me.isHost && !player.isHost
                            ? `<button class="btn positive compact" type="button" data-action="set-player-role" data-target-player-id="${player.playerId}" data-role="player" ${state.pendingAction ? "disabled" : ""}>参加にする</button>`
                            : "";
                        const kickButton =
                          room.me.isHost && !player.isHost
                            ? `<button class="btn danger compact" type="button" data-action="kick-player" data-target-player-id="${player.playerId}" ${state.pendingAction ? "disabled" : ""}>退出させる</button>`
                            : "";
                        const actionButtons = [roleToggle, kickButton].filter(Boolean).join("");
                        return `
                          <div class="player-card lobby-player-card lobby-spectator-card player-card--spectator${isMe ? " player-card--me" : ""}">
                            <div class="player-card-handle"></div>
                            <div class="player-card-main">
                              <div class="player-card-topline">
                                <div class="player-card-heading">
                                  <span class="order-badge order-badge--spectator">観戦席</span>
                                  ${isMe ? `<span class="badge badge--you">あなた</span>` : ""}
                                </div>
                              </div>
                              <strong>${escapeHtml(player.displayName)}</strong>
                              ${actionButtons ? `<div class="player-card-actions">${actionButtons}</div>` : ""}
                            </div>
                          </div>
                        `;
                      })
                      .join("")}
                  </div>
                `
                : ""
            }
              <div class="lobby-player-footer">
                <div class="lobby-player-footer-main">
                  ${
                    room.me.isHost
                      ? `${ready ? "" : `<div class="info-box">参加プレイヤーが ${room.playerCount} 人そろうと開始できます。</div>`}`
                      : `<div class="info-box">${room.me.role === "spectator" ? "観戦として待機中です。" : "ホストの開始待ちです。"}</div>`
                  }
                  <div class="lobby-player-footer-actions">
                    <div class="lobby-player-footer-secondary">
                      <button class="btn ghost compact" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
                    </div>
                    ${
                      room.me.isHost
                        ? `
                          <div class="lobby-player-footer-primary">
                            <button class="btn primary compact" type="button" data-action="start-game" ${ready && !state.pendingAction ? "" : "disabled"}>この順で開始</button>
                          </div>
                        `
                        : ""
                    }
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function updateLobbyView(room) {
        const activePlayers = room.game.players.filter((player) => player.role !== "spectator");
        const mySeatLabel = getLobbySeatLabel(room, room.me.playerId);
        if (activePlayers.length && !activePlayers.some((player) => player.playerId === state.selectedStartPlayerId)) {
          state.selectedStartPlayerId = room.startPlayerId || activePlayers[0].playerId;
        }
        const shellKey = `${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.lobbyShellKey !== shellKey) {
          state.renderCache.lobbyShellKey = shellKey;
          state.renderCache.lobbyRoomKey = "";
          state.renderCache.lobbyPlayersPanelKey = "";
          state.renderCache.lobbyRecentKey = "";
          state.renderCache.lobbyRankingKey = "";
          els.app.innerHTML = renderLobbyShell();
        }

        const playersKey = [
          room.playerOrder?.join(",") || "",
          room.game.players
            .map((player) => `${player.playerId}:${player.displayName}:${player.seatOrder}:${player.isHost ? 1 : 0}:${player.role || "player"}`)
            .join("|"),
          state.pendingAction ? "pending" : "idle",
          state.draggingLobbyPlayerId,
          state.dragTargetLobbyPlayerId
        ].join("|");
        const roomKey = `${room.inviteCode}|${room.playerCount}|${room.activePlayerCount || 0}|${room.spectatorCount || 0}|${room.me.playerId}|${room.me.displayName}|${room.me.isHost ? 1 : 0}|${room.me.role || "player"}|${getHostPlayer(room)?.playerId || ""}|${getHostPlayer(room)?.displayName || ""}|${room.playerOrder?.join(",") || ""}|${mySeatLabel}`;
        const recentKey = getRecentChampionsStamp();
        const rankingKey = getChampionRankingStamp();

        patchSlot(els.app, "#lobbyRoomSlot", "lobbyRoomKey", roomKey, renderLobbyTop(room));
        patchSlot(els.app, "#lobbyPlayersPanelSlot", "lobbyPlayersPanelKey", playersKey, renderLobbyPlayers(room));
        patchSlot(els.app, "#lobbyRecentSlot", "lobbyRecentKey", recentKey, renderRecentChampionsSection("最近の総合優勝ワード"));
        patchSlot(els.app, "#lobbyRankingSlot", "lobbyRankingKey", rankingKey, renderChampionRankingSection());
      }

      function renderSubmit(room) {
        return renderSubmitShell(room);
      }

      function renderSubmitShell(room) {
        return `
          ${renderScreenAlerts()}
          <div class="screen-grid screen-grid--submit">
            <div class="screen-primary">
              <div id="submitTopSlot"></div>
              <div id="submitHandSlot"></div>
            </div>
            <div class="screen-secondary">
              <div id="submitLineModeSlot"></div>
              <div id="submitSubmissionsSlot"></div>
            </div>
          </div>
        `;
      }

      function renderSubmitTop(room) {
        const roundLabel = getCurrentRound(room)?.label || "ラウンド";
        return `
          <section class="preview-card is-sticky is-live-preview">
            <span class="reveal-badge">${escapeHtml(roundLabel)}</span>
            <div
              id="previewWord"
              class="word-board preview-word ${getFontClass(state.draftFontId)}${state.draftLineMode === "single" ? " is-single-line" : ""}"
              data-line-gap-preset="${escapeHtml(state.draftLineGapPreset)}"
            >
              ${computeDraftLayout().lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("")}
            </div>
            <p class="preview-caption">${escapeHtml(room.me.displayName)}</p>
          </section>
        `;
      }

      function renderSubmitSubmissions(room) {
        const submissions = getCurrentRound(room)?.submissions || [];
        return renderSection(
          `すでに公開されたワード${submissions.length ? ` (${submissions.length})` : ""}`,
          renderSubmissionList(submissions, "まだ公開されたワードはありません。"),
          { className: "panel" }
        );
      }

      function renderSubmitLineMode(room) {
        const chars = Array.from(getDraftText(room));
        const activeLineMode = lineModes.find((mode) => mode.id === state.draftLineMode)?.label || "";
        const activeFont = fonts.find((font) => font.id === state.draftFontId)?.label || "";
        const activeSize = getSizePreset(state.draftSizePreset).label || "";
        const activeGap = lineGapPresets.find((preset) => preset.id === state.draftLineGapPreset)?.label || "";
        return `
          <section class="panel appearance-panel">
            <h3>見た目</h3>
            <div class="settings-grid">
              <section class="setting-group">
                <div class="setting-group-header">
                  <span class="setting-group-title">改行</span>
                  <span class="setting-group-value">${escapeHtml(activeLineMode)}</span>
                </div>
                <div class="chip-row">
                  ${lineModes
                    .map(
                      (mode) => `
                        <button class="chip${state.draftLineMode === mode.id ? " active" : ""}" type="button" data-line-mode="${mode.id}">
                          ${escapeHtml(mode.label)}
                        </button>
                      `
                    )
                    .join("")}
                </div>
                ${state.draftLineMode === "manual" && chars.length > 1
                  ? `
                    <section class="break-panel">
                      <p>${state.draftManualBreaks.length ? `${state.draftManualBreaks.join(" / ")}文字目のあとで改行` : "改行を入れない"}</p>
                      <div class="break-track">
                        ${chars
                          .map((char, index) => {
                            const gap =
                              index < chars.length - 1
                                ? `<button class="break-dot${state.draftManualBreaks.includes(index + 1) ? " active" : ""}" type="button" data-break="${index + 1}" aria-label="${index + 1}文字目のあとで改行"></button>`
                                : "";
                            return `<span class="char-box">${escapeHtml(char)}</span>${gap}`;
                          })
                          .join("")}
                      </div>
                    </section>
                  `
                  : ""}
              </section>
              <section class="setting-group">
                <div class="setting-group-header">
                  <span class="setting-group-title">文字サイズ</span>
                  <span class="setting-group-value">${escapeHtml(activeSize)}</span>
                </div>
                <div class="chip-row size-chip-row">
                  ${sizePresets
                    .map(
                      (preset) => `
                        <button class="chip${state.draftSizePreset === preset.id ? " active" : ""}" type="button" data-size-preset="${preset.id}">
                          ${escapeHtml(preset.label)}
                        </button>
                      `
                    )
                    .join("")}
                </div>
              </section>
              <section class="setting-group is-wide">
                <div class="setting-group-header">
                  <span class="setting-group-title">書体</span>
                  <span class="setting-group-value">${escapeHtml(activeFont)}</span>
                </div>
                <div class="chip-row">
                  ${fonts
                    .map(
                      (font) => `
                        <button class="chip${state.draftFontId === font.id ? " active" : ""}" type="button" data-font-id="${font.id}">
                          ${escapeHtml(font.label)}
                        </button>
                      `
                    )
                    .join("")}
                </div>
              </section>
              <section class="setting-group">
                <div class="setting-group-header">
                  <span class="setting-group-title">ワードの間</span>
                  <span class="setting-group-value">${escapeHtml(activeGap)}</span>
                </div>
                <div class="chip-row">
                  ${lineGapPresets
                    .map(
                      (preset) => `
                        <button class="chip${state.draftLineGapPreset === preset.id ? " active" : ""}" type="button" data-line-gap-preset="${preset.id}">
                          ${escapeHtml(preset.label)}
                        </button>
                      `
                    )
                    .join("")}
                </div>
              </section>
            </div>
            <div class="appearance-footer">
              <button class="btn ghost compact" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
            </div>
          </section>
        `;
      }

      function renderSubmitHand(room) {
        const selectedTiles = getSelectedTiles(room);
        return `
          <section class="panel">
            <h3>手札</h3>
            <div class="tile-grid">
              ${room.myHand
                .map(
                  (tile) => `
                    <button class="tile${state.draftSelectedTileIds.includes(tile.tileId) ? " selected" : ""}${tile.isUsed ? " used" : ""}" type="button" data-tile-id="${tile.tileId}" ${tile.isUsed ? "disabled" : ""}>
                      ${escapeHtml(tile.text)}
                    </button>
                  `
                )
                .join("")}
            </div>
            <div class="button-row split-actions submit-actions">
              <div class="submit-actions-secondary">
                <button class="btn secondary compact" type="button" data-action="swap-selection" ${selectedTiles.length === 2 ? "" : "disabled"}>順番入替</button>
                <button class="btn secondary compact" type="button" data-action="clear-selection">選択をクリア</button>
              </div>
              <button class="btn primary" type="button" data-action="submit-word" ${selectedTiles.length === 2 && !state.pendingAction ? "" : "disabled"}>この見た目で提出</button>
            </div>
          </section>
        `;
      }

      function updateSubmitView(room) {
        const shellKey = `${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.submitShellKey !== shellKey) {
          state.renderCache.submitShellKey = shellKey;
          state.renderCache.submitTopKey = "";
          state.renderCache.submitSubmissionsKey = "";
          state.renderCache.submitLineModeKey = "";
          state.renderCache.submitHandKey = "";
          els.app.innerHTML = renderSubmitShell(room);
        }

        const round = getCurrentRound(room);
        const submissions = round?.submissions || [];
        const topKey = [
          room.revision,
          state.draftSelectedTileIds.join(","),
          state.draftFontId,
          state.draftSizePreset,
          state.draftLineGapPreset,
          state.draftLineMode,
          state.draftManualBreaks.join(",")
        ].join("|");
        const submissionsKey = submissions
          .map((submission) => `${submission.playerId || submission.displayName}:${submission.phrase || ""}:${submission.fontId}:${submission.sizePreset || "large"}:${submission.lineGapPreset || "none"}:${(submission.renderedLines || []).join("/")}`)
          .join("|");
        const lineModeKey = [
          state.draftLineMode,
          state.draftFontId,
          state.draftSizePreset,
          state.draftLineGapPreset,
          getDraftText(room),
          state.draftManualBreaks.join(",")
        ].join("|");
        const handKey = [
          room.revision,
          state.draftSelectedTileIds.join(","),
          state.pendingAction ? "pending" : "idle",
          room.myHand.map((tile) => `${tile.tileId}:${tile.isUsed ? 1 : 0}`).join("|")
        ].join("|");
        patchSlot(els.app, "#submitTopSlot", "submitTopKey", topKey, renderSubmitTop(room));
        patchSlot(els.app, "#submitLineModeSlot", "submitLineModeKey", lineModeKey, renderSubmitLineMode(room));
        patchSlot(els.app, "#submitHandSlot", "submitHandKey", handKey, renderSubmitHand(room));
        patchSlot(els.app, "#submitSubmissionsSlot", "submitSubmissionsKey", submissionsKey, renderSubmitSubmissions(room));
      }

      function renderWait(room) {
        const isComplete = Boolean(getDecisionCompletion(room));
        return `
          ${renderScreenAlerts()}
          <div class="screen-grid screen-grid--wait${isComplete ? " is-complete" : ""}">
            <div class="screen-primary">
              <section class="card">
                <h2>${escapeHtml(getWaitHeading(room))}</h2>
                <div id="waitFocusSlot"></div>
              </section>
              <div id="waitActionsSlot"></div>
            </div>
            <div class="screen-secondary">
              <div id="waitSubmissionsSlot"></div>
            </div>
          </div>
        `;
      }

      function renderWaitFocus(room) {
        const submissions = getCurrentRound(room)?.submissions || [];
        const decisionCompletion = getDecisionCompletion(room);
        if (decisionCompletion) {
          return `
            <section class="vote-complete-card">
              <small>${escapeHtml(decisionCompletion.label)}</small>
              <strong>投票を受け付けました</strong>
              ${decisionCompletion.phrase ? `<p>いまは「${escapeHtml(decisionCompletion.phrase)}」に入れています。</p>` : ""}
              ${renderSummaryPills([
                { label: "状態", value: "投票完了" },
                ...(decisionCompletion.displayName ? [{ label: "対象", value: decisionCompletion.displayName }] : [])
              ])}
            </section>
          `;
        }
        return renderFocusCallout({
          label: getCurrentRound(room)?.label || "進行中",
          title: getWaitingMessage(room),
          description: "",
          pills: [
            { label: "公開", value: submissions.length ? `${submissions.length}語` : "まだなし" }
          ]
        });
      }

      function renderWaitActions(room) {
        const decisionCompletion = getDecisionCompletion(room);
        if (decisionCompletion) {
          return `
            <div class="button-stack">
              <button class="btn secondary" type="button" data-action="edit-current-vote" ${state.pendingAction ? "disabled" : ""}>${escapeHtml(decisionCompletion.buttonLabel)}</button>
              <button class="btn ghost" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
            </div>
          `;
        }
        return `
          <div class="button-stack">
            <button class="btn ghost" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
          </div>
        `;
      }

      function renderWaitSubmissions(room) {
        const isFinalPhase = ["final_vote", "final_revote", "final_host_decide"].includes(room.game.phase);
        const submissions = isFinalPhase
          ? getFinalCandidates(room, room.game.phase === "final_revote" ? "revote" : "vote").map((candidate) => ({
              displayName: candidate.displayName,
              fontId: candidate.fontId,
              sizePreset: candidate.sizePreset,
              lineGapPreset: candidate.lineGapPreset,
              renderedLines: candidate.renderedLines
            }))
          : getCurrentRound(room)?.submissions || [];
        return renderSection(
          `${isFinalPhase ? "最終候補" : "公開済みワード"}${submissions.length ? ` (${submissions.length})` : ""}`,
          renderSubmissionList(submissions),
          { className: "panel" }
        );
      }

      function updateWaitView(room) {
        const shellKey = `${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.waitShellKey !== shellKey) {
          state.renderCache.waitShellKey = shellKey;
          state.renderCache.waitFocusKey = "";
          state.renderCache.waitSubmissionsKey = "";
          state.renderCache.waitSyncKey = "";
          els.app.innerHTML = renderWait(room);
        }

        const round = getCurrentRound(room);
        const submissions = round?.submissions || [];
        const focusKey = [
          room.game.phase,
          room.game.currentTurnPlayerId || "",
          round?.roundIndex ?? "",
          submissions.length
        ].join("|");
        const submissionsKey = submissions
          .map((submission) => `${submission.playerId}:${submission.phrase}:${submission.fontId}:${(submission.renderedLines || []).join("/")}`)
          .join("|");

        patchSlot(els.app, "#waitFocusSlot", "waitFocusKey", focusKey, renderWaitFocus(room));
        patchSlot(els.app, "#waitSubmissionsSlot", "waitSubmissionsKey", submissionsKey, renderWaitSubmissions(room));
        patchSlot(
          els.app,
          "#waitActionsSlot",
          "waitSyncKey",
          [state.pendingAction ? "pending" : "idle", getDecisionCompletion(room)?.phase || ""].join("|"),
          renderWaitActions(room)
        );
      }

      function renderPassiveSyncUi(room = state.room, view = deriveView(room)) {
        setBanner();
        if (!room || !state.roomId) {
          return;
        }

        if (view === "wait") {
          return;
        }

        if (isLobbyView(view)) {
          syncSubmitPreviewFloating(null);
        }
      }

      function isDecisionView(view) {
        return ["vote", "revote", "hostDecide", "finalVote", "finalHostDecide"].includes(view);
      }

      function isResultView(view) {
        return ["roundResult", "finalResult"].includes(view);
      }

      function isSubmitView(view) {
        return view === "submit";
      }

      function isLobbyView(view) {
        return view === "lobby";
      }

      function isLandingView(view) {
        return view === "welcome";
      }

      function resetIncrementalViewCaches() {
        state.renderCache.landingShellKey = "";
        state.renderCache.landingCreateKey = "";
        state.renderCache.landingJoinKey = "";
        state.renderCache.landingRecentKey = "";
        state.renderCache.landingRankingKey = "";
        state.renderCache.landingChampionsKey = "";
        state.renderCache.lobbyShellKey = "";
        state.renderCache.lobbyRoomKey = "";
        state.renderCache.lobbyPlayersPanelKey = "";
        state.renderCache.lobbyRecentKey = "";
        state.renderCache.lobbyRankingKey = "";
        state.renderCache.submitShellKey = "";
        state.renderCache.submitTopKey = "";
        state.renderCache.submitSubmissionsKey = "";
        state.renderCache.submitLineModeKey = "";
        state.renderCache.submitFontKey = "";
        state.renderCache.submitHandKey = "";
        state.renderCache.submitUtilityKey = "";
        state.renderCache.waitShellKey = "";
        state.renderCache.waitFocusKey = "";
        state.renderCache.waitSyncKey = "";
        state.renderCache.waitSubmissionsKey = "";
        state.renderCache.decisionShellKey = "";
        state.renderCache.decisionFocusKey = "";
        state.renderCache.decisionSummaryKey = "";
        state.renderCache.decisionCardsKey = "";
        state.renderCache.decisionActionsKey = "";
        state.renderCache.resultShellKey = "";
        state.renderCache.resultHeroKey = "";
        state.renderCache.resultExtraKey = "";
        state.renderCache.resultCountsKey = "";
        state.renderCache.resultActionsKey = "";
      }

      function renderDecisionShell(title, screenClass = "screen-card--round") {
        return `
          ${renderScreenAlerts()}
          <section class="card ${screenClass} decision-shell-card">
            <h2>${escapeHtml(title)}</h2>
            <div id="decisionFocusSlot"></div>
            <div id="decisionSummarySlot"></div>
            <div id="decisionCardsSlot"></div>
            <div id="decisionActionsSlot"></div>
          </section>
        `;
      }

      function buildDecisionConfig(room, view) {
        const round = getCurrentRound(room);
        const isFinal = view === "finalVote" || view === "finalHostDecide";
        const isRevote = view === "revote" || room.game.phase === "final_revote";
        const allowSelfVote = allowsSelfVote(room);

        if (view === "vote" || view === "revote" || view === "finalVote") {
          const candidates = isFinal ? getFinalCandidates(room, isRevote ? "revote" : "vote") : getVoteCandidates(room, view === "revote" ? "revote" : "vote");
          const source = isFinal ? room.game.finalVote : round;
          const selectedCandidate =
            candidates.find((candidate) => (candidate.candidateId ?? candidate.playerId) === (isFinal ? state.selectedFinalTarget : (view === "revote" ? state.selectedHostTarget : state.selectedVoteTarget))) || null;
          return {
            type: "vote",
            title: isFinal ? (isRevote ? "最終再投票" : "最終投票") : (view === "revote" ? "再投票" : "投票"),
            label: isFinal ? (isRevote ? "最終再投票" : "最終投票") : (view === "revote" ? "再投票" : getCurrentRound(room)?.label || "投票"),
            focusLabel: isFinal
              ? (isRevote ? "最終再投票" : "最終投票")
              : (view === "revote" ? `${getCurrentRound(room)?.label || "ラウンド"}の再投票` : `${getCurrentRound(room)?.label || "ラウンド"}の投票`),
            focusTitle: isFinal
              ? (isRevote ? "総合優勝の候補から選ぶ" : "総合優勝にしたいワードを選ぶ")
              : (view === "revote" ? "同票になったワードから選ぶ" : "一番おもしろいワードを選ぶ"),
            focusDescription: isRevote ? "同票になったワードだけが並びます。" : "候補のワードをひとつ選んで確定します。",
            focusMeta: [
              { label: "候補", value: `${candidates.length}語` },
              { label: "選択", value: selectedCandidate ? resolvePlayerDisplayName(room, selectedCandidate.playerId, selectedCandidate.displayName) : "未選択" }
            ],
            summaryTitle: isRevote ? "同票になったワード" : "",
            summaryHtml:
              isRevote && source?.voteSummary
                ? renderTiedCountSummary(
                    source.voteSummary.counts,
                    isFinal ? source.voteSummary.tiedCandidateIds : source.voteSummary.tiedPlayerIds,
                    isFinal ? "candidateId" : "playerId"
                  )
                : "",
            candidates,
            selectedId: isFinal ? state.selectedFinalTarget : (view === "revote" ? state.selectedHostTarget : state.selectedVoteTarget),
            dataAttr: isFinal ? "final-vote-id" : (view === "revote" ? "revote-id" : "vote-id"),
            selfId: room.me.playerId,
            allowSelfVote,
            screenClass: isFinal ? "screen-card--final" : "screen-card--round",
            heroTone: isFinal ? "final" : "round",
            action: isFinal ? "submit-final-vote" : (view === "revote" ? "submit-revote" : "submit-vote"),
            buttonLabel: isFinal ? (isRevote ? "このワードに再投票" : "このワードに投票") : (view === "revote" ? "このワードに再投票" : "このワードに投票")
          };
        }

        const source = isFinal ? room.game.finalVote : round;
        const counts = source?.voteSummary?.counts || [];
        const tiedIds = isFinal ? source?.voteSummary?.tiedCandidateIds || [] : source?.voteSummary?.tiedPlayerIds || [];
        const candidates = isFinal ? source.candidates.filter((candidate) => tiedIds.includes(candidate.candidateId)) : getVoteCandidates(room, "revote");
        const selectedCandidate =
          candidates.find((candidate) => (candidate.candidateId ?? candidate.playerId) === (isFinal ? state.selectedFinalTarget : state.selectedHostTarget)) || null;
        return {
          type: "host",
          title: isFinal ? "最終ホスト裁定" : "ホスト裁定",
          label: isFinal ? "最終裁定" : getCurrentRound(room)?.label || "ホスト裁定",
          focusLabel: isFinal ? "総合優勝の裁定" : `${getCurrentRound(room)?.label || "ラウンド"}の裁定`,
          focusTitle: isFinal ? "ホストが総合優勝を決める" : "ホストが勝ちワードを決める",
          focusDescription: "同票になったワードからひとつ選んで確定します。",
          focusMeta: [
            { label: "同票", value: `${candidates.length}語` },
            { label: "選択", value: selectedCandidate ? resolvePlayerDisplayName(room, selectedCandidate.playerId, selectedCandidate.displayName) : "未選択" }
          ],
          summaryTitle: "同票になったワード",
          summaryHtml: renderTiedCountSummary(counts, tiedIds, isFinal ? "candidateId" : "playerId"),
          candidates,
          selectedId: isFinal ? state.selectedFinalTarget : state.selectedHostTarget,
          dataAttr: isFinal ? "final-pick-id" : "host-pick-id",
          selfId: "__none__",
          allowSelfVote: true,
          screenClass: isFinal ? "screen-card--champion" : "screen-card--round",
          heroTone: isFinal ? "final" : "host",
          action: isFinal ? "submit-final-host-pick" : "submit-host-pick",
          buttonLabel: "このワードで確定"
        };
      }

      function renderDecisionFocus(config) {
        return `
          <section class="decision-hero decision-hero--${escapeHtml(config.heroTone || "round")}">
            <small>${escapeHtml(config.focusLabel || config.label || "")}</small>
            <strong>${escapeHtml(config.focusTitle || "")}</strong>
            ${config.focusDescription ? `<p>${escapeHtml(config.focusDescription)}</p>` : ""}
            ${
              config.focusMeta?.length
                ? `
                  <div class="decision-hero-meta">
                    ${config.focusMeta
                      .map((item) => `<span>${escapeHtml(item.label)} ${escapeHtml(item.value)}</span>`)
                      .join("")}
                  </div>
                `
                : ""
            }
          </section>
        `;
      }

      function renderDecisionSummary(config) {
        if (!config.summaryHtml) {
          return "";
        }
        return renderSection(config.summaryTitle, config.summaryHtml, { className: "panel" });
      }

      function renderDecisionCards(config) {
        return renderVoteCards(config.candidates, config.selectedId, config.dataAttr, config.selfId, {
          allowSelfVote: config.allowSelfVote,
          disableSelf: config.type === "host" ? false : undefined
        });
      }

      function renderDecisionActions(config) {
        return `
          <div class="button-row split-actions">
            <button class="btn ghost" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
            <button class="btn primary" type="button" data-action="${config.action}" ${config.selectedId && !state.pendingAction ? "" : "disabled"}>
              ${escapeHtml(config.buttonLabel)}
            </button>
          </div>
        `;
      }

      function updateDecisionView(room, view) {
        const config = buildDecisionConfig(room, view);
        const shellKey = `${view}|${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.decisionShellKey !== shellKey) {
          state.renderCache.decisionShellKey = shellKey;
          state.renderCache.decisionFocusKey = "";
          state.renderCache.decisionSummaryKey = "";
          state.renderCache.decisionCardsKey = "";
          state.renderCache.decisionActionsKey = "";
          els.app.innerHTML = renderDecisionShell(config.title, config.screenClass);
        }

        const candidatesStamp = config.candidates
          .map((candidate) => `${candidate.candidateId ?? candidate.playerId}:${candidate.phrase}:${candidate.fontId}:${(candidate.renderedLines || []).join("/")}`)
          .join("|");
        const focusKey = [view, room.revision, config.selectedId || "", state.pendingAction ? "pending" : "idle", candidatesStamp].join("|");
        const summaryKey = [view, room.revision, config.summaryTitle, config.summaryHtml].join("|");
        const cardsKey = [view, room.revision, config.selectedId || "", candidatesStamp].join("|");
        const actionsKey = [view, config.selectedId || "", state.pendingAction ? "pending" : "idle", config.action].join("|");

        patchSlot(els.app, "#decisionFocusSlot", "decisionFocusKey", focusKey, renderDecisionFocus(config));
        patchSlot(els.app, "#decisionSummarySlot", "decisionSummaryKey", summaryKey, renderDecisionSummary(config));
        patchSlot(els.app, "#decisionCardsSlot", "decisionCardsKey", cardsKey, renderDecisionCards(config));
        patchSlot(els.app, "#decisionActionsSlot", "decisionActionsKey", actionsKey, renderDecisionActions(config));
      }

      function renderResultShell(title, screenClass = "screen-card--round-result") {
        return `
          ${renderScreenAlerts()}
          <section class="card ${screenClass}">
            <h2>${escapeHtml(title)}</h2>
            <div id="resultHeroSlot"></div>
            <div class="result-support-grid">
              <div id="resultExtraSlot"></div>
              <div id="resultCountsSlot"></div>
            </div>
            <div id="resultActionsSlot"></div>
          </section>
        `;
      }

      function buildResultConfig(room, view) {
        if (view === "roundResult") {
          const round = getCurrentRound(room);
          const winner = round?.winner;
          return {
            title: `${round?.label || "ラウンド"}結果発表`,
            screenClass: "screen-card--round-result",
            heroHtml: renderWordStage({
              stageClass: "result-stage",
              label: "勝ちワード",
              entry: winner,
              wordClass: "result-word",
              maxFont: 48,
              minFont: 24,
              emptyText: "結果待ちです。",
              footerHtml: winner
                ? renderSummaryPills([
                    { label: "勝ちワードの持ち主", value: resolvePlayerDisplayName(room, winner.playerId, winner.displayName) },
                    { label: "得票", value: `${winner.voteCount}票` }
                  ])
                : ""
            }),
            extraHtml: "",
            countsHtml: renderCountBreakdown(`${round?.label || "ラウンド"}の票数内訳`, round?.voteSummary?.counts || [], (item) => `${item.count}票 / ${item.displayName}`),
            actionsHtml: room.me.isHost
              ? `
                  <div class="button-row split-actions">
                    <button class="btn ghost" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
                    <button class="btn primary" type="button" data-action="proceed-round" ${state.pendingAction ? "disabled" : ""}>
                      ${room.game.roundIndex === room.game.rounds.length - 1 ? "最終投票へ進む" : "次のラウンドへ"}
                    </button>
                  </div>
                `
              : `
                  <div class="info-box">ホストの進行待ちです。</div>
                  <div class="button-row align-left">
                    <button class="btn ghost" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
                  </div>
                `
          };
        }

        const champion = room.game.champion;
        return {
          title: "結果一覧",
          screenClass: "screen-card--champion",
          heroHtml: renderWordStage({
            stageClass: "champion-stage is-grand",
            label: "総合優勝",
            entry: champion,
            wordClass: "champion-word",
            boardSkin: "bare",
            maxFont: 70,
            minFont: 30,
            emptyText: "未確定です。",
            footerHtml: champion ? `<p class="stage-footnote">${escapeHtml(resolvePlayerDisplayName(room, champion.playerId, champion.displayName))}</p>` : ""
          }),
          extraHtml: renderSection("各ラウンドの勝ちワード", renderRoundWinnerGrid(room.game.rounds, room), { className: "panel" }),
          countsHtml: room.game.finalVote?.voteSummary
            ? renderCountBreakdown("最終投票の票数内訳", room.game.finalVote.voteSummary.counts, (item) => `${item.count}票 / ${item.displayName}`)
            : "",
          actionsHtml: room.me.isHost
            ? `
                <div class="button-row split-actions">
                  <button class="btn ghost" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
                  <button class="btn primary" type="button" data-action="restart-game" ${state.pendingAction ? "disabled" : ""}>もう一度最初から</button>
                </div>
              `
            : `
                <div class="info-box">ホストの再開待ちです。</div>
                <div class="button-row align-left">
                  <button class="btn ghost" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>退出する</button>
                </div>
              `
        };
      }

      function updateResultView(room, view) {
        const config = buildResultConfig(room, view);
        const shellKey = `${view}|${room.roomId}|${room.me.playerId}`;
        if (state.renderCache.resultShellKey !== shellKey) {
          state.renderCache.resultShellKey = shellKey;
          state.renderCache.resultHeroKey = "";
          state.renderCache.resultExtraKey = "";
          state.renderCache.resultCountsKey = "";
          state.renderCache.resultActionsKey = "";
          els.app.innerHTML = renderResultShell(config.title, config.screenClass);
        }

        const heroKey = [view, room.revision, config.heroHtml].join("|");
        const extraKey = [view, room.revision, config.extraHtml].join("|");
        const countsKey = [view, room.revision, config.countsHtml].join("|");
        const actionsKey = [view, room.revision, state.pendingAction ? "pending" : "idle", room.me.isHost ? "host" : "guest"].join("|");

        patchSlot(els.app, "#resultHeroSlot", "resultHeroKey", heroKey, config.heroHtml);
        patchSlot(els.app, "#resultExtraSlot", "resultExtraKey", extraKey, config.extraHtml);
        patchSlot(els.app, "#resultCountsSlot", "resultCountsKey", countsKey, config.countsHtml);
        patchSlot(els.app, "#resultActionsSlot", "resultActionsKey", actionsKey, config.actionsHtml);
      }

      function renderVoteCards(candidates, selectedId, dataAttr, selfId, options = {}) {
        return `
          <div class="action-grid">
            ${candidates
              .map((candidate) => {
                const disabled = options.disableSelf !== false && candidate.playerId === selfId && !Boolean(options.allowSelfVote);
                const value = candidate.candidateId ?? candidate.playerId;
                return `
                  <button
                    class="action-card${selectedId === value ? " selected" : ""}${disabled ? " disabled" : ""}"
                    type="button"
                    aria-pressed="${selectedId === value ? "true" : "false"}"
                    data-${dataAttr}="${escapeHtml(value)}"
                    ${disabled ? "disabled" : ""}
                  >
                    <div class="action-card-top">
                      <span class="badge">${escapeHtml(candidate.displayName)}</span>
                      <span class="action-card-indicator">${disabled ? "対象外" : selectedId === value ? "選択中" : "選ぶ"}</span>
                    </div>
                    ${renderWordBoard(candidate.renderedLines, candidate.fontId, "vote-word", {
                      maxFont: 76,
                      minFont: 34,
                      lineGapPreset: candidate.lineGapPreset,
                      sizePreset: candidate.sizePreset,
                      fontSizeHint: candidate.fontSizeHint
                    })}
                  </button>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function renderVote(room, mode = "vote") {
        const round = getCurrentRound(room);
        const candidates = getVoteCandidates(room, mode);
        const allowSelfVote = allowsSelfVote(room);
        const selectedId = mode === "revote" ? state.selectedHostTarget : state.selectedVoteTarget;
        return renderVoteDecisionScreen({
          label: mode === "revote" ? "同票の再投票" : getCurrentRound(room)?.label || "投票",
          title: mode === "revote" ? "再投票" : "このラウンドで一番おもしろいワードに投票",
          description: "",
          summaryHtml:
            mode === "revote" && round?.voteSummary
              ? renderSection(
                  "同票になったワード",
                  renderTiedCountSummary(round.voteSummary.counts, round.voteSummary.tiedPlayerIds, "playerId"),
                  { className: "panel" }
                )
              : "",
          candidates,
          selectedId,
          dataAttr: mode === "revote" ? "revote-id" : "vote-id",
          selfId: room.me.playerId,
          allowSelfVote,
          action: mode === "revote" ? "submit-revote" : "submit-vote",
          buttonLabel: mode === "revote" ? "このワードに再投票" : "このワードに投票"
        });
      }

      function renderHostDecide(room, isFinal = false) {
        const source = isFinal ? room.game.finalVote : getCurrentRound(room);
        const counts = source?.voteSummary?.counts || [];
        const tiedIds = isFinal ? source?.voteSummary?.tiedCandidateIds || [] : source?.voteSummary?.tiedPlayerIds || [];
        const candidates = isFinal

      function updateSubmitPreview(room) {
        const previewWord = document.getElementById("previewWord");
        if (!previewWord || deriveView(room) !== "submit") {
          syncSubmitPreviewFloating(null);
          return;
        }
        const layout = computeDraftLayout();
        const text = state.draftLineMode === "single" ? getDraftDisplayText(room) : getDraftText(room);
        const chars = Array.from(text);
        const sizePreset = getSizePreset(state.draftSizePreset);
        const previewFontSize = getPreviewDisplayFontSize(layout.fontSize);
        previewWord.dataset.fontId = state.draftFontId;
        previewWord.dataset.lineMode = state.draftLineMode;
        previewWord.dataset.sizePreset = sizePreset.id;
        previewWord.dataset.variant = "preview-word";
        previewWord.dataset.lineGapPreset = state.draftLineGapPreset;
        previewWord.dataset.maxFont = String(previewFontSize);
        previewWord.dataset.minFont = String(previewFontSize);
        previewWord.dataset.fontSizeHint = String(previewFontSize);
        applyWordMarkup(previewWord, layout.lines, getFontClass(state.draftFontId), state.draftLineMode, previewFontSize, state.draftLineGapPreset);
        window.requestAnimationFrame(() => syncSubmitPreviewFloating(room));
        window.setTimeout(() => syncSubmitPreviewFloating(room), 120);
      }

      function syncSubmitPreviewFloating(room = state.room) {
        const submitTopSlot = document.getElementById("submitTopSlot");
        const previewCard = submitTopSlot?.querySelector(".preview-card");
        const currentView = deriveView(room);
        if (!submitTopSlot || !previewCard || currentView !== "submit") {
          if (submitTopSlot) {
            submitTopSlot.style.minHeight = "";
          }
          if (previewCard) {
            previewCard.classList.remove("is-floating");
            previewCard.style.removeProperty("--preview-floating-left");
            previewCard.style.removeProperty("--preview-floating-width");
          }
          return;
        }

        const slotRect = submitTopSlot.getBoundingClientRect();
        const feedbackBottom = els.feedbackDock?.children.length ? els.feedbackDock.getBoundingClientRect().bottom : 0;
        const floatTop = Math.max(8, feedbackBottom + 8);
        const cardHeight = previewCard.offsetHeight;
        const revealOpen = !els.revealOverlay.hidden;
        const hasScrolled = window.scrollY > 1 || document.documentElement.scrollTop > 1 || document.body.scrollTop > 1;
        const canFloat = !revealOpen && (hasScrolled || slotRect.top < floatTop);

        if (!canFloat) {
          submitTopSlot.style.minHeight = "";
          previewCard.classList.remove("is-floating");
          previewCard.style.removeProperty("--preview-floating-top");
          previewCard.style.removeProperty("--preview-floating-left");
          previewCard.style.removeProperty("--preview-floating-width");
          return;
        }

        submitTopSlot.style.minHeight = `${cardHeight}px`;
        previewCard.classList.add("is-floating");
        previewCard.style.setProperty("--preview-floating-top", `${floatTop}px`);
        previewCard.style.setProperty("--preview-floating-left", `${Math.max(0, slotRect.left)}px`);
        previewCard.style.setProperty("--preview-floating-width", `${slotRect.width}px`);
      }

      function handleScrollReset(room = state.room, view = deriveView(room)) {
        const scrollResetKey = getScrollResetKey(room, view);
        if (state.lastScrollResetKey === scrollResetKey) {
          return;
        }
        state.lastScrollResetKey = scrollResetKey;
        window.requestAnimationFrame(() => {
          if (document.activeElement instanceof HTMLElement) {
            document.activeElement.blur();
          }
          scrollAppToTop();
          window.setTimeout(scrollAppToTop, 80);
          window.setTimeout(scrollAppToTop, 180);
          window.requestAnimationFrame(() => syncSubmitPreviewFloating(room));
          window.setTimeout(() => syncSubmitPreviewFloating(room), 120);
        });
      }

      function updateCurrentViewOnly(room = state.room, view = deriveView(room)) {
        ensureGoogleFontsLoaded(collectVisibleFontIds(room, view));

        if (view === "inviteJoin") {
          return false;
        }
        if (isLandingView(view)) {
          updateLandingView();
          return true;
        }
        if (isLobbyView(view) && room) {
          updateLobbyView(room);
          return true;
        }
        if (isSubmitView(view) && room) {
          updateSubmitView(room);
          updateSubmitPreview(room);
          return true;
        }
        if (view === "wait" && room) {
          updateWaitView(room);
          return true;
        }
        if (isDecisionView(view) && room) {
          updateDecisionView(room, view);
          return true;
        }
        if (isResultView(view) && room) {
          updateResultView(room, view);
          return true;
        }
        return false;
      }

        if (!reveal) {

        const round = reveal.roundIndex !== null && reveal.roundIndex !== undefined ? room?.game?.rounds?.[reveal.roundIndex] : null;

            kind: "champion",
            variant: "champion-word",
            maxFont: 60,

        if (reveal.kind === "round_winner") {
          return {
          badge: round?.label || "ラウンド勝利",
          lines: clone(reveal.renderedLines || [reveal.phrase]),
          fontId: reveal.fontId || "classic",

          };
        }
        return {
          badge: round?.label || "ラウンド公開",
          lines: clone(reveal.renderedLines || [reveal.phrase]),
          fontId: reveal.fontId || "broadcast",
          sizePreset: normalizeSizePresetId(reveal.sizePreset || "large"),
          fontSizeHint: reveal.fontSizeHint || 0,
          lineGapPreset: reveal.lineGapPreset || "none",
          boardSkin: "bare",
          meta: resolvePlayerDisplayName(room, reveal.playerId, reveal.displayName),
          buttonLabel: meAcknowledged ? "ほかの人を待っています" : "閉じる",
          acknowledged: meAcknowledged,
          kind: "submission",
          variant: "preview-word",
          maxFont: 72,

        };

      function renderReveal() {
        const reveal = getActiveReveal();
        if (!reveal) {
          state.renderCache.revealKey = "";
          els.revealOverlay.hidden = true;
          return;
        }
        const presentation = buildRevealPresentation(reveal);
        ensureGoogleFontsLoaded([presentation.fontId || "classic"]);
        const revealKey = [
          reveal.revealId,
          reveal.kind,
          presentation.badge,
          presentation.meta,
          presentation.buttonLabel,
          presentation.acknowledged ? "ack" : "open",
          state.pendingAction ? "pending" : "idle",
          presentation.lines.join("|"),
          presentation.fontId || "classic"
        ].join("|");

        if (state.renderCache.revealKey === revealKey) {
          els.revealOverlay.hidden = false;
          return;
        }
        state.renderCache.revealKey = revealKey;

        els.revealOverlay.hidden = false;
        const sizePreset = getSizePreset(presentation.sizePreset || "large");
        const revealMaxFontBase = presentation.maxFont || (presentation.kind === "champion" ? 56 : 50);
        const revealMinFontBase = presentation.minFont || (presentation.kind === "champion" ? 24 : 22);
        const mobileViewport = window.innerWidth <= 767;
        const revealCardWidth = els.revealCard?.clientWidth || Math.min(window.innerWidth * 0.96, 520);
        const revealInnerWidth = Math.max(208, Math.round(revealCardWidth - (presentation.kind === "submission" ? 52 : 44)));
        const revealWidthFactor = mobileViewport ? Math.max(0.96, Math.min(1.18, revealInnerWidth / 340)) : 1;
        const viewportFontCap = mobileViewport
          ? presentation.kind === "submission"
            ? 124
            : presentation.kind === "champion"
              ? 116
              : 104
          : Infinity;
        const preferredRevealFont = presentation.fontSizeHint
          ? Math.round(Math.max(revealMinFontBase, presentation.fontSizeHint * revealWidthFactor))
          : Math.round(revealMaxFontBase * sizePreset.renderScale * revealWidthFactor);
        els.revealCard.classList.toggle("is-champion", presentation.kind === "champion");
        els.revealCard.classList.toggle("is-submission", presentation.kind === "submission");
        els.revealCard.classList.toggle("is-round-winner", presentation.kind === "round_winner");
        els.revealBadge.textContent = presentation.badge;
        els.revealBadge.hidden = !presentation.badge;
        els.revealMeta.textContent = presentation.meta;
        els.revealMeta.hidden = !presentation.meta;
        els.revealWord.dataset.variant = presentation.variant || (presentation.kind === "champion" ? "champion-word" : "result-word");
        els.revealWord.dataset.fontId = presentation.fontId || "classic";
        els.revealWord.dataset.lineMode = presentation.lines.length <= 1 ? "single" : "manual";
        const revealHint = Number.isFinite(Number(presentation.fontSizeHint)) ? Math.round(Number(presentation.fontSizeHint)) : 0;
        const computedRevealMin = Math.max(6, Math.min(viewportFontCap - 8, Math.round(revealMinFontBase * Math.max(0.72, sizePreset.renderScale - 0.04))));
        const effectiveRevealMin = revealHint ? Math.min(computedRevealMin, Math.max(4, revealHint)) : computedRevealMin;
        els.revealWord.dataset.maxFont = String(Math.min(viewportFontCap, Math.max(effectiveRevealMin, preferredRevealFont)));
        els.revealWord.dataset.minFont = String(effectiveRevealMin);
        els.revealWord.dataset.fontSizeHint = presentation.fontSizeHint ? String(presentation.fontSizeHint) : "";
        els.revealWord.dataset.sizePreset = sizePreset.id;
        els.revealWord.dataset.lineGapPreset = presentation.lineGapPreset || "none";
        els.revealWord.dataset.boardSkin = presentation.boardSkin || "bare";
        els.revealWord.className = `word-board auto-fit-word ${els.revealWord.dataset.variant}`;
        els.revealWord.innerHTML = presentation.lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("");
        hydrateWordBoard(els.revealWord);
        window.requestAnimationFrame(() => hydrateWordBoard(els.revealWord));
        window.setTimeout(() => hydrateWordBoard(els.revealWord), 60);
        window.setTimeout(() => hydrateWordBoard(els.revealWord), 180);
        window.setTimeout(() => hydrateWordBoard(els.revealWord), 360);
        ensureFontsReady([presentation.fontId || "classic"]).then(() => {
          hydrateWordBoard(els.revealWord);
        }).catch(() => {});
        els.closeRevealBtn.textContent = presentation.buttonLabel;
        els.closeRevealBtn.disabled = Boolean(presentation.acknowledged || state.pendingAction);

        const { pendingMode = "action" } = options;
        state.pendingAction = true;
        state.pendingMode = pendingMode;
        setFeedback("");
        renderCurrentView();
        try {
          await action();
        } catch (error) {
          if (!recoverLostSession(error, "action")) {
            setFeedback(describeAppError(error, "action"), true);
          }
        } finally {
          state.pendingAction = false;
          state.pendingMode = "";

          tileIds: selectedTiles.map((tile) => tile.tileId),
          tileOrder: [0, 1],
          phrase,
          fontId: state.draftFontId,
          sizePreset: state.draftSizePreset,
          lineGapPreset: state.draftLineGapPreset,
          fontSizeHint: layout.fontSize,
          lineMode: state.draftLineMode,
          manualBreaks: clone(state.draftManualBreaks),
          renderedLines: clone(layout.lines)

      }

      async function toggleChampionLike(championId) {
        if (!championId || isChampionLikePending(championId)) {
          return;
        }
        const currentItem = findChampionItem(championId);
        const optimisticItem = buildOptimisticChampionLikeItem(currentItem);
        if (optimisticItem) {
          applyChampionLikeUpdate(optimisticItem);
        }
        state.championLikePendingIds = [...state.championLikePendingIds, championId];
        renderCurrentView({ includeReveal: false });

        try {
          const payload = await apiRequest(`/champions/${encodeURIComponent(championId)}/like-toggle`, {
            method: "POST",
            body: {},
            playerToken: ""
          });
          applyChampionLikeUpdate(payload.data.item);
          renderCurrentView({ includeReveal: false });
          Promise.all([
            loadRecentChampions(),
            loadChampionRanking(10),
            state.championHistoryOpen ? loadChampionHistory(state.championHistoryLimit) : Promise.resolve()
          ])
            .then(() => renderCurrentView({ includeReveal: false }))
            .catch(() => {});
          setFeedback(payload.data.item.likedByMe ? "いいねしました。" : "いいねを取り消しました。", false, 1800);
        } catch (error) {
          if (currentItem) {
            applyChampionLikeUpdate(currentItem);
          }
          const appError = error instanceof AppError ? error : new AppError("いいねの更新に失敗しました。", { cause: error });
          setFeedback(describeAppError(appError, "action"), true, 2800);
        } finally {
          state.championLikePendingIds = state.championLikePendingIds.filter((item) => item !== championId);
          renderCurrentView({ includeReveal: false });
        }
      }

      function toggleDraftTile(tileId) {
        const room = state.room;
        const tile = room?.myHand.find((item) => item.tileId === tileId);
        if (!tile || tile.isUsed) {
          return;
        }
        if (state.draftSelectedTileIds.includes(tileId)) {
          state.draftSelectedTileIds = state.draftSelectedTileIds.filter((id) => id !== tileId);
        } else if (state.draftSelectedTileIds.length >= 2) {
          state.draftSelectedTileIds = [state.draftSelectedTileIds[1], tileId];
        } else {
          state.draftSelectedTileIds = [...state.draftSelectedTileIds, tileId];
        }
        sanitizeManualBreaks(room);
        renderCurrentView({ includeReveal: false });
      }

      function toggleManualBreak(point) {
        if (state.draftManualBreaks.includes(point)) {
          state.draftManualBreaks = state.draftManualBreaks.filter((value) => value !== point);
        } else {
          state.draftManualBreaks = [...state.draftManualBreaks, point];
        }
        renderCurrentView({ includeReveal: false });
      }

      function reorderLobbyPlayerIds(playerIds, draggedId, targetId) {
        const nextOrder = [...playerIds];
        const draggedIndex = nextOrder.indexOf(draggedId);
        const targetIndex = nextOrder.indexOf(targetId);
        if (draggedIndex === -1 || targetIndex === -1 || draggedIndex === targetIndex) {
          return nextOrder;
        }
        const [dragged] = nextOrder.splice(draggedIndex, 1);
        nextOrder.splice(targetIndex, 0, dragged);
        return nextOrder;
      }

      function shuffleLobbyPlayerIds(playerIds) {
        const nextOrder = [...playerIds];
        for (let index = nextOrder.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [nextOrder[index], nextOrder[swapIndex]] = [nextOrder[swapIndex], nextOrder[index]];
        }
        return nextOrder;
      }

      function clearLobbyDragUi() {
        state.dragPointerId = 0;
        state.dragPointerStartY = 0;
        state.draggingLobbyPlayerId = "";
        state.dragTargetLobbyPlayerId = "";
        document.querySelectorAll("[data-order-player-id].is-dragging").forEach((node) => {
          node.classList.remove("is-dragging");
          node.style.removeProperty("--drag-offset-y");
        });
        document.querySelectorAll("[data-order-player-id].is-drop-target").forEach((node) => node.classList.remove("is-drop-target"));
      }

      function updateLobbyDropTarget(targetId) {
        state.dragTargetLobbyPlayerId = targetId || "";
        document.querySelectorAll("[data-order-player-id]").forEach((node) => {
          node.classList.toggle("is-drop-target", Boolean(targetId) && node.dataset.orderPlayerId === targetId);
        });
      }

      function getNearestLobbyDropTarget(clientY) {
        const candidates = Array.from(document.querySelectorAll("[data-order-player-id]")).filter(
          (node) => node.dataset.orderPlayerId && node.dataset.orderPlayerId !== state.draggingLobbyPlayerId
        );
        if (!candidates.length) {
          return "";
        }
        let bestTargetId = "";
        let bestDistance = Number.POSITIVE_INFINITY;
        candidates.forEach((node) => {
          const rect = node.getBoundingClientRect();
          const middle = rect.top + rect.height / 2;
          const distance = Math.abs(clientY - middle);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestTargetId = node.dataset.orderPlayerId || "";
          }
        });
        return bestTargetId;
      }

      async function persistLobbyPlayerOrder(playerOrder) {
        if (!state.roomId || !state.playerToken || !Array.isArray(playerOrder) || !playerOrder.length) {
          return;
        }
        const currentOrder = getLobbyPlayerOrder(state.room).map((player) => player.playerId);
        if (currentOrder.join("|") === playerOrder.join("|")) {
          return;
        }
        await runAction(async () => {
          const payload = await postApi(`/rooms/${encodeURIComponent(state.roomId)}/player-order`, {
            playerOrder
          });
          state.selectedStartPlayerId = playerOrder[0] || "";
          setRoom(payload.data.room);
        }, { pendingMode: "refresh" });
      }

      function canStartLobbyDrag(target) {
        if (!target.closest?.(".order-grab")) {
          return false;
        }
        return Boolean(target.closest?.("[data-order-player-id]"));
      }

      function startLobbyDrag(card, pointerId, clientY) {
        if (!card || deriveView() !== "lobby" || !state.room?.me?.isHost) {
          return false;
        }
        state.draggingLobbyPlayerId = card.dataset.orderPlayerId || "";
        state.dragPointerId = pointerId;
        state.dragPointerStartY = clientY;
        card.classList.add("is-dragging");
        card.style.setProperty("--drag-offset-y", "0px");
        return true;
      }

      function moveLobbyDrag(clientY) {
        if (!state.draggingLobbyPlayerId || deriveView() !== "lobby" || !state.room?.me?.isHost) {
          return;
        }
        const draggedCard = document.querySelector(`[data-order-player-id="${CSS.escape(state.draggingLobbyPlayerId)}"]`);
        if (draggedCard) {
          draggedCard.style.setProperty("--drag-offset-y", `${clientY - state.dragPointerStartY}px`);
        }
        const targetId = getNearestLobbyDropTarget(clientY);
        updateLobbyDropTarget(targetId && targetId !== state.draggingLobbyPlayerId ? targetId : "");
      }

      async function finishLobbyDrag(clientY) {
        if (!state.draggingLobbyPlayerId || deriveView() !== "lobby" || !state.room?.me?.isHost) {
          return;
        }
        const draggedId = state.draggingLobbyPlayerId;
        const targetId = getNearestLobbyDropTarget(clientY) || state.dragTargetLobbyPlayerId || "";
        clearLobbyDragUi();
        if (!targetId || draggedId === targetId) {
          return;
        }
        const nextOrder = reorderLobbyPlayerIds(
          getLobbyPlayerOrder(state.room).map((player) => player.playerId),
          draggedId,
          targetId
        );
        await persistLobbyPlayerOrder(nextOrder);
      }

          const nextIndex =

              ? Math.max(0, currentIndex - 1)
              : Math.min(currentOrder.length - 1, currentIndex + 1);
          if (nextIndex === currentIndex) {
            return;

          const nextOrder = [...currentOrder];
          const [moved] = nextOrder.splice(currentIndex, 1);
