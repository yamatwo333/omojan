<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おもじゃん</title>
    <style>
      :root {
        --paper: #f6efdb;
        --paper-deep: #ead8a9;
        --ink: #1f1812;
        --green: #23442f;
        --green-soft: rgba(36, 69, 47, 0.08);
        --gold: #b28a32;
        --gold-soft: rgba(178, 138, 50, 0.12);
        --red: #b84431;
        --red-soft: rgba(184, 68, 49, 0.12);
        --line: rgba(118, 89, 63, 0.2);
        --muted: #6f6255;
        --shadow: 0 24px 42px rgba(29, 22, 15, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 30%),
          repeating-linear-gradient(
            -35deg,
            rgba(102, 86, 58, 0.04) 0,
            rgba(102, 86, 58, 0.04) 2px,
            transparent 2px,
            transparent 15px
          ),
          linear-gradient(180deg, #f7f1df, #ecdfb7);
      }

      main {
        width: min(100%, 1100px);
        margin: 0 auto;
        padding: 22px 14px 48px;
      }

      .page-header {
        text-align: center;
        margin-bottom: 12px;
      }

      .page-header h1 {
        margin: 0;
        color: var(--green);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        font-size: clamp(34px, 8vw, 52px);
      }

      .phone-shell {
        display: flex;
        justify-content: center;
      }

      .phone {
        width: min(100%, 430px);
        min-height: calc(100vh - 120px);
        padding: 14px;
        border-radius: 34px;
        border: 3px solid #1f1710;
        background:
          linear-gradient(180deg, rgba(245, 235, 209, 0.98), rgba(253, 247, 235, 0.98)),
          var(--paper);
        box-shadow: var(--shadow);
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        color: var(--green);
        font-size: 12px;
      }

      .status-context {
        min-width: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .status-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .mini-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.28);
        background: rgba(255, 250, 238, 0.92);
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
      }

      .card,
      .panel,
      .history-card,
      .player-card,
      .action-card,
      .preview-card,
      .result-stage,
      .champion-stage {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.66);
      }

      .card,
      .panel {
        margin-top: 14px;
        padding: 15px;
        border-radius: 22px;
      }

      .card h2,
      .panel h3 {
        margin: 0;
        color: var(--green);
        font-size: 18px;
      }

      .card p,
      .panel p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .field-stack,
      .player-list,
      .history-list,
      .action-grid,
      .vote-grid {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label,
      .section-label {
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
      }

      .input {
        width: 100%;
        min-height: 48px;
        padding: 0 14px;
        border-radius: 16px;
        border: 1px solid rgba(118, 89, 63, 0.22);
        background: rgba(255, 252, 245, 0.98);
        color: var(--ink);
        font: inherit;
      }

      .input:focus {
        outline: 2px solid rgba(184, 138, 50, 0.36);
        outline-offset: 2px;
      }

      .chip-row,
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .chip,
      .break-dot,
      .tile,
      .action-card {
        appearance: none;
        border: 1px solid rgba(118, 89, 63, 0.18);
        background: rgba(255, 255, 255, 0.8);
        color: var(--ink);
      }

      .chip {
        min-height: 40px;
        padding: 0 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .chip.active {
        border-color: rgba(184, 68, 49, 0.32);
        background: rgba(248, 220, 210, 0.88);
        color: #8d2d1d;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 16px;
        border: 0;
        border-radius: 16px;
        font-size: 15px;
        font-weight: 800;
      }

      .btn.primary {
        background: linear-gradient(180deg, #c7523d, #b0402d);
        color: #fff7ef;
      }

      .btn.subtle {
        border: 1px solid rgba(184, 138, 50, 0.38);
        background: rgba(255, 250, 238, 0.96);
        color: var(--green);
      }

      .btn:disabled,
      .chip:disabled,
      .tile:disabled,
      .action-card:disabled {
        opacity: 0.42;
      }

      .room-code {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 250, 238, 0.98);
        border: 1px solid rgba(184, 138, 50, 0.38);
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .player-card,
      .history-card {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 13px 14px;
        border-radius: 18px;
      }

      .player-card strong,
      .history-card strong {
        display: block;
      }

      .player-card span,
      .history-card span,
      .muted {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--green);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .preview-card,
      .result-stage,
      .champion-stage {
        margin-top: 14px;
        padding: 16px 15px;
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 250, 241, 0.96), rgba(251, 244, 227, 0.96)),
          #fff9ef;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
      }

      .preview-card small,
      .result-stage small,
      .champion-stage small {
        color: var(--muted);
        font-size: 12px;
      }

      .word-board {
        margin-top: 10px;
        min-height: 124px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.06;
        word-break: keep-all;
      }

      .word-board.is-single-line {
        white-space: nowrap;
      }

      .word-line {
        display: block;
      }

      .font-classic {
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }

      .font-broadcast,
      .font-heavy {
        font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
        font-weight: 800;
      }

      .font-playful,
      .font-round {
        font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
        font-weight: 700;
      }

      .font-magic {
        font-family: "Yusei Magic", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
        font-weight: 700;
      }

      .font-rampart {
        font-family: "Rampart One", "Hiragino Sans", "Yu Gothic", sans-serif;
        font-weight: 400;
      }

      .font-dot {
        font-family: "DotGothic16", "Hiragino Sans", "Yu Gothic", sans-serif;
        font-weight: 400;
      }

      .preview-word {
        min-height: 142px;
      }

      .vote-word {
        min-height: 116px;
      }

      .result-word {
        min-height: 132px;
      }

      .champion-word {
        min-height: 152px;
      }

      .preview-caption {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
        text-align: center;
      }

      .break-panel {
        margin-top: 14px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(118, 89, 63, 0.16);
        background: rgba(255, 255, 255, 0.72);
      }

      .break-panel p {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .break-track {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .char-box {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        min-height: 42px;
        padding: 0 8px;
        border-radius: 12px;
        border: 1px solid rgba(184, 138, 50, 0.18);
        background: rgba(248, 239, 216, 0.76);
        font-size: 17px;
      }

      .break-dot {
        position: relative;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
      }

      .break-dot.active {
        border-color: rgba(184, 68, 49, 0.36);
        background: rgba(248, 220, 210, 0.92);
      }

      .break-dot.active::after {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 999px;
        background: var(--red);
      }

      .tile-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
      }

      .tile {
        min-height: 76px;
        padding: 8px 4px;
        border-radius: 14px;
        background:
          linear-gradient(180deg, rgba(255, 251, 241, 0.96), rgba(248, 239, 216, 0.94)),
          #fff7ea;
        font-size: 14px;
        line-height: 1.2;
        word-break: break-word;
      }

      .tile.selected {
        border-color: rgba(184, 68, 49, 0.36);
        background: rgba(250, 230, 222, 0.96);
        color: #8d2d1d;
      }

      .tile.used {
        opacity: 0.34;
      }

      .action-grid {
        display: grid;
        gap: 10px;
      }

      .action-card {
        width: 100%;
        padding: 14px;
        border-radius: 18px;
        text-align: left;
      }

      .action-card > * {
        pointer-events: none;
      }

      .action-card.selected {
        border-color: rgba(184, 68, 49, 0.36);
        background: rgba(250, 230, 222, 0.92);
      }

      .action-card.disabled {
        opacity: 0.38;
        cursor: default;
      }

      .action-card .muted {
        margin-top: 8px;
      }

      .empty-state,
      .error-box,
      .info-box {
        margin-top: 14px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .error-box {
        border: 1px solid rgba(184, 68, 49, 0.28);
        color: #8d2d1d;
        background: rgba(250, 226, 218, 0.82);
      }

      .info-box {
        border: 1px solid rgba(184, 138, 50, 0.2);
        background: rgba(255, 250, 238, 0.8);
      }

      .alert-actions,
      .utility-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .utility-card {
        margin-top: 14px;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(118, 89, 63, 0.16);
        background: rgba(255, 255, 255, 0.7);
      }

      .utility-card h3 {
        margin: 0;
        color: var(--green);
        font-size: 15px;
      }

      .utility-card p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .focus-callout {
        margin-top: 14px;
        padding: 15px 16px;
        border-radius: 20px;
        border: 1px solid rgba(184, 138, 50, 0.24);
        background:
          linear-gradient(180deg, rgba(255, 251, 242, 0.96), rgba(246, 236, 208, 0.96)),
          #fff8ec;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
      }

      .focus-callout small {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .focus-callout strong {
        display: block;
        margin-top: 5px;
        color: var(--green);
        font-size: 19px;
        line-height: 1.45;
      }

      .focus-callout p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .summary-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .summary-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.22);
        background: rgba(255, 255, 255, 0.9);
        color: var(--green);
        font-size: 12px;
        font-weight: 700;
      }

      .summary-pill strong {
        color: var(--ink);
        font-size: 12px;
      }

      .order-preview {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .order-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid rgba(118, 89, 63, 0.16);
        background: rgba(255, 255, 255, 0.72);
      }

      .order-item strong {
        color: var(--green);
        font-size: 12px;
        min-width: 40px;
      }

      .order-item span {
        color: var(--ink);
        font-size: 14px;
        font-weight: 700;
      }

      .order-item.is-first {
        border-color: rgba(184, 68, 49, 0.26);
        background: rgba(250, 230, 222, 0.82);
      }

      .stage-footnote {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
        text-align: center;
      }

      .reveal-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(28, 21, 14, 0.28);
        backdrop-filter: blur(3px);
        z-index: 20;
      }

      .reveal-overlay[hidden] {
        display: none;
      }

      .history-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(28, 21, 14, 0.24);
        backdrop-filter: blur(3px);
        z-index: 18;
      }

      .history-overlay[hidden] {
        display: none;
      }

      .history-dialog {
        width: min(100%, 460px);
        max-height: min(88vh, 760px);
        padding: 18px 16px 16px;
        border-radius: 28px;
        border: 2px solid rgba(35, 68, 47, 0.22);
        background:
          linear-gradient(180deg, rgba(255, 250, 241, 0.99), rgba(251, 244, 227, 0.98)),
          #fff9ef;
        box-shadow: 0 22px 36px rgba(29, 22, 15, 0.22);
      }

      .history-dialog-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .history-dialog-header h2 {
        margin: 0;
        color: var(--green);
        font-size: 20px;
      }

      .history-dialog-body {
        display: grid;
        gap: 10px;
        margin-top: 14px;
        max-height: min(64vh, 520px);
        overflow: auto;
        padding-right: 2px;
      }

      .history-dialog-item {
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(118, 89, 63, 0.16);
        background: rgba(255, 255, 255, 0.74);
      }

      .history-dialog-item .word-board {
        min-height: 96px;
      }

      .history-dialog-meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .section-heading h3 {
        margin: 0;
      }

      .reveal-card {
        position: relative;
        overflow: hidden;
        width: min(100%, 430px);
        max-height: min(88vh, 720px);
        padding: 18px 16px 18px;
        border-radius: 28px;
        border: 3px solid rgba(35, 68, 47, 0.9);
        background:
          linear-gradient(180deg, rgba(255, 250, 241, 0.98), rgba(251, 244, 227, 0.98)),
          #fff9ef;
        box-shadow:
          0 22px 36px rgba(29, 22, 15, 0.22),
          0 0 0 6px rgba(178, 138, 50, 0.16);
      }

      .reveal-card.is-champion {
        width: min(100%, 420px);
        padding: 22px 18px 22px;
        border-width: 4px;
        border-color: rgba(178, 138, 50, 0.92);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.86), transparent 40%),
          linear-gradient(180deg, rgba(255, 250, 238, 0.99), rgba(244, 231, 191, 0.98)),
          #fff7e7;
        box-shadow:
          0 22px 38px rgba(29, 22, 15, 0.24),
          0 0 0 6px rgba(178, 138, 50, 0.26),
          0 0 56px rgba(178, 138, 50, 0.24),
          0 0 130px rgba(255, 214, 110, 0.34);
        animation: championEntrance 420ms ease-out, championPulse 2.2s ease-in-out infinite;
      }

      .reveal-card.is-champion::before,
      .reveal-card.is-champion::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .reveal-card.is-champion::before {
        width: 240px;
        height: 240px;
        top: -110px;
        right: -80px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 243, 195, 0.88), rgba(255, 243, 195, 0));
      }

      .reveal-card.is-champion::after {
        inset: 10px;
        border-radius: 22px;
        border: 1px solid rgba(255, 243, 195, 0.65);
        box-shadow: inset 0 0 22px rgba(255, 243, 195, 0.34);
      }

      .reveal-badge {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid rgba(184, 138, 50, 0.24);
        background: rgba(255, 255, 255, 0.86);
        color: var(--green);
        font-size: 12px;
        font-weight: 700;
      }

      .reveal-actions {
        display: flex;
        justify-content: center;
        margin-top: 14px;
      }

      .reveal-card .preview-caption {
        margin-top: 12px;
      }

      .reveal-card.is-champion .preview-caption {
        font-size: 14px;
        color: #6b5737;
        font-weight: 700;
      }

      .reveal-card.is-champion .reveal-badge {
        min-height: 38px;
        padding: 0 15px;
        border-color: rgba(178, 138, 50, 0.42);
        background: rgba(255, 251, 238, 0.94);
        color: #7f5c12;
        font-size: 13px;
      }

      .reveal-card.is-champion .champion-word {
        min-height: min(34vh, 196px);
        padding: 10px 8px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 252, 244, 0.92), rgba(248, 236, 199, 0.86));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 16px 24px rgba(113, 79, 10, 0.12);
      }

      .feedback-dock {
        position: sticky;
        top: 10px;
        z-index: 14;
        margin-top: 10px;
      }

      .feedback-dock:empty {
        display: none;
      }

      .message,
      .error {
        padding: 12px 14px;
        border-radius: 14px;
        line-height: 1.6;
        box-shadow: 0 10px 24px rgba(29, 22, 15, 0.08);
      }

      .message {
        background: rgba(255, 250, 242, 0.98);
        border: 1px solid rgba(36, 69, 47, 0.18);
        color: var(--green);
      }

      .error {
        background: rgba(255, 244, 240, 0.98);
        border: 1px solid rgba(184, 68, 49, 0.18);
        color: #8b2319;
      }

      .round-winner-grid {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .round-winner-card {
        padding: 14px 14px 12px;
        border-radius: 20px;
        border: 1px solid rgba(118, 89, 63, 0.16);
        background:
          linear-gradient(180deg, rgba(255, 252, 245, 0.96), rgba(248, 239, 216, 0.9)),
          #fff8ee;
      }

      .round-winner-card header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }

      .round-winner-card header strong {
        color: var(--green);
        font-size: 13px;
      }

      .round-winner-card header span {
        color: var(--muted);
        font-size: 12px;
      }

      .round-winner-card .word-board {
        min-height: 108px;
      }

      .round-winner-card footer {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        text-align: center;
      }

      .measure-word {
        position: fixed;
        left: 0;
        top: 0;
        transform: translate(-200vw, -200vh);
        visibility: hidden;
        overflow: hidden;
        pointer-events: none;
        opacity: 0;

    <script>

      const PUBLIC_DEV_API_BASE_URL = "https://nglzfg3co5.execute-api.ap-northeast-1.amazonaws.com/dev/v1";

      class AppError extends Error {
        constructor(message, options = {}) {
          super(message);
          this.name = "AppError";

          this.statusCode = Number(options.statusCode || 0);
          this.cause = options.cause;
        }

      const els = {
        statusContext: document.getElementById("statusContext"),

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function resolveDefaultApiBaseUrl() {
        const { hostname, protocol } = window.location;
        if (protocol === "file:") {
          return LOCAL_API_BASE_URL;
        }
        if (hostname === "localhost" || hostname === "127.0.0.1") {
          return LOCAL_API_BASE_URL;
        }
        return PUBLIC_DEV_API_BASE_URL;
      }

      function resolveApiOrigin(apiBaseUrl = state.apiBaseUrl) {
        try {
          return new URL(apiBaseUrl, window.location.href).origin;
        } catch {
          return "";
        }
      }

      function ensureApiNetworkHints(apiBaseUrl = state.apiBaseUrl) {
        const origin = resolveApiOrigin(apiBaseUrl);
        if (!origin || state.apiHintsOrigin === origin) {
          return;
        }
        state.apiHintsOrigin = origin;

        if (!document.head.querySelector(`link[data-omojan-api-hint="${origin}"][rel="dns-prefetch"]`)) {
          const dnsPrefetch = document.createElement("link");
          dnsPrefetch.rel = "dns-prefetch";
          dnsPrefetch.href = origin;
          dnsPrefetch.dataset.omojanApiHint = origin;
          document.head.appendChild(dnsPrefetch);
        }

        if (!document.head.querySelector(`link[data-omojan-api-preconnect="${origin}"]`)) {
          const preconnect = document.createElement("link");
          preconnect.rel = "preconnect";
          preconnect.href = origin;
          preconnect.crossOrigin = "anonymous";
          preconnect.dataset.omojanApiPreconnect = origin;
          document.head.appendChild(preconnect);
        }
      }

      function warmApiConnection(apiBaseUrl = state.apiBaseUrl) {
        const origin = resolveApiOrigin(apiBaseUrl);
        if (!origin || state.apiWarmupOrigin === origin) {
          return;
        }
        state.apiWarmupOrigin = origin;

        scheduleIdleTask(() => {
          fetch(`${apiBaseUrl.replace(/\/$/, "")}/health`, {
            method: "GET",
            cache: "no-store"
          }).catch(() => {});
        });
      }

      function scheduleIdleTask(task) {
        if (typeof window.requestIdleCallback === "function") {
          window.requestIdleCallback(task, { timeout: 1200 });
          return;
        }
        window.setTimeout(task, 180);
      }

      function ensureGoogleFontsLoaded(fontIds = []) {
        if (state.googleFonts.requested) {
          return;
        }
        if (!fontIds.some((fontId) => REMOTE_FONT_IDS.has(fontId))) {
          return;
        }
        state.googleFonts.requested = true;

        scheduleIdleTask(() => {
          if (!document.head.querySelector('link[data-omojan-fonts="preconnect-google"]')) {
            const preconnectGoogle = document.createElement("link");
            preconnectGoogle.rel = "preconnect";
            preconnectGoogle.href = "https://fonts.googleapis.com";
            preconnectGoogle.dataset.omojanFonts = "preconnect-google";
            document.head.appendChild(preconnectGoogle);
          }

          if (!document.head.querySelector('link[data-omojan-fonts="preconnect-gstatic"]')) {
            const preconnectGstatic = document.createElement("link");
            preconnectGstatic.rel = "preconnect";
            preconnectGstatic.href = "https://fonts.gstatic.com";
            preconnectGstatic.crossOrigin = "anonymous";
            preconnectGstatic.dataset.omojanFonts = "preconnect-gstatic";
            document.head.appendChild(preconnectGstatic);
          }

          if (document.head.querySelector('link[data-omojan-fonts="stylesheet"]')) {
            return;
          }

          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = GOOGLE_FONTS_HREF;
          link.media = "print";
          link.dataset.omojanFonts = "stylesheet";
          link.onload = () => {
            link.media = "all";
            state.googleFonts.loaded = true;
            state.renderCache.appKey = "";
            resetIncrementalViewCaches();
            state.renderCache.revealKey = "";
            render();
          };
          document.head.appendChild(link);
        });
      }

      function collectVisibleFontIds(room = state.room, view = deriveView(room)) {
        const fontIds = new Set();
        if (view === "submit") {
          fontIds.add(state.draftFontId);
        }

        const reveal = getActiveReveal();
        if (reveal?.fontId) {
          fontIds.add(reveal.fontId);
        }

        const round = getCurrentRound(room);
        if (round?.submissions?.length) {
          round.submissions.forEach((submission) => fontIds.add(submission.fontId || "classic"));
        }
        if (round?.winner?.fontId) {
          fontIds.add(round.winner.fontId);
        }

        room?.game?.finalVote?.candidates?.forEach((candidate) => fontIds.add(candidate.fontId || "classic"));
        if (room?.game?.champion?.fontId) {
          fontIds.add(room.game.champion.fontId);
        }

        return [...fontIds];
      }

      function getCurrentRound(room = state.room) {
        if (!room || room.game.roundIndex === null || room.game.roundIndex === undefined) {
          return null;
        }
        return room.game.rounds?.[room.game.roundIndex] || null;
      }

      function getSelectedTiles(room = state.room) {
        if (!room) {
          return [];
        }
        const tileMap = new Map(room.myHand.map((tile) => [tile.tileId, tile]));
        return state.draftSelectedTileIds.map((tileId) => tileMap.get(tileId)).filter(Boolean);
      }

      function getDraftText(room = state.room) {
        return getSelectedTiles(room).map((tile) => tile.text).join("");
      }

      function getBoundaryIndex(room = state.room) {
        const [first] = getSelectedTiles(room);
        return Array.from(first?.text || "").length || 0;
      }

      function normalizeBreaks(breaks, length) {
        return [...new Set(breaks)]
          .filter((value) => Number.isInteger(value) && value > 0 && value < length)
          .sort((a, b) => a - b);
      }

      function sanitizeManualBreaks(room = state.room) {
        const chars = Array.from(getDraftText(room));
        if (chars.length <= 1) {
          state.draftManualBreaks = [];
          return;
        }
        state.draftManualBreaks = normalizeBreaks(state.draftManualBreaks, chars.length);
      }

      function getFontClass(fontId) {
        return fonts.find((font) => font.id === fontId)?.className || "font-classic";
      }

      function allowsSelfVote(room = state.room) {
        return Number(room?.playerCount || room?.game?.players?.length || 0) === 2;
      }

      function getStoredSessions() {
        try {
          const raw = window.localStorage.getItem(APP_SESSION_MAP_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function saveStoredSessions(sessions) {
        window.localStorage.setItem(APP_SESSION_MAP_KEY, JSON.stringify(sessions));
      }

      function migrateLegacySessionIfNeeded() {
        const legacyRoomId = window.localStorage.getItem(APP_ROOM_ID_KEY);
        const legacyToken = window.localStorage.getItem(APP_PLAYER_TOKEN_KEY);
        if (!legacyRoomId || !legacyToken) {
          return;
        }
        const sessions = getStoredSessions();
        if (!sessions[legacyRoomId]) {
          sessions[legacyRoomId] = {
            roomId: legacyRoomId,
            playerToken: legacyToken,
            inviteCode: "",
            updatedAt: new Date().toISOString()
          };
          saveStoredSessions(sessions);
        }
        window.sessionStorage.setItem(APP_ACTIVE_ROOM_ID_KEY, legacyRoomId);
        window.localStorage.removeItem(APP_ROOM_ID_KEY);
        window.localStorage.removeItem(APP_PLAYER_TOKEN_KEY);
      }

      function setFeedback(message = "", isError = false, autoHideMs = 0) {
        if (state.feedbackTimer) {
          window.clearTimeout(state.feedbackTimer);
          state.feedbackTimer = 0;
        }
        state.copyMessage = isError ? "" : message;
        state.errorMessage = isError ? message : "";
        if (message && autoHideMs > 0) {
          state.feedbackTimer = window.setTimeout(() => {
            state.copyMessage = "";
            state.errorMessage = "";
            state.feedbackTimer = 0;
            renderCurrentView({ includeReveal: false });
          }, autoHideMs);
        }
      }

      function applyWordMarkup(container, lines, fontClass, lineMode, fontSize) {
        const classNames = ["word-board", fontClass];
        if (container.classList.contains("measure-word")) {
          classNames.push("measure-word");
        }
        if (container.dataset.variant) {
          classNames.push(container.dataset.variant);
        }
        if (lineMode === "single") {
          classNames.push("is-single-line");
        }
        container.className = classNames.join(" ");
        container.style.fontSize = `${fontSize}px`;
        container.innerHTML = lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("");
      }

      function doesWordFit(lines, fontClass, lineMode, fontSize, width, height) {
        els.measureWord.dataset.variant = "";
        els.measureWord.style.width = `${width}px`;
        els.measureWord.style.height = `${height}px`;
        applyWordMarkup(els.measureWord, lines, fontClass, lineMode, fontSize);
        const lineEls = Array.from(els.measureWord.querySelectorAll(".word-line"));
        const tooWide = lineEls.some((line) => line.scrollWidth > width - 1);
        const tooTall = els.measureWord.scrollHeight > height - 1;
        return !(tooWide || tooTall);
      }

      function getMinimumFontSize(charsLength, lineMode) {
        if (lineMode === "single") {
          if (charsLength >= 18) {
            return 16;
          }
          if (charsLength >= 14) {
            return 18;
          }
          if (charsLength >= 10) {
            return 20;
          }
          return 24;
        }
        if (charsLength >= 16) {
          return 26;
        }
        if (charsLength >= 12) {
          return 28;
        }
        return 32;
      }

      function measureLineFits(text, fontClass, fontSize, width) {
        els.measureWord.dataset.variant = "";
        els.measureWord.style.width = `${width}px`;
        els.measureWord.style.height = "120px";
        applyWordMarkup(els.measureWord, [text || " "], fontClass, "single", fontSize);
        const lineEl = els.measureWord.querySelector(".word-line");
        return lineEl ? lineEl.scrollWidth <= width - 1 : true;
      }

      function getLastFittingEnd(chars, start, endLimit, fontClass, fontSize, width) {
        let lastFit = start;
        for (let end = start + 1; end <= endLimit; end += 1) {
          const sample = chars.slice(start, end).join("");
          if (measureLineFits(sample, fontClass, fontSize, width)) {
            lastFit = end;
            continue;
          }
          break;
        }
        return lastFit > start ? lastFit : Math.min(start + 1, endLimit);
      }

      function splitForcedRange(chars, start, endLimit, fontClass, fontSize, width) {
        const lines = [];
        let cursor = start;
        while (cursor < endLimit) {
          const next = getLastFittingEnd(chars, cursor, endLimit, fontClass, fontSize, width);
          lines.push(chars.slice(cursor, next).join(""));
          cursor = next;
        }
        return lines;
      }

      function buildBoundaryLines(chars, fontClass, fontSize, width) {
        const boundary = getBoundaryIndex();
        const breaks = normalizeBreaks([boundary], chars.length);
        if (!breaks.length) {
          return splitForcedRange(chars, 0, chars.length, fontClass, fontSize, width);
        }
        const lines = [];
        let start = 0;
        [...breaks, chars.length].forEach((end) => {
          lines.push(...splitForcedRange(chars, start, end, fontClass, fontSize, width));
          start = end;
        });
        return lines.filter(Boolean);
      }

      function buildManualLines(chars, fontClass, fontSize, width) {
        sanitizeManualBreaks();
        const forcedBreaks = normalizeBreaks(state.draftManualBreaks, chars.length);
        if (!forcedBreaks.length) {
          return splitForcedRange(chars, 0, chars.length, fontClass, fontSize, width).filter(Boolean);
        }

        const lines = [];
        let start = 0;
        let forcedIndex = 0;

        while (start < chars.length) {
          const forcedEnd = forcedBreaks[forcedIndex];
          if (forcedEnd) {
            const forcedText = chars.slice(start, forcedEnd).join("");
            if (measureLineFits(forcedText, fontClass, fontSize, width)) {
              lines.push(forcedText);
              start = forcedEnd;
              forcedIndex += 1;
              continue;
            }

            lines.push(...splitForcedRange(chars, start, forcedEnd, fontClass, fontSize, width));
            start = forcedEnd;
            forcedIndex += 1;
            continue;
          }

          lines.push(...splitForcedRange(chars, start, chars.length, fontClass, fontSize, width));
          break;
        }

        return lines.filter(Boolean);
      }

      function buildDraftLines(chars, fontClass, fontSize, width) {
        if (state.draftLineMode === "single") {
          return [chars.join("")];
        }
        if (state.draftLineMode === "manual") {
          return buildManualLines(chars, fontClass, fontSize, width);
        }
        return buildBoundaryLines(chars, fontClass, fontSize, width);
      }

      function getBreaksFromLines(lines) {
        const breaks = [];
        let cursor = 0;
        lines.forEach((line, index) => {
          cursor += Array.from(line).length;
          if (index < lines.length - 1) {
            breaks.push(cursor);
          }
        });
        return breaks;
      }

      function computeDraftLayout() {
        const text = getDraftText();
        if (!text) {
          return { lines: ["牌を2つ選ぶ"], fontSize: 36, effectiveBreaks: [], safetyAdjusted: false };
        }

        const previewBox = document.getElementById("previewWord");
        const width = previewBox?.clientWidth || 320;
        const height = previewBox?.clientHeight || 148;
        const chars = Array.from(text);
        const fontClass = getFontClass(state.draftFontId);
        const maxFontSize = state.draftLineMode === "single" ? 72 : 60;
        const minFontSize = getMinimumFontSize(chars.length, state.draftLineMode);
        let fallbackLayout = null;

        for (let fontSize = maxFontSize; fontSize >= minFontSize; fontSize -= 1) {
          const lines = buildDraftLines(chars, fontClass, fontSize, width);
          const effectiveBreaks = getBreaksFromLines(lines);
          const manualBreaks = normalizeBreaks(state.draftManualBreaks, chars.length);
          const safetyAdjusted =
            fontSize < maxFontSize ||
            (state.draftLineMode === "manual" && effectiveBreaks.some((point) => !manualBreaks.includes(point))) ||
            (state.draftLineMode === "boundary" && effectiveBreaks.some((point) => point !== getBoundaryIndex()));

          if (doesWordFit(lines, fontClass, state.draftLineMode, fontSize, width, height)) {
            return { lines, fontSize, effectiveBreaks, safetyAdjusted };
          }

          fallbackLayout = { lines, fontSize, effectiveBreaks, safetyAdjusted: true };
        }

        return fallbackLayout || {
          lines: [text],
          fontSize: minFontSize,
          effectiveBreaks: [],
          safetyAdjusted: true
        };
      }

      function renderWordBoard(lines, fontId, variant, options = {}) {
        const mode = options.lineMode || (lines.length <= 1 ? "single" : "manual");
        const maxFont = options.maxFont || 46;
        const minFont = options.minFont || 18;
        return `
          <div
            class="word-board auto-fit-word ${variant} ${getFontClass(fontId)}${mode === "single" ? " is-single-line" : ""}"
            data-font-id="${escapeHtml(fontId)}"
            data-line-mode="${mode}"
            data-max-font="${maxFont}"
            data-min-font="${minFont}"
          >
            ${lines.map((line) => `<span class="word-line">${escapeHtml(line)}</span>`).join("")}
          </div>
        `;
      }

      function hydrateWordBoard(node) {
        if (!node) {
          return;
        }
        const lines = Array.from(node.querySelectorAll(".word-line")).map((line) => line.textContent || "");
        const fontClass = getFontClass(node.dataset.fontId || "classic");
        const lineMode = node.dataset.lineMode || (lines.length <= 1 ? "single" : "manual");
        const maxFont = Number(node.dataset.maxFont || "46");
        const minFont = Number(node.dataset.minFont || "18");
        const width = node.clientWidth || 300;
        const height = node.clientHeight || 120;
        let chosen = minFont;
        for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 1) {
          if (doesWordFit(lines, fontClass, lineMode, fontSize, width, height)) {
            chosen = fontSize;
            break;
          }
        }
        node.dataset.variant = Array.from(node.classList).find((className) => className.endsWith("-word")) || node.dataset.variant || "";
        applyWordMarkup(node, lines, fontClass, lineMode, chosen);
      }

      function hydrateWordBoards(root = document) {
        if (!root) {
          return;
        }
        const nodes = [];
        if (root.matches?.(".auto-fit-word")) {
          nodes.push(root);
        }
        if (root.querySelectorAll) {
          nodes.push(...root.querySelectorAll(".auto-fit-word"));
        }
        nodes.forEach((node) => hydrateWordBoard(node));
      }

      function getInviteUrl(code) {
        const url = new URL(window.location.href);
        url.search = "";
        url.searchParams.set("invite", code);
        return url.toString();
      }

      function getVoteCandidates(room, mode = "vote") {
        const round = getCurrentRound(room);
        if (!round) {
          return [];
        }
        if (mode === "revote" && round.voteSummary?.tiedPlayerIds?.length) {
          return round.submissions.filter((submission) => round.voteSummary.tiedPlayerIds.includes(submission.playerId));
        }
        return round.submissions || [];
      }

      function getFinalCandidates(room, mode = "vote") {
        const finalVote = room.game.finalVote;
        if (!finalVote) {
          return [];
        }
        if (mode === "revote" && finalVote.voteSummary?.tiedCandidateIds?.length) {
          return finalVote.candidates.filter((candidate) => finalVote.voteSummary.tiedCandidateIds.includes(candidate.candidateId));
        }
        return finalVote.candidates || [];
      }

      function canPlayerVoteFinal(room, playerId, mode = "vote") {
        if (allowsSelfVote(room)) {
          return getFinalCandidates(room, mode).length > 0;
        }
        return getFinalCandidates(room, mode).some((candidate) => candidate.playerId !== playerId);
      }

      function deriveView(room = state.room) {
        if (!room) {
          return "welcome";
        }
        const phase = room.game.phase;
        const round = getCurrentRound(room);
        const meVoted = round?.votedPlayerIds?.includes(room.me.playerId);
        const meRevoted = round?.revotedPlayerIds?.includes(room.me.playerId);
        const meFinalVoted = room.game.finalVote?.votedPlayerIds?.includes(room.me.playerId);
        const meFinalRevoted = room.game.finalVote?.revotedPlayerIds?.includes(room.me.playerId);
        const meCanFinalVote = canPlayerVoteFinal(room, room.me.playerId, "vote");
        const meCanFinalRevote = canPlayerVoteFinal(room, room.me.playerId, "revote");

        if (phase === "lobby") {
          return "lobby";
        }
        if (phase === "round_submit") {
          return room.game.currentTurnPlayerId === room.me.playerId ? "submit" : "wait";
        }
        if (phase === "round_vote") {
          return meVoted ? "wait" : "vote";
        }
        if (phase === "round_revote") {
          return meRevoted ? "wait" : "revote";
        }
        if (phase === "round_host_decide") {
          return room.me.isHost ? "hostDecide" : "wait";
        }
        if (phase === "round_result") {
          return "roundResult";
        }
        if (phase === "final_vote") {
          return meFinalVoted || !meCanFinalVote ? "wait" : "finalVote";
        }
        if (phase === "final_revote") {
          return meFinalRevoted || !meCanFinalRevote ? "wait" : "finalVote";
        }
        if (phase === "final_host_decide") {
          return room.me.isHost ? "finalHostDecide" : "wait";
        }
        if (phase === "final_result") {
          return "finalResult";
        }
        return "welcome";
      }

      function getStatusText() {
        if (state.pendingAction) {
          return isSyncPending() ? getSyncPendingCopy().short : "送信中";
        }
        if (state.isLoading) {
          return "同期中";
        }
        if (state.errorMessage) {
          return "要確認";
        }
        if (state.syncIssueMessage) {
          return "再試行中";
        }
        return "接続中";
      }

      function formatLastSyncValue() {
        if (!state.lastSyncAt) {
          return "未同期";
        }
        return new Date(state.lastSyncAt).toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function formatLastSync() {
        if (!state.lastSyncAt) {
          return "まだ同期していません。";
        }
        return `最終同期 ${new Date(state.lastSyncAt).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
      }

      function getRecentChampionsStamp() {
        return state.recentChampions.map((item) => `${item.phrase}:${item.displayName}:${item.wonAt}`).join("|");
      }

      function getAppRenderKey(room = state.room, view = deriveView(room)) {
        const base = [view, state.pendingAction ? "pending" : "idle"];
        if (!room) {
          return base.concat([
            "landing"
          ]).join("|");
        }

        const revision = String(room.revision ?? "no-revision");
        base.push(revision);

        switch (view) {
          case "welcome":
            return base.concat([
              "landing"
            ]).join("|");
          case "lobby":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          case "submit":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          case "wait":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          case "vote":
          case "revote":
          case "hostDecide":
          case "finalVote":
          case "finalHostDecide":
          case "roundResult":
          case "finalResult":
            return base.concat([
              room.roomId || "",
              room.me?.playerId || ""
            ]).join("|");
          default:
            return base.join("|");
        }
      }

      function getStatusContext() {
        if (state.syncIssueMessage) {
          return "通信が不安定なため自動で再試行中";
        }
        const view = deriveView();
        const room = state.room;
        const round = getCurrentRound(room);
        const contextMap = {
          welcome: "ルーム作成 / 参加",
          lobby: room?.inviteCode ? `ROOM / ${room.inviteCode}` : "ルーム待機",
          submit: round?.wind || "提出",
          wait: round?.wind || "待機",
          vote: round?.label || "投票",
          revote: round?.label || "再投票",
          hostDecide: round?.label || "ホスト裁定",
          roundResult: round?.label || "ラウンド結果",
          finalVote: room?.game?.phase === "final_revote" ? "最終再投票" : "最終投票",
          finalHostDecide: "最終ホスト裁定",
          finalResult: "総合優勝"
        };
        return contextMap[view] || "おもじゃん";
      }

      function renderFeedbackDock() {
        const feedbackKey = state.errorMessage
          ? `error|${state.errorMessage}`
          : state.copyMessage
            ? `message|${state.copyMessage}`
            : "empty";
        if (state.renderCache.feedbackKey === feedbackKey) {
          return;
        }
        state.renderCache.feedbackKey = feedbackKey;

        if (state.errorMessage) {
          els.feedbackDock.innerHTML = `<div class="error">${escapeHtml(state.errorMessage)}</div>`;
          return;
        }
        if (state.copyMessage) {
          els.feedbackDock.innerHTML = `<div class="message">${escapeHtml(state.copyMessage)}</div>`;
          return;
        }
        els.feedbackDock.innerHTML = "";
      }

      function setBanner() {
        const bannerKey = [
          getStatusText(),
          getStatusContext(),
          state.pendingAction ? "pending" : "idle",
          state.pendingMode,
          state.isLoading ? "loading" : "ready",
          state.roomId ? "room" : "welcome"
        ].join("|");
        if (state.renderCache.bannerKey !== bannerKey) {
          state.renderCache.bannerKey = bannerKey;
          els.statusLabel.textContent = getStatusText();
          els.statusContext.textContent = getStatusContext();
          els.refreshTopBtn.disabled = state.pendingAction || state.isLoading;
          els.refreshTopBtn.textContent = state.isLoading
            ? "同期中"
            : isSyncPending()
              ? getSyncPendingCopy().short
              : state.roomId
                ? "更新"
                : "再読込";
        }
        renderFeedbackDock();
      }

      function persistSession() {
        if (!state.roomId || !state.playerToken) {
          return;
        }
        const sessions = getStoredSessions();
        sessions[state.roomId] = {
          roomId: state.roomId,
          playerToken: state.playerToken,
          inviteCode: state.room?.inviteCode || state.inviteCode || "",
          updatedAt: new Date().toISOString()
        };
        saveStoredSessions(sessions);
        window.sessionStorage.setItem(APP_ACTIVE_ROOM_ID_KEY, state.roomId);
      }

      function clearSession(roomId = state.roomId) {
        const sessions = getStoredSessions();
        if (roomId && sessions[roomId]) {
          delete sessions[roomId];
          saveStoredSessions(sessions);
        }
        const activeRoomId = window.sessionStorage.getItem(APP_ACTIVE_ROOM_ID_KEY);
        if (!roomId || activeRoomId === roomId) {
          window.sessionStorage.removeItem(APP_ACTIVE_ROOM_ID_KEY);
        }
      }

      function resetDraftAndDecisionState() {
        state.selectedStartPlayerId = "";
        state.draftSelectedTileIds = [];
        state.draftManualBreaks = [];
        clearDecisionState();
      }

      function exitToWelcome(options = {}) {
        const room = state.room;
        const inviteCode = options.preserveInviteCode === false ? "" : options.inviteCode || room?.inviteCode || state.inviteCode;
        const myName = room?.me?.displayName || "";

        clearPollTimer();
        clearSession();

        state.room = null;
        state.roomId = "";
        state.playerToken = "";
        state.pendingMode = "";
        state.inviteCode = inviteCode;
        clearBackgroundSyncIssue();
        setFeedback(options.errorMessage || options.copyMessage || "", Boolean(options.errorMessage), options.copyMessage ? 2800 : 0);

        if (myName) {
          if (room?.me?.isHost) {
            state.createDisplayName = myName;
          } else {
            state.joinDisplayName = myName;
          }
        }

        resetDraftAndDecisionState();
      }

      function buildAppError(error, fallbackMessage = "操作に失敗しました。") {
        if (error instanceof AppError) {
          return error;
        }
        if (error instanceof Error) {
          return new AppError(error.message || fallbackMessage, {
            cause: error
          });
        }
        return new AppError(fallbackMessage);
      }

      function describeAppError(error, context = "") {
        const appError = buildAppError(error);
        const messageMap = {
          INVITE_NOT_FOUND: "招待コードが見つかりません。招待URLかコードをもう一度確認してください。",
          ROOM_FULL: "このルームは満員です。別のルームを使ってください。",
          ROOM_ALREADY_STARTED: "このルームはすでに始まっています。ホストに新しいルームを作ってもらってください。",
          DECK_EMPTY: "デッキに使えるワードがありません。管理画面で有効ワードを確認してください。",
          DECK_TOO_SMALL: "デッキのワード数が足りません。重複なしで配るため、管理画面で有効ワードを増やしてください。",
          ROOM_NOT_FOUND: context === "restore" || context === "reconnect"
            ? "このルームは見つかりませんでした。終了した可能性があります。もう一度参加してください。"
            : "このルームは見つかりませんでした。",
          PLAYER_TOKEN_INVALID: context === "restore" || context === "reconnect"
            ? "この端末の参加情報が使えません。もう一度参加してください。"
            : "この端末の参加情報が使えません。",
          NETWORK_ERROR: "通信に失敗しました。時間をおいてからもう一度お試しください。",
          CONFLICT_RETRY: "操作が重なりました。もう一度お試しください。"
        };
        return messageMap[appError.code] || appError.message || "操作に失敗しました。";
      }

      function isLostSessionError(error) {
        const appError = buildAppError(error);
        return ["ROOM_NOT_FOUND", "PLAYER_TOKEN_INVALID"].includes(appError.code);
      }

      function recoverLostSession(error, context = "") {
        if (!state.roomId && context !== "restore") {
          return false;
        }
        if (!isLostSessionError(error)) {
          return false;
        }
        exitToWelcome({
          errorMessage: describeAppError(error, context)
        });
        return true;
      }

      async function fetchJson(url, options = {}) {
        let response;
        try {
          response = await fetch(url, options);
        } catch (error) {
          throw new AppError("通信に失敗しました。", {
            code: "NETWORK_ERROR",
            retryable: true,
            cause: error
          });
        }
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.ok === false) {
          const detail = payload?.error?.message || payload?.message || `${url} の取得に失敗しました。`;
          throw new AppError(detail, {
            code: payload?.error?.code || "",
            retryable: Boolean(payload?.error?.retryable),
            statusCode: response.status
          });
        }
        return payload;
      }

      async function apiRequest(path, options = {}) {
        const { method = "GET", body, playerToken = state.playerToken } = options;
        return fetchJson(`${state.apiBaseUrl}${path}`, {
          method,
          headers: {
            ...(body === undefined ? {} : { "content-type": "application/json" }),
            ...(playerToken ? { "X-Omojan-Player-Token": playerToken } : {})
          },
          ...(body === undefined ? {} : { body: JSON.stringify(body) })
        });
      }

      async function postApi(path, body = {}) {
        return apiRequest(path, { method: "POST", body });
      }

      async function loadRecentChampions() {
        try {
          const payload = await fetchJson(`${state.apiBaseUrl}/champions/recent?limit=5`);
          state.recentChampions = payload.data.items || [];
        } catch {
          const payload = await fetchJson(FIXTURE_CHAMPIONS_URL);
          state.recentChampions = payload.data.items || [];
        }
      }

      async function loadChampionHistory(limit = 50) {
        try {
          const payload = await fetchJson(`${state.apiBaseUrl}/champions/history?limit=${limit}`);
          state.championHistoryItems = payload.data.items || [];
          state.championHistoryError = "";
        } catch (error) {
          state.championHistoryError = error instanceof Error ? error.message : "履歴の取得に失敗しました。";
          if (!state.championHistoryItems.length) {
            const payload = await fetchJson(FIXTURE_CHAMPIONS_URL);
            state.championHistoryItems = payload.data.items || [];
          }
        }
      }

      function syncDraftWithRoom(room = state.room) {
        if (!room || deriveView(room) !== "submit") {
          state.draftSelectedTileIds = [];
          state.draftManualBreaks = [];
          return;
        }

        const availableTiles = room.myHand.filter((tile) => !tile.isUsed);
        const currentValid = state.draftSelectedTileIds.filter((tileId) => availableTiles.some((tile) => tile.tileId === tileId));

        if (currentValid.length === 2) {
          state.draftSelectedTileIds = currentValid;
        } else {
          state.draftSelectedTileIds = availableTiles.slice(0, 2).map((tile) => tile.tileId);
        }

        sanitizeManualBreaks(room);
      }

      function setRoom(room, options = {}) {
        state.room = clone(room);
        state.roomId = room.roomId;
        state.selectedStartPlayerId = room.startPlayerId || room.me.playerId;
        state.lastSyncAt = new Date().toISOString();
        clearBackgroundSyncIssue();
        if (options.playerToken) {
          state.playerToken = options.playerToken;
        }
        syncDraftWithRoom(state.room);
        persistSession();
      }

      async function refreshRoom() {
        if (!state.roomId || !state.playerToken) {
          return;
        }
        try {
          const knownRevision = Number(state.room?.revision);
          const query = Number.isInteger(knownRevision) && knownRevision >= 1 ? `?sinceRevision=${knownRevision}` : "";
          const payload = await apiRequest(`/rooms/${encodeURIComponent(state.roomId)}${query}`);
          if (payload.data?.notModified) {
            state.lastSyncAt = new Date().toISOString();
            clearBackgroundSyncIssue();
            return false;
          }
          setRoom(payload.data.room);
          return true;
        } catch (error) {
          if (recoverLostSession(error, "refresh")) {
            return false;
          }
          throw error;
        }
      }

      async function reconnectRoom(roomId = state.roomId, playerToken = state.playerToken) {
        if (!roomId || !playerToken) {
          return;
        }
        try {
          const payload = await apiRequest(`/rooms/${encodeURIComponent(roomId)}/reconnect`, {
            method: "POST",
            body: {},
            playerToken
          });
          setRoom(payload.data.room, { playerToken, skipReveal: true });
        } catch (error) {
          if (recoverLostSession(error, "reconnect")) {
            return;
          }
          throw error;
        }
      }

      function clearPollTimer() {
        if (state.pollTimer) {
          window.clearTimeout(state.pollTimer);
          state.pollTimer = 0;
        }
      }

      function shouldPoll() {
        return Boolean(state.roomId && state.playerToken && deriveView() !== "welcome");
      }

      function getPollIntervalMs() {
        if (!shouldPoll()) {
          return 0;
        }

        const view = deriveView();
        let baseInterval = POLL_INTERVALS_MS.activeTurn;

        if (document.visibilityState === "hidden") {
          baseInterval = POLL_INTERVALS_MS.hidden;
        } else if (getActiveReveal()) {
          baseInterval = POLL_INTERVALS_MS.waiting;
        } else if (view === "wait") {
          baseInterval = POLL_INTERVALS_MS.waiting;
        } else if (view === "lobby") {
          baseInterval = POLL_INTERVALS_MS.lobby;
        } else if (view === "roundResult" || view === "finalResult") {
          baseInterval = POLL_INTERVALS_MS.result;
        }

        return Math.min(
          baseInterval + state.pollFailureCount * POLL_INTERVALS_MS.backoffStep,
          POLL_INTERVALS_MS.max
        );
      }

      function schedulePoll() {
        clearPollTimer();
        if (!shouldPoll() || state.pendingAction || !state.roomId || !state.playerToken) {
          return;
        }
        const intervalMs = getPollIntervalMs();
        if (!intervalMs) {
          return;
        }
        state.pollTimer = window.setTimeout(async () => {
          try {
            const changed = await refreshRoom();
            if (changed) {
              render();
              return;
            }
            renderPassiveSyncUi();
            schedulePoll();
          } catch (error) {
            setBackgroundSyncIssue(error);
            renderPassiveSyncUi();
            schedulePoll();
          }
        }, intervalMs);
      }

      async function restoreSession() {
        migrateLegacySessionIfNeeded();

        const sessions = getStoredSessions();
        const activeRoomId = window.sessionStorage.getItem(APP_ACTIVE_ROOM_ID_KEY);
        const prioritized = [];
        const allSessions = Object.values(sessions).sort((left, right) =>
          String(right.updatedAt || "").localeCompare(String(left.updatedAt || ""))
        );

        if (state.inviteCode) {
          if (activeRoomId && sessions[activeRoomId]?.inviteCode === state.inviteCode) {
            prioritized.push(sessions[activeRoomId]);
          }
          allSessions
            .filter((session) => session.roomId !== activeRoomId && session.inviteCode === state.inviteCode)
            .forEach((session) => prioritized.push(session));
        } else {
          if (activeRoomId && sessions[activeRoomId]) {
            prioritized.push(sessions[activeRoomId]);
          }
          allSessions
            .filter((session) => session.roomId !== activeRoomId)
            .forEach((session) => prioritized.push(session));
        }
        const targetSession = prioritized.find((session) => session.roomId && session.playerToken);
        if (!targetSession) {
          return false;
        }

        state.roomId = targetSession.roomId;
        state.playerToken = targetSession.playerToken;
        try {
          await reconnectRoom(targetSession.roomId, targetSession.playerToken);
        } catch (error) {
          if (recoverLostSession(error, "restore")) {
            return false;
          }
          throw error;
        }
        return true;
      }

      function renderSyncUtility(options = {}) {
        const {
          title = "接続",
          description = "",
          showReconnect = false,
          showRefresh = true,
          showLeave = false
        } = options;
        const syncPending = isSyncPending();
        const syncCopy = getSyncPendingCopy();
        const pills = [
          { label: "状態", value: getStatusText() },
          { label: "最終同期", value: formatLastSyncValue() },
          { label: "更新", value: shouldPoll() ? "自動" : "手動" }
        ];

        return `
          <section class="utility-card">
            <h3>${escapeHtml(title)}</h3>
            ${description ? `<p>${escapeHtml(description)}</p>` : ""}
            ${renderSummaryPills(pills)}
            ${syncPending ? `<div class="info-box">${escapeHtml(syncCopy.detail)}</div>` : ""}
            ${state.syncIssueMessage ? `<div class="info-box">${escapeHtml(`${state.syncIssueMessage} 自動で再試行しています。`)}</div>` : ""}
            <div class="utility-actions">
              ${showRefresh ? `<button class="btn subtle" type="button" data-action="refresh-latest" ${state.pendingAction ? "disabled" : ""}>${syncPending && state.pendingMode !== "reconnect" ? "更新中..." : "今の状態を更新"}</button>` : ""}
              ${showReconnect ? `<button class="btn subtle" type="button" data-action="retry-room-connection" ${state.pendingAction ? "disabled" : ""}>${state.pendingMode === "reconnect" ? "再接続中..." : "再接続する"}</button>` : ""}
              ${showLeave ? `<button class="btn subtle" type="button" data-action="leave-room" ${state.pendingAction ? "disabled" : ""}>この端末の参加情報を消す</button>` : ""}
            </div>
          </section>
        `;
      }

      function getSyncUtilityKey() {
        return [
          getStatusText(),
          formatLastSyncValue(),
          shouldPoll() ? "auto" : "manual",
          state.pendingAction ? "pending" : "idle",
          state.pendingMode,
          state.syncIssueMessage || ""
        ].join("|");
      }

      function patchSlot(root, selector, cacheKeyName, cacheKey, html) {
        const node = root.querySelector(selector);
        if (!node) {
          return;
        }
        if (state.renderCache[cacheKeyName] === cacheKey) {
          return;
        }
        state.renderCache[cacheKeyName] = cacheKey;
        node.innerHTML = html;
        hydrateWordBoards(node);
      }

      function getWaitingMessage(room) {
        const currentRound = getCurrentRound(room);
        const currentPlayer = room.game.players.find((player) => player.playerId === room.game.currentTurnPlayerId);
        const cannotVoteFinal = room.game.phase === "final_vote" && !canPlayerVoteFinal(room, room.me.playerId, "vote");
        const cannotRevoteFinal = room.game.phase === "final_revote" && !canPlayerVoteFinal(room, room.me.playerId, "revote");

        const phaseMessageMap = {
          lobby: room.me.isHost ? "開始順を決めて始めます。" : "ホストの開始待ちです。",
          round_vote: "ほかの投票を待っています。",
          round_revote: "ほかの投票を待っています。",
          final_vote: cannotVoteFinal
            ? "ほかの最終投票を待っています。"
            : "ほかの最終投票を待っています。",
          final_revote: cannotRevoteFinal
            ? "ほかの最終投票を待っています。"
            : "ほかの最終投票を待っています。",
          round_result: room.me.isHost ? "次へ進めます。" : "ホストの進行待ちです。",
          final_result: room.me.isHost ? "このルームでもう一度遊べます。" : "ホストの再開待ちです。"
        };

        if (currentPlayer) {
          return `${currentPlayer.displayName} の手番です。`;
        }
        return phaseMessageMap[room.game.phase] || `${escapeHtml(currentRound?.label || "現在ラウンド")} が進行中です。`;
      }

      function renderRecentChampions() {
        return renderHistoryList(
          state.recentChampions,
          (item) => `
            <div class="history-card">
              <div>
                <strong>${escapeHtml(item.phrase)}</strong>
                <span>${escapeHtml(item.displayName)}</span>
              </div>
              <span>${new Date(item.wonAt).toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" })}</span>
            </div>
          `,
          "最近の総合優勝ワードはまだありません。"
        );
      }

      function renderChampionHistoryTrigger(title = "最近の総合優勝ワード") {
        return `
          <section class="panel">
            <div class="section-heading">
              <h3>${escapeHtml(title)}</h3>
              <button class="mini-btn" type="button" data-action="open-champion-history">一覧を見る</button>
            </div>
            ${renderRecentChampions()}
          </section>
        `;
      }

      function formatChampionHistoryWonAt(value) {
        if (!value) {
          return "日時不明";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return date.toLocaleString("ja-JP", {
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function renderChampionHistoryOverlay() {
        if (!state.championHistoryOpen) {
          state.renderCache.championHistoryKey = "";
          els.historyOverlay.hidden = true;
          return;
        }

        const historyKey = [
          state.championHistoryOpen ? "open" : "closed",
          state.championHistoryPending ? "pending" : "idle",
          state.championHistoryError,
          state.championHistoryItems
            .map((item) => `${item.championId}:${item.phrase}:${item.displayName}:${item.wonAt}`)
            .join("|")
        ].join("|");

        if (state.renderCache.championHistoryKey === historyKey) {
          els.historyOverlay.hidden = false;
          return;
        }
        state.renderCache.championHistoryKey = historyKey;

        const listHtml = state.championHistoryItems.length
          ? state.championHistoryItems
              .map(
                (item) => `
                  <article class="history-dialog-item">
                    ${renderWordBoard(item.renderedLines || [item.phrase], item.fontId || "classic", "result-word", { maxFont: 28, minFont: 16 })}
                    <div class="history-dialog-meta">${escapeHtml(item.displayName)} / ${escapeHtml(formatChampionHistoryWonAt(item.wonAt))}</div>
                  </article>
                `
              )
              .join("")
          : `<div class="empty-state">総合優勝ワード履歴はまだありません。</div>`;

        els.historyDialogBody.innerHTML = `
          ${state.championHistoryPending ? `<div class="info-box">履歴を読み込んでいます。</div>` : ""}
          ${state.championHistoryError ? `<div class="info-box">${escapeHtml(state.championHistoryError)}</div>` : ""}
          ${listHtml}
        `;
        hydrateWordBoards(els.historyDialogBody);
        els.historyOverlay.hidden = false;
      }

      function renderScreenAlerts(options = {}) {
        return "";
      }

      function renderHistoryList(items, renderItem, emptyText = "") {
        if (!items.length) {
          return emptyText ? `<div class="empty-state">${escapeHtml(emptyText)}</div>` : "";
        }
        return `
          <div class="history-list">
            ${items.map(renderItem).join("")}
          </div>
        `;
      }

      function renderSection(title, content, options = {}) {
        const { className = "panel", headingTag = "h3" } = options;
        return `
          <section class="${className}">
            <${headingTag}>${escapeHtml(title)}</${headingTag}>
            ${content}
          </section>
        `;
      }

      function renderSummaryPills(items) {
        if (!items.length) {
          return "";
        }
        return `
          <div class="summary-pills">
            ${items
              .map(
                (item) => `
                  <span class="summary-pill">
                    ${escapeHtml(item.label)}
                    <strong>${escapeHtml(item.value)}</strong>
                  </span>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderFocusCallout(options) {
        const { label, title, description = "", pills = [] } = options;
        return `
          <section class="focus-callout">
            <small>${escapeHtml(label)}</small>
            <strong>${escapeHtml(title)}</strong>
            ${description ? `<p>${escapeHtml(description)}</p>` : ""}
            ${renderSummaryPills(pills)}
          </section>
        `;
      }

      function renderWordStage(options) {
        const {
          stageClass,
          label,
          entry,
          wordClass,
          maxFont,
          minFont,
          emptyText,
          footerHtml = ""
        } = options;

        return `
          <section class="${stageClass}">
            <small>${escapeHtml(label)}</small>
            ${
              entry
                ? renderWordBoard(entry.renderedLines, entry.fontId, wordClass, { maxFont, minFont })
                : `<div class="empty-state">${escapeHtml(emptyText)}</div>`
            }
            ${footerHtml}
          </section>
        `;
      }

      function renderTiedCountSummary(counts, tiedIds, idField) {
        if (!counts?.length || !tiedIds?.length) {
          return "";
        }
        return renderHistoryList(
          counts.filter((item) => tiedIds.includes(item[idField])),
          (item) => `
            <div class="history-card">
              <strong>${escapeHtml(item.phrase)}</strong>
              <span>${item.count}票</span>
            </div>
          `
        );
      }

      function renderVoteDecisionScreen(options) {
        const {
          label,
          title,
          description = "",
          summaryHtml = "",
          candidates,
          selectedId,
          dataAttr,
          selfId,
          allowSelfVote = false,
          action,
          buttonLabel
        } = options;
        const selectedCandidate = candidates.find((candidate) => (candidate.candidateId ?? candidate.playerId) === selectedId) || null;

        return `
          ${renderScreenAlerts()}
          <section class="card">
            <h2>${escapeHtml(title)}</h2>
            ${renderFocusCallout({
              label,
              title: selectedCandidate ? selectedCandidate.phrase : "まだワードを選んでいません",
              description: selectedCandidate
                ? "このワードで確定します。"
                : description,
              pills: [
                { label: "候補", value: `${candidates.length}語` },
                { label: "選択", value: selectedCandidate ? selectedCandidate.displayName : "未選択" }
              ]
            })}
            ${summaryHtml}
            ${renderVoteCards(candidates, selectedId, dataAttr, selfId, { allowSelfVote })}
            <div class="button-row">
              <button class="btn primary" type="button" data-action="${action}" ${selectedId && !state.pendingAction ? "" : "disabled"}>
                ${escapeHtml(buttonLabel)}
              </button>
            </div>
          </section>
        `;
      }

      function renderHostDecisionScreen(options) {
        const {
          label,
          title,
          description = "",
          counts,
          tiedIds,
          idField,
          candidates,
          selectedId,
          dataAttr,
          action
        } = options;
        const selectedCandidate = candidates.find((candidate) => (candidate.candidateId ?? candidate.playerId) === selectedId) || null;

        return `
          ${renderScreenAlerts()}
          <section class="card">
            <h2>${escapeHtml(title)}</h2>
            ${renderFocusCallout({
              label,
              title: selectedCandidate ? selectedCandidate.phrase : "ホストが勝ちワードを決めます",
              description: selectedCandidate
                ? "このワードで決定します。"
                : description,
              pills: [
                { label: "同票", value: `${candidates.length}語` },
                { label: "選択", value: selectedCandidate ? selectedCandidate.displayName : "未選択" }
              ]
            })}
            ${renderSection(
              "同票になったワード",
              renderTiedCountSummary(counts, tiedIds, idField),
              { className: "panel" }
            )}
            ${renderVoteCards(candidates, selectedId, dataAttr, "__none__", { disableSelf: false })}
            <div class="button-row">

                このワードで確定
              </button>
            </div>
          </section>
        `;

      function renderCountBreakdown(title, counts, formatDetail) {
        return renderSection(
          title,
          renderHistoryList(counts, (item) => `
            <div class="history-card">
              <strong>${escapeHtml(item.phrase)}</strong>
              <span>${escapeHtml(formatDetail(item))}</span>
            </div>
          `),
          { className: "panel" }
        );
      }

      function renderSubmissionList(submissions, emptyText = "まだ公開されたワードはありません。") {
        if (!submissions.length) {
          return `<div class="empty-state">${escapeHtml(emptyText)}</div>`;
        }
        return `
          <div class="action-grid">
            ${submissions
              .map(
                (submission) => `
                  <article class="action-card disabled">
                    <span class="badge">${escapeHtml(submission.displayName)}</span>
                    ${renderWordBoard(submission.renderedLines, submission.fontId, "vote-word", { maxFont: 34, minFont: 18 })}
                  </article>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderRoundWinnerGrid(rounds) {
        const winnerRounds = rounds.filter((round) => round.winner);
        if (!winnerRounds.length) {
          return `<div class="empty-state">まだ勝ちワードはありません。</div>`;
        }
        return `
          <div class="round-winner-grid">
            ${winnerRounds
              .map(
                (round) => `
                  <article class="round-winner-card">
                    <header>
                      <strong>${escapeHtml(round.label)}</strong>
                      <span>${escapeHtml(round.winner.displayName)}</span>
                    </header>
                    ${renderWordBoard(round.winner.renderedLines, round.winner.fontId, "result-word", { maxFont: 30, minFont: 18 })}
                    <footer>${escapeHtml(round.winner.phrase)}</footer>
                  </article>
                `
              )
              .join("")}
          </div>
        `;
      }

      function getLobbyPlayerOrder(room) {
        const players = [...room.game.players].sort((left, right) => left.seatOrder - right.seatOrder);
        const startPlayerId = state.selectedStartPlayerId || room.startPlayerId || players[0]?.playerId;
        const startIndex = players.findIndex((player) => player.playerId === startPlayerId);
        if (startIndex <= 0) {
          return players;
        }
        return [...players.slice(startIndex), ...players.slice(0, startIndex)];
      }

      function renderPlayerOrderPreview(room) {
        return `
          <div class="order-preview">
            ${getLobbyPlayerOrder(room)
              .map(
                (player, index) => `
                  <div class="order-item${index === 0 ? " is-first" : ""}">
                    <strong>${index === 0 ? "1番手" : `${index + 1}番手`}</strong>
                    <span>${escapeHtml(player.displayName)}</span>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderSubmitHero(room, layout) {
        const draftText = getDraftText(room);
        const modeLabel = lineModes.find((mode) => mode.id === state.draftLineMode)?.label || "";
        const fontLabel = fonts.find((font) => font.id === state.draftFontId)?.label || "";
        const selectedTiles = getSelectedTiles(room);
        return renderFocusCallout({
          label: getCurrentRound(room)?.label || "提出中",
          title: draftText || "まずは2牌を選ぶ",
          description: draftText ? "この見た目で公開されます。" : "",
          pills: [
            { label: "選択", value: `${selectedTiles.length}/2牌` },
            { label: "改行", value: modeLabel || "-" },
            { label: "書体", value: fontLabel || "-" },
            ...(layout.safetyAdjusted ? [{ label: "調整", value: "自動補正あり" }] : [])
          ]
        });
      }

        return renderLandingShell();

      function renderLandingShell() {

          ${renderScreenAlerts({ includeCopy: true })}
          <div id="landingCreateSlot"></div>
          <div id="landingJoinSlot"></div>
          <div id="landingChampionsSlot"></div>
        `;

      function renderLandingCreate() {
        return `
          <section class="card">
            <h2>ルームを作る</h2>

              <div class="field">
                <label for="createDisplayName">表示名</label>

              </div>
            </div>
            <div class="section-label">人数</div>
            <div class="chip-row">
              ${[2, 3, 4]
                .map(
                  (count) => `
                    <button class="chip${state.playerCount === count ? " active" : ""}" type="button" data-player-count="${count}">
                      ${count}人
                    </button>
                  `
                )
                .join("")}
            </div>
            <div class="button-row">
              <button class="btn primary" type="button" data-action="create-room" ${state.pendingAction ? "disabled" : ""}>ルームを作る</button>
            </div>
          </section>
        `;

      function renderLandingJoin() {
        return `
          <section class="card">

            ${
              state.inviteCode

                    label: "招待コード入力済み",

                  })

            }
            <div class="field-stack">
              <div class="field">
                <label for="inviteCode">招待コード</label>
                <input id="inviteCode" class="input" type="text" maxlength="20" placeholder="例: OMO-2048" value="${escapeHtml(state.inviteCode)}" data-field="inviteCode" />
              </div>
              <div class="field">
                <label for="joinDisplayName">表示名</label>
